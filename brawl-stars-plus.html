<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ブロスタ風 2Dアクション プロ版 3.1 (シリウス修正版)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght=800;900&display=swap');
        
        :root {
            --bg-dark: #12121c;
            --panel-bg: #22223b;
            --btn-blue: #3498db; --btn-blue-shadow: #217dbb;
            --btn-yellow: #f1c40f; --btn-yellow-shadow: #c29d0b;
            --text-main: #ffffff;
            --font-main: 'Nunito', sans-serif;
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; background-color: var(--bg-dark); color: var(--text-main);
            font-family: var(--font-main); overflow: hidden; overscroll-behavior: none;
        }
        
        /* キャンバスとUIレイヤー */
        #gameCanvas { display: none; width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        
        /* メニュー画面 */
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2b2b45 0%, #12121c 100%);
            background-size: 20px 20px;
            background-image: radial-gradient(#ffffff11 1px, transparent 1px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20;
        }
        h1 {
            font-size: 3rem; margin-bottom: 10px; color: #f1c40f; letter-spacing: 2px;
            text-shadow: 0 4px 0 #c29d0b, 0 8px 10px rgba(0,0,0,0.5);
            -webkit-text-stroke: 2px #222;
        }
        .menu-board {
            display: flex; flex-wrap: wrap; gap: 20px; background: rgba(34, 34, 59, 0.9);
            padding: 20px 30px; border-radius: 20px; border: 4px solid #4a4a6a;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6); max-width: 95%; justify-content: center;
        }
        .panel { display: flex; flex-direction: column; gap: 12px; min-width: 250px; }
        label { font-size: 1.1rem; color: #00d2d3; text-shadow: 1px 1px 0 #000; margin-bottom: -5px; }
        select {
            appearance: none; padding: 12px; border-radius: 12px; border: 3px solid #00d2d3;
            background: #1e1e2f; color: #fff; font-size: 1rem; font-family: var(--font-main); font-weight: bold;
            outline: none; cursor: pointer; box-shadow: 0 4px 0 #008f8f; transition: transform 0.1s;
        }
        select:active { transform: translateY(4px); box-shadow: 0 0 0 #008f8f; }
        
        .btn-start {
            margin-top: 15px; padding: 15px; border-radius: 15px; border: none;
            background: var(--btn-yellow); color: #222; font-size: 1.5rem; font-weight: 900;
            font-family: var(--font-main); cursor: pointer;
            box-shadow: 0 6px 0 var(--btn-yellow-shadow), 0 10px 15px rgba(0,0,0,0.4);
            text-transform: uppercase; transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-start:active { transform: translateY(6px); box-shadow: 0 0 0 var(--btn-yellow-shadow); }

        /* ゲーム内HUD */
        #hud-top {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 5px; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.65); padding: 8px 30px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.2);
            font-size: 1.3rem; font-weight: 900; text-shadow: 2px 2px 0 #000;
            min-width: 260px; text-align: center;
        }
        .score-blue { color: #3498db; } .score-red { color: #e74c3c; }
        #kill-log {
            position: absolute; top: 20px; right: 20px; font-size: 0.9rem; font-weight: bold;
            text-align: right; text-shadow: 1px 1px 2px #000; display: flex; flex-direction: column; gap: 5px;
        }
        .log-item { background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 10px; animation: fadeOut 4s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; transform: translateX(0); } 80% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(20px); } }

        /* リザルトスコアボード画面 */
        #resultsScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 28, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 30; padding: 20px; overflow-y: auto;
        }
        #resultsScreen h2 {
            font-size: 2.5rem; color: #f1c40f; text-shadow: 0 3px 0 #c29d0b;
            margin-bottom: 15px; text-align: center; -webkit-text-stroke: 1px #000;
        }
        .results-container {
            width: 100%; max-width: 700px; background: #22223b;
            border-radius: 15px; border: 3px solid #4a4a6a;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); overflow: hidden;
            margin-bottom: 15px;
        }
        .results-table {
            width: 100%; border-collapse: collapse; text-align: left;
        }
        .results-table th, .results-table td {
            padding: 10px 15px; border-bottom: 1.5px solid #2d2d44; font-size: 0.95rem;
        }
        .results-table th {
            background-color: #1a1a2e; color: #00d2d3; font-weight: 900; font-size: 1rem;
        }
        .results-table tr.highlight {
            background-color: rgba(241, 196, 15, 0.15); font-weight: bold;
        }
        .results-table tr.highlight td:first-child {
            color: #f1c40f;
        }
        .btn-close-results {
            padding: 12px 35px; border-radius: 12px; border: none;
            background: var(--btn-blue); color: #fff; font-size: 1.2rem; font-weight: 900;
            font-family: var(--font-main); cursor: pointer;
            box-shadow: 0 4px 0 var(--btn-blue-shadow);
            transition: transform 0.1s;
        }
        .btn-close-results:active { transform: translateY(4px); box-shadow: 0 0 0 var(--btn-blue-shadow); }

        /* 画面回転警告 */
        #rotatePrompt {
            position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg-dark);
            display: none; z-index: 100; align-items: center; justify-content: center; text-align: center;
        }
        #rotatePrompt h2 { color: #fff; font-size: 2rem; }
        @media screen and (orientation: portrait) {
            #rotatePrompt { display: flex; flex-direction: column; }
            #menu, #gameCanvas, #uiLayer, #resultsScreen { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="rotatePrompt">
        <h2>📱 スマホを横向きにしてください</h2><p>Please rotate your device.</p>
    </div>

    <!-- メニュー画面 -->
    <div id="menu">
        <h1>BRAWL CLONE</h1>
        <div class="menu-board">
            <div class="panel">
                <label>モード (MODE)</label>
                <select id="selMode">
                    <option value="gemgrab">💎 エメラルドハント (3v3)</option>
                    <option value="wipeout">⚔️ 殲滅 (3v3)</option>
                    <option value="knockout">💀 ノックアウト (3v3 / 3ラウンド2本先取)</option>
                    <option value="showdown">🏜️ ソロバトル (1v11)</option>
                </select>

                <label>キャラクター (BRAWLER)</label>
                <select id="selChar">
                    <option value="shelly">🟣 シェリー (ショットガン)</option>
                    <option value="colt">🔴 コルト (二丁拳銃)</option>
                    <option value="primo">🔵 エル・プリモ (パンチ)</option>
                    <option value="gus">🎈 ガス (シールド＆ゴースト)</option>
                    <option value="mortis">🦇 モーティス (移動攻撃)</option>
                    <option value="sirius">🌌 シリウス (影の召喚術師)</option>
                </select>
            </div>
            <div class="panel" id="skillsPanel">
                <label>ガジェット (GADGET)</label>
                <select id="selGadget"></select>

                <label>スターパワー (STAR POWER)</label>
                <select id="selSp"></select>
                
                <button class="btn-start" id="btnStart">PLAY!</button>
            </div>
        </div>
    </div>

    <!-- リザルト画面 -->
    <div id="resultsScreen">
        <h2 id="resultsTitle">🎉 BATTLE RESULTS</h2>
        <div class="results-container">
            <table class="results-table">
                <thead>
                    <tr>
                        <th>キャラクター</th>
                        <th>チーム / 所属</th>
                        <th>キル数 (KILLS)</th>
                        <th>デス数 (DEATHS)</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                    <!-- JavaScriptで動的に挿入されます -->
                </tbody>
            </table>
        </div>
        <button class="btn-close-results" id="btnCloseResults">メニューに戻る</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div id="hud-top"></div>
        <div id="kill-log"></div>
    </div>

<script>

            { id: 'novabirth', name: '新星誕生 (太く速い弾、当たった敵の影を召喚)' },

        ],

};

const selChar = document.getElementById('selChar');
const selGadget = document.getElementById('selGadget');
const selSp = document.getElementById('selSp');

function updateSkillOptions() {
    const c = CHAR_DATA[selChar.value];
    selGadget.innerHTML = c.gadgets.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    selSp.innerHTML = c.sps.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
}
selChar.addEventListener('change', updateSkillOptions);
updateSkillOptions();


/** ==========================================
 * 基盤システム・ユーティリティ & デルタタイム定義
 * ========================================== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let cw, ch;
function resize() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function dist(x1,y1,x2,y2) { return Math.hypot(x1-x2, y1-y2); }

function circleRectCollide(cx, cy, r, rx, ry, rw, rh) {
    let testX = cx, testY = cy;
    if (cx < rx) testX = rx; else if (cx > rx + rw) testX = rx + rw;
    if (cy < ry) testY = ry; else if (cy > ry + rh) testY = ry + rh;
    let dx = cx - testX, dy = cy - testY;
    return (dx*dx + dy*dy) <= r*r;
}

function lineRectCollide(x1, y1, x2, y2, rx, ry, rw, rh) {
    let left = rx, right = rx+rw, top = ry, bottom = ry+rh;
    let minX = Math.min(x1,x2), maxX = Math.max(x1,x2), minY = Math.min(y1,y2), maxY = Math.max(y1,y2);
    if(maxX < left || minX > right || maxY < top || minY > bottom) return false;
    return true; 
}

function getSafeLandingSpot(startX, startY, angle, jumpDist, characterRadius) {
    let rawDestX = startX + Math.cos(angle) * jumpDist;
    let rawDestY = startY + Math.sin(angle) * jumpDist;
    
    const margin = 25;
    rawDestX = Math.max(margin + characterRadius, Math.min(rawDestX, Game.mapW - margin - characterRadius));
    rawDestY = Math.max(margin + characterRadius, Math.min(rawDestY, Game.mapH - margin - characterRadius));
    
    function isLocationSafe(x, y, r) {
        if (x - r < margin || x + r > Game.mapW - margin) return false;
        if (y - r < margin || y + r > Game.mapH - margin) return false;
        for (let w of Game.map) {
            if (circleRectCollide(x, y, r * 0.8, w.x, w.y, w.w, w.h)) {
                return false;
            }
        }
        return true;
    }
    
    if (isLocationSafe(rawDestX, rawDestY, characterRadius)) {
        return { x: rawDestX, y: rawDestY };
    }
    
    let stepAngle = Math.PI / 8;
    let radiusStep = 10;
    let maxRadius = 300;
    
    for (let searchR = radiusStep; searchR <= maxRadius; searchR += radiusStep) {
        for (let a = 0; a < Math.PI * 2; a += stepAngle) {
            let checkX = rawDestX + Math.cos(a) * searchR;
            let checkY = rawDestY + Math.sin(a) * searchR;
            if (isLocationSafe(checkX, checkY, characterRadius)) {
                return { x: checkX, y: checkY };
            }
        }
    }
    return { x: rawDestX, y: rawDestY };
}


/** ==========================================
 * 入力管理 (ジョイスティック＆高精度オートエイム)
 * ========================================== */
const Input = {
    leftJoy: { active: false, id: null, ox:0, oy:0, x:0, y:0, nx:0, ny:0, mag:0 },
    btns: {
        attack: { type:'normal', id:null, cx:0, cy:0, x:0, y:0, angle:0, mag:0, r:60, color:'#e74c3c', icon:'💥', dragged:false, startTime:0, startX:0, startY:0 },
        super:  { type:'super',  id:null, cx:0, cy:0, x:0, y:0, angle:0, mag:0, r:45, color:'#f1c40f', icon:'💀', dragged:false, startTime:0, startX:0, startY:0 },
        gadget: { type:'gadget', id:null, cx:0, cy:0, x:0, y:0, angle:0, mag:0, r:35, color:'#2ecc71', icon:'🔧', dragged:false, startTime:0, startX:0, startY:0 },
        hc:     { type:'hc',     id:null, cx:0, cy:0, x:0, y:0, angle:0, mag:0, r:40, color:'#9b59b6', icon:'🔥', tapOnly:true, dragged:false, startTime:0, startX:0, startY:0 }
    },
    initLayout() {
        const rx = cw - 150, by = ch - 120;
        this.btns.attack.cx = rx;       this.btns.attack.cy = by;
        this.btns.super.cx  = rx - 110; this.btns.super.cy  = by - 20;
        this.btns.gadget.cx = rx - 50;  this.btns.gadget.cy = by - 120;
        this.btns.hc.cx     = rx + 70;  this.btns.hc.cy     = by - 100;
    }
};

canvas.addEventListener('touchstart', handleTouch, {passive: false});
canvas.addEventListener('touchmove', handleTouch, {passive: false});
canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
canvas.addEventListener('touchcancel', handleTouchEnd, {passive: false});

function handleTouch(e) {
    e.preventDefault();
    Input.initLayout();
    for (let i=0; i<e.touches.length; i++) {
        const t = e.touches[i];
        if (t.clientX < cw / 2) {
            if (!Input.leftJoy.active) {
                Input.leftJoy.active = true; Input.leftJoy.id = t.identifier;
                Input.leftJoy.ox = t.clientX; Input.leftJoy.oy = t.clientY;
            }
            if (Input.leftJoy.id === t.identifier) {
                let dx = t.clientX - Input.leftJoy.ox, dy = t.clientY - Input.leftJoy.oy;
                let distVal = Math.hypot(dx, dy);
                Input.leftJoy.mag = Math.min(distVal / 60, 1);
                if (distVal > 0) { Input.leftJoy.nx = dx/distVal; Input.leftJoy.ny = dy/distVal; }
                Input.leftJoy.x = t.clientX; Input.leftJoy.y = t.clientY;
            }
        } 
        else {
            let assigned = false;
            for(let key in Input.btns) {
                let b = Input.btns[key];
                if(b.id === t.identifier) {
                    assigned = true;
                    b.x = t.clientX; b.y = t.clientY;
                    b.angle = Math.atan2(b.y - b.cy, b.x - b.cx);
                    b.mag = Math.min(Math.hypot(b.x - b.cx, b.y - b.cy) / b.r, 1);
                    
                    let dragDist = Math.hypot(b.x - b.startX, b.y - b.startY);
                    if (dragDist > 15 || b.mag > 0.3) {
                        b.dragged = true;
                    }
                    break;
                }
            }
            if(!assigned) {
                for(let key in Input.btns) {
                    let b = Input.btns[key];
                    if(b.id === null && Math.hypot(t.clientX - b.cx, t.clientY - b.cy) < b.r * 1.5) {
                        b.id = t.identifier; b.x = t.clientX; b.y = t.clientY;
                        b.angle = Math.atan2(b.y - b.cy, b.x - b.cx);
                        b.mag = Math.min(Math.hypot(b.x - b.cx, b.y - b.cy) / b.r, 1);
                        b.dragged = false; 
                        b.startTime = Date.now();
                        b.startX = t.clientX;
                        b.startY = t.clientY;
                        break;
                    }
                }
            }
        }
    }
}

function handleTouchEnd(e) {
    e.preventDefault();
    let currentIds = Array.from(e.touches).map(t => t.identifier);
    
    if (Input.leftJoy.active && !currentIds.includes(Input.leftJoy.id)) {
        Input.leftJoy.active = false; Input.leftJoy.id = null;
        Input.leftJoy.nx = Input.leftJoy.ny = Input.leftJoy.mag = 0;
    }
    for(let key in Input.btns) {
        let b = Input.btns[key];
        if (b.id !== null && !currentIds.includes(b.id)) {
            if (player && Game.state === 'playing') {
                if (player.hp > 0) {
                    if (key === 'hc') {
                        player.activateHC();
                    } else {
                        let pressDuration = Date.now() - b.startTime;
                        let totalDragDist = Math.hypot(b.x - b.startX, b.y - b.startY);

                        if (!b.dragged || (totalDragDist < 20 && pressDuration < 220) || b.mag < 0.3) {
                            let target = Game.findClosestEnemy(player, player.data.range * 3.5);
                            let finalAngle = target ? Math.atan2(target.y - player.y, target.x - player.x) : player.facing;
                            
                            if (player.type === 'primo' && b.type === 'super' && target) {
                                player.autoAimTargetDist = dist(player.x, player.y, target.x, target.y);
                            } else {
                                player.autoAimTargetDist = null;
                            }
                            player.requestAttack(finalAngle, b.type);
                        } else {
                            if (b.mag < 0.35) {
                                Game.uiEffects.push(new FloatingText(player.x, player.y - 60, "CANCEL", '#ff4d4d', 16));
                            } else {
                                player.autoAimTargetDist = null; 
                                player.requestAttack(b.angle, b.type);
                            }
                        }
                    }
                }
            }
            b.id = null; b.mag = 0; b.dragged = false;
        }
    }
}


/** ==========================================
 * エフェクト・描画クラス
 * ========================================== */
class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x=x; this.y=y; this.color=color; this.size=size;
        this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
    }
    update() { 
        this.x += this.vx * Game.timeScale; 
        this.y += this.vy * Game.timeScale; 
        this.vx *= Math.pow(0.9, Game.timeScale); 
        this.vy *= Math.pow(0.9, Game.timeScale); 
        this.life -= Game.timeScale; 
    }
    draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, this.life / this.maxLife));
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class FloatingText {
    constructor(x, y, text, color, size=20) {
        this.x=x; this.y=y; this.text=text; this.color=color; this.size=size;
        this.life = 40; this.maxLife = 40; this.vy = -1.5;
    }
    update() { 
        this.y += this.vy * Game.timeScale; 
        this.life -= Game.timeScale; 
    }
    draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, this.life / this.maxLife));
        ctx.font = `900 ${this.size}px ${getComputedStyle(document.documentElement).getPropertyValue('--font-main')}`;
        ctx.fillStyle = this.color; ctx.textAlign = 'center';
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        ctx.strokeText(this.text, this.x, this.y); ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
    }
}


/** ==========================================
 * エンティティクラス
 * ========================================== */
class Entity {
    constructor(x, y, r) { this.x=x; this.y=y; this.r=r; this.remove=false; }
}

class Ghost extends Entity {
    constructor(x, y, owner) {
        super(x, y, 20);
        this.owner = owner;
        this.life = 10000;
        this.remove = false;
        this.team = owner.team;
    }
    update() {
        if (this.owner.hcActive) {
            this.attackTimer = (this.attackTimer || 0) + Game.timeScale;
            if (this.attackTimer >= 90) {
                let target = Game.findClosestEnemy(this, 500);
                if (target) {
                    let angle = Math.atan2(target.y - this.y, target.x - this.x);
                    let b = new Bullet(this.owner, angle, 16, 500, 1800, 10, 'normal');
                    b.x = this.x; b.y = this.y;
                    b.isGhostAttack = true; 
                    Game.bullets.push(b);
                }
                this.attackTimer = 0;
            }
        }

        Game.entities.forEach(e => {
            if (e.hp > 0 && e.team === this.team && dist(this.x, this.y, e.x, e.y) < this.r + e.r) {
                let healAmt = this.owner.sp === 'health' ? 3990 : 3000;
                e.hp = Math.min(e.maxHp, e.hp + healAmt);
                Game.uiEffects.push(new FloatingText(e.x, e.y - 45, `+${healAmt}`, '#2ecc71', 16));
                this.remove = true;
            }
        });
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y + Math.sin(Date.now()*0.005)*5);
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#bdc3c7';
        ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-5, -5, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -5, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

// シリウスが召喚する「影（シャドウボット）」
class ShadowBot extends Entity {
    constructor(x, y, originBrawlerType, originName, team, owner) {
        super(x, y, 22);
        this.owner = owner;
        this.originType = originBrawlerType;
        this.originName = originName;
        this.team = team;
        this.data = {...CHAR_DATA[originBrawlerType]};
        
        // 元キャラのHP、攻撃、移動速度を6.5割(65%)に
        this.hp = this.maxHp = Math.floor(this.data.hp * 0.65);
        this.baseSpeed = this.data.speed * 0.9; 
        this.dmgMult = 0.65;
        
        this.maxAmmo = this.data.ammo; 
        this.ammo = this.maxAmmo;
        this.reloadTime = this.data.reload; 
        this.reloadTimer = 0;
        this.effects = [];
        this.fireQueue = [];
        this.dashTimer = 0; this.dashVx = 0; this.dashVy = 0;
        this.invincible = false; this.z = 0;
        this.facing = 0;
        this.name = `影${originName}`;
        this.isShadow = true;
        this.remove = false;
        this.gems = 0; 

        // モーティス影用の攻撃ダッシュ衝突判定用セット
        this.mortisHitTargets = new Set();
        this.mortisNormalDmg = 0;

        this.aiState = 'fight';
        this.aiTarget = null;
        this.moveAng = 0; this.aiTimer = 0;
        this.stuckTimer = 0;
        this.lastX = x; this.lastY = y;
    }

    getSpeed() {
        let s = this.baseSpeed;
        if(this.effects.some(e=>e.type==='speed')) s *= 1.3;
        if(this.effects.some(e=>e.type==='slow')) s *= 0.6;
        return s;
    }

    takeDamage(dmg, attacker) {
        if(this.hp <= 0) return;
        this.hp -= Math.floor(dmg);
        Game.uiEffects.push(new FloatingText(this.x + (Math.random()-0.5)*20, this.y - 30, Math.floor(dmg), '#e74c3c', 16));
        if(this.hp <= 0) this.die(attacker);
    }

    die(attacker) {
        this.hp = 0;
        this.remove = true;

        if (attacker) {
            attacker.kills++;
            if (!Game.globalStats[attacker.name]) Game.globalStats[attacker.name] = { kills: 0, deaths: 0, brawler: attacker.data.name, team: attacker.team };
            Game.globalStats[attacker.name].kills++;
        }

        Game.addLog(attacker ? attacker.name : "System", this.name, this.team);

        for(let i=0; i<15; i++) {
            Game.particles.push(new Particle(this.x, this.y, Math.random() < 0.5 ? '#4a154b' : '#1e1e2f', Math.random()*6+2, (Math.random()-0.5)*10, (Math.random()-0.5)*10, 30));
        }

        if (this.owner && this.owner.hp > 0) {
            if (this.owner.sp === 'unyielding') {
                Game.entities.forEach(e => {
                    if (e.hp > 0 && e.team !== this.team && dist(this.x, this.y, e.x, e.y) < 160) {
                        e.takeDamage(1000, this.owner);
                    }
                });
                for (let i = 0; i < 20; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 8;
                    Game.particles.push(new Particle(this.x, this.y, '#9b59b6', 5, Math.cos(angle)*speed, Math.sin(angle)*speed, 20));
                }
                Game.uiEffects.push(new FloatingText(this.x, this.y - 40, "不屈の爆発！", '#9b59b6', 16));
            }
            if (this.owner.sp === 'returning') {
                this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + 1000);
                Game.uiEffects.push(new FloatingText(this.owner.x, this.owner.y - 45, `+1000`, '#2ecc71', 16));
            }
        }
    }

    update() {
        if(this.hp <= 0) return;

        for(let i=this.effects.length-1; i>=0; i--) {
            this.effects[i].time -= Game.timeScale;
            if(this.effects[i].time <= 0) this.effects.splice(i, 1);
        }

        if(this.ammo < this.maxAmmo) {
            this.reloadTimer += Game.timeScale;
            if(this.reloadTimer >= this.reloadTime) { this.ammo++; this.reloadTimer = 0; }
        } else { this.reloadTimer = 0; }

        for(let i=this.fireQueue.length-1; i>=0; i--) {
            let f = this.fireQueue[i];
            f.delay -= Game.timeScale;
            if(f.delay <= 0) {
                let b = new Bullet(this.owner, f.angle, f.speed, f.range, f.dmg, f.size, f.type);
                b.isShadowAttack = true; 
                b.x = this.x; b.y = this.y; 
                if(f.pierce) b.pierce = true; 
                if(f.wallBreak) b.wallBreak = true;
                Game.bullets.push(b); 
                this.fireQueue.splice(i, 1);
            }
        }

        // 動作
        let dx = 0, dy = 0;
        if(this.dashTimer > 0) {
            this.dashTimer = Math.max(0, this.dashTimer - Game.timeScale);
            dx = this.dashVx * Game.timeScale; dy = this.dashVy * Game.timeScale;
            
            // モーティスの影ダッシュ：連続多段ヒットバグの修正
            if (this.originType === 'mortis' && this.mortisNormalDmg) {
                Game.entities.forEach(e => {
                    if (e !== this && e.team !== this.team && e.hp > 0 && !this.mortisHitTargets.has(e)) {
                        if (dist(this.x, this.y, e.x, e.y) < this.r + e.r + 30) {
                            e.takeDamage(this.mortisNormalDmg, this.owner);
                            this.mortisHitTargets.add(e); // このダッシュ中ヒット済みリストに記録して再多段化を抑止
                        }
                    }
                });
            }

            if (this.dashTimer <= 0) {
                this.mortisNormalDmg = 0;
                this.mortisHitTargets.clear(); // 次回ダッシュ用にリセット
            }
        } else {
            this.updateBotAI();
            if(this.aiMoving) {
                let speed = this.getSpeed();
                dx = Math.cos(this.moveAng) * speed * Game.timeScale; dy = Math.sin(this.moveAng) * speed * Game.timeScale;
                this.facing = this.moveAng;
            }
        }

        // マップ衝突判定
        let newX = this.x + dx, newY = this.y + dy;
        let colX = false, colY = false;
        
        for(let w of Game.map) {
            if(circleRectCollide(newX, this.y, this.r, w.x, w.y, w.w, w.h)) colX = true;
            if(circleRectCollide(this.x, newY, this.r, w.x, w.y, w.w, w.h)) colY = true;
        }

        const margin = 25;
        if(newX - this.r < margin || newX + this.r > Game.mapW - margin) colX = true;
        if(newY - this.r < margin || newY + this.r > Game.mapH - margin) colY = true;

        if(!colX) this.x = newX; 
        if(!colY) this.y = newY;
        
        this.x = Math.max(margin + this.r, Math.min(this.x, Game.mapW - margin - this.r));
        this.y = Math.max(margin + this.r, Math.min(this.y, Game.mapH - margin - this.r));
    }

    updateBotAI() {
        this.aiTimer -= Game.timeScale;
        if(dist(this.x, this.y, this.lastX, this.lastY) < 0.2 && this.aiMoving) {
            this.stuckTimer += Game.timeScale;
        } else {
            this.stuckTimer = 0;
        }
        this.lastX = this.x; this.lastY = this.y;

        if(this.aiTimer <= 0) {
            this.aiTimer = 10; 
            let closestEnemy = Game.findClosestEnemy(this, 1200);
            let distToEne = closestEnemy ? dist(this.x, this.y, closestEnemy.x, closestEnemy.y) : Infinity;

            if(this.stuckTimer > 15) {
                this.moveAng = this.facing + Math.PI/2 + (Math.random()-0.5);
                this.aiMoving = true;
                this.aiTimer = 30; 
                this.stuckTimer = 0;
                return;
            }

            let targetAng = 0;
            let hasTarget = false;

            if (closestEnemy) {
                let idealDist = this.originType === 'primo' || this.originType === 'mortis' ? 50 : (this.originType === 'shelly' ? 160 : 300);
                let angToEne = Math.atan2(closestEnemy.y - this.y, closestEnemy.x - this.x);
                if(distToEne > idealDist + 30) {
                    targetAng = angToEne; 
                } else if(distToEne < idealDist - 30 && this.originType !== 'primo' && this.originType !== 'mortis') {
                    targetAng = angToEne + Math.PI; 
                } else {
                    targetAng = angToEne + (Math.random() > 0.5 ? Math.PI/2 : -Math.PI/2); 
                }
                hasTarget = true;
            }

            if (hasTarget) {
                this.moveAng = targetAng;
                this.aiMoving = true;
            } else {
                if (this.owner && this.owner.hp > 0) {
                    this.moveAng = Math.atan2(this.owner.y - this.y, this.owner.x - this.x);
                    this.aiMoving = dist(this.x, this.y, this.owner.x, this.owner.y) > 100;
                }
            }

            // 攻撃実行
            if(closestEnemy && distToEne <= this.data.range * 1.15 && this.ammo >= 1) {
                let angToEne = Math.atan2(closestEnemy.y - this.y, closestEnemy.x - this.x);
                this.facing = angToEne;

                let wallInWay = false;
                for(let w of Game.map) {
                    if(lineRectCollide(this.x, this.y, closestEnemy.x, closestEnemy.y, w.x, w.y, w.w, w.h)) {
                        wallInWay = true; break;
                    }
                }

                if(!wallInWay || this.originType === 'primo' || this.originType === 'mortis') {
                    this.ammo--;
                    let dmg = 1000 * this.dmgMult;
                    
                    if (this.originType === 'shelly') {
                        for(let i=0; i<5; i++) {
                            let a = angToEne + (i - 2) * 0.12;
                            let b = new Bullet(this.owner, a, 13, this.data.range, 450 * this.dmgMult, 6, 'normal');
                            b.isShadowAttack = true;
                            b.x = this.x; b.y = this.y; 
                            Game.bullets.push(b);
                        }
                    } else if (this.originType === 'colt') {
                        for(let i=0; i<6; i++) {
                            this.fireQueue.push({ delay: i*4, angle: angToEne, speed: 15, range: this.data.range, dmg: 280*this.dmgMult, size: 7, type:'normal' });
                        }
                    } else if (this.originType === 'primo') {
                        for(let i=0; i<4; i++) {
                            this.fireQueue.push({ delay: i*4, angle: angToEne, speed: 12, range: this.data.range, dmg: 550*this.dmgMult, size: 20, type:'normal' });
                        }
                    } else if (this.originType === 'gus') {
                        let b = new Bullet(this.owner, angToEne, 16, this.data.range, 2500*this.dmgMult, 18, 'normal');
                        b.isShadowAttack = true; 
                        b.x = this.x; b.y = this.y; 
                        Game.bullets.push(b);
                    } else if (this.originType === 'mortis') {
                        // モーティスの影ダッシュ初期処理
                        this.dashTimer = 10;
                        this.dashVx = Math.cos(angToEne) * 15;
                        this.dashVy = Math.sin(angToEne) * 15;
                        this.mortisNormalDmg = 1500 * this.dmgMult;
                        this.mortisHitTargets.clear(); // 新規ダッシュの判定用にヒットセットを空にする
                    } else if (this.originType === 'sirius') {
                        let b = new Bullet(this.owner, angToEne, 15, this.data.range, 1800*this.dmgMult, 12, 'normal');
                        b.isShadowAttack = true; 
                        b.x = this.x; b.y = this.y; 
                        b.pierce = true;
                        Game.bullets.push(b);
                    }
                }
            }
        }
    }

    draw(ctx) {
        if(this.hp <= 0) return;

        ctx.save(); ctx.translate(this.x, this.y);

        ctx.beginPath(); ctx.ellipse(0, 20, 25, 10, 0, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(74, 21, 75, 0.5)'; ctx.fill();

        ctx.save();
        ctx.rotate(this.facing);

        ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2);
        ctx.fillStyle = '#1e1035'; ctx.fill();
        ctx.lineWidth = 3.5; ctx.strokeStyle = '#9b59b6'; ctx.stroke();

        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.arc(8, -6, 4, 0, Math.PI*2); ctx.arc(8, 6, 4, 0, Math.PI*2); ctx.fill();

        ctx.strokeStyle = '#3d0c5a'; ctx.lineWidth = 2;
        if(this.originType === 'shelly') {
            ctx.fillStyle = '#4a154b'; ctx.fillRect(10, 4, 18, 5);
        } else if (this.originType === 'colt') {
            ctx.fillStyle = '#4a154b'; ctx.fillRect(10, -10, 13, 4); ctx.fillRect(10, 6, 13, 4);
        } else if (this.originType === 'primo') {
            ctx.fillStyle = '#8e44ad'; ctx.beginPath(); ctx.arc(8, 0, 4, 0, Math.PI*2); ctx.fill();
        } else if (this.originType === 'mortis') {
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(10, -2, 22, 3);
        }

        ctx.restore();

        ctx.fillStyle = '#9b59b6'; ctx.font = 'bold 11px Nunito'; ctx.textAlign = 'center';
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.strokeText(this.name, 0, -32); ctx.fillText(this.name, 0, -32);

        let barW = 45;
        ctx.fillStyle = '#1a1126'; ctx.fillRect(-barW/2, -25, barW, 6);
        ctx.fillStyle = '#9b59b6'; 
        ctx.fillRect(-barW/2, -25, barW * (this.hp/this.maxHp), 6);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(-barW/2, -25, barW, 6);

        ctx.restore();
    }
}

class Character extends Entity {
    constructor(type, isPlayer, team, x, y) {
        super(x, y, 22);
        this.type = type; this.isPlayer = isPlayer; this.team = team;
        this.data = CHAR_DATA[type];
        this.hp = this.maxHp = this.data.hp;
        this.baseSpeed = this.data.speed;
        this.maxAmmo = this.data.ammo; this.ammo = this.maxAmmo;
        this.reloadTime = this.data.reload; this.reloadTimer = 0;
        
        this.superCharge = 0; this.maxSuperCharge = 100;
        this.hcCharge = 0; this.maxHcCharge = 250;
        
        this.gadgetCooldown = 0; this.hcActive = false; this.hcTimer = 0;
        
        this.effects = []; this.fireQueue = [];
        this.dashTimer = 0; this.dashVx = 0; this.dashVy = 0;
        this.invincible = false; this.z = 0;
        this.gems = 0; this.cubes = 0;
        
        this.kills = 0; this.deaths = 0;
        this.facing = 0; this.lastDamagedTimer = 0;
        this.autoAimTargetDist = null;
        
        this.ghostGauge = 0;
        this.shield = 0;
        this.longDashGauge = 0;

        // シリウス専用変数
        this.recordedBrawlers = []; 
        this.temporaryRecordGauge = {}; 

        if(isPlayer) {
            this.gadget = selGadget.value; this.sp = selSp.value;
            this.name = "YOU";
        } else {
            this.gadget = this.data.gadgets[Math.floor(Math.random()*this.data.gadgets.length)].id;
            this.sp = this.data.sps[Math.floor(Math.random()*this.data.sps.length)].id;
            this.name = "Bot " + Math.floor(Math.random()*99);
        }
        if (this.sp === 'combo' && this.type === 'shelly') this.maxAmmo = 4;
        
        this.aiState = 'fight'; 
        this.aiTarget = null;
        this.moveAng = 0; this.aiTimer = 0;
        this.stuckTimer = 0; 
        this.lastX = x; this.lastY = y;
    }
    
    getSpeed() {
        let s = this.baseSpeed;
        if(this.hcActive) s *= 1.25;
        if(this.effects.some(e=>e.type==='speed')) s *= 1.3;
        if(this.effects.some(e=>e.type==='slow')) s *= 0.6;
        return s;
    }
    
    takeDamage(dmg, attacker) {
        if(this.invincible || this.hp <= 0) return;
        if(this.hcActive && this.type === 'shelly') dmg *= 0.5; 
        if(this.cubes > 0) dmg = dmg * (1 - Math.min(this.cubes*0.05, 0.5));
        
        if (this.shield && this.shield > 0) {
            if (this.shield >= dmg) {
                this.shield -= dmg;
                dmg = 0;
            } else {
                dmg -= this.shield;
                this.shield = 0;
            }
            Game.uiEffects.push(new FloatingText(this.x, this.y - 60, "BLOCKED", '#f1c40f', 14));
        }

        if (dmg <= 0) return;

        let finalDmg = Math.floor(dmg);
        this.hp -= finalDmg;
        this.lastDamagedTimer = 0; 
        
        if (this.isPlayer && navigator.vibrate) {
            navigator.vibrate(100);
        }
        
        Game.uiEffects.push(new FloatingText(this.x + (Math.random()-0.5)*20, this.y - 30, finalDmg, '#ff4757'));
        
        if(this.hp <= 0) this.die(attacker);
        else {
            let mult = this.type === 'sirius' ? 0.3 : 1;
            this.chargeSuper(finalDmg * 0.015 * mult);
        }
    }
    
    chargeSuper(amt) {
        let rate = this.data.superChargeRate || 1;
        this.superCharge = Math.min(this.maxSuperCharge, this.superCharge + amt * rate);
        if (this.type !== 'sirius') {
            this.hcCharge = Math.min(this.maxHcCharge, this.hcCharge + amt * rate * 0.6);
        }
    }
    
    die(attacker) {
        this.hp = 0;
        this.deaths++; 
        
        if (attacker) {
            attacker.kills++;
            if (!Game.globalStats[attacker.name]) Game.globalStats[attacker.name] = { kills: 0, deaths: 0, brawler: attacker.data.name, team: attacker.team };
            Game.globalStats[attacker.name].kills++;
        }
        
        if (!Game.globalStats[this.name]) Game.globalStats[this.name] = { kills: 0, deaths: 0, brawler: this.data.name, team: this.team };
        Game.globalStats[this.name].deaths++;
        
        Game.addLog(attacker ? attacker.name : "System", this.name, this.team);
        
        for(let i=0; i<15; i++) Game.particles.push(new Particle(this.x, this.y, this.team===1?'#3498db':'#e74c3c', Math.random()*6+2, (Math.random()-0.5)*10, (Math.random()-0.5)*10, 30));
        
        if(Game.mode === 'gemgrab' && this.gems > 0) {
            for(let i=0; i<this.gems; i++) Game.items.push(new Item(this.x+(Math.random()-0.5)*50, this.y+(Math.random()-0.5)*50, 'gem'));
            this.gems = 0;
        } else if (Game.mode === 'showdown') {
            let dropCount = 1 + Math.floor(this.cubes/2);
            for(let i=0; i<dropCount; i++) Game.items.push(new Item(this.x+(Math.random()-0.5)*30, this.y+(Math.random()-0.5)*30, 'cube'));
        }
        
        if(Game.mode === 'wipeout' && attacker) {
            if(attacker.team === 1) Game.score.t1++; else Game.score.t2++;
        }
        
        if(Game.mode === 'knockout' || Game.mode === 'showdown') {
            this.remove = true;
        } else {
            setTimeout(() => {
                if(Game.state === 'playing' && !this.remove) {
                    this.hp = this.maxHp;
                    let sp = Game.getSpawn(this.team);
                    this.x = sp.x; this.y = sp.y; this.ammo = this.maxAmmo;
                    this.invincible = true; setTimeout(()=>this.invincible=false, 3000);
                }
            }, 3000);
        }
    }

    activateHC() {
        if (this.hcCharge >= this.maxHcCharge) {
            this.hcCharge = 0; this.hcActive = true; this.hcTimer = 300; 
            Game.uiEffects.push(new FloatingText(this.x, this.y-50, "HYPER CHARGE!", '#9b59b6', 24));
        }
    }

    requestAttack(angle, btnType) {
        if(this.dashTimer > 0 || this.z > 0) return;
        this.facing = angle;
        this.lastDamagedTimer = 0; 
        
        if(btnType === 'normal' && this.ammo >= 1) {
            this.ammo--; this.executeAttack(angle, 'normal');
        } else if (btnType === 'super' && this.superCharge >= this.maxSuperCharge) {
            this.superCharge = 0; this.executeAttack(angle, 'super');
        } else if (btnType === 'gadget' && this.gadgetCooldown <= 0) {
            this.gadgetCooldown = 600; this.executeAttack(angle, 'gadget');
        }
    }

    executeAttack(angle, type) {
        let dmgMult = this.hcActive ? 1.25 : 1;
        if(this.cubes > 0) dmgMult *= (1 + this.cubes*0.1); 
        
        if(this.type === 'shelly') {
            let rangeMult = 1;
            if(type === 'normal') {
                if(this.sp === 'hyper' && this.ammo === this.maxAmmo -1) rangeMult = 1.3;
                for(let i=0; i<5; i++) {
                    let a = angle + (i - 2) * 0.12;
                    Game.bullets.push(new Bullet(this, a, 13, this.data.range*rangeMult, 450*dmgMult, 6, 'normal')); 
                }
            } else if (type === 'super') {
                for(let i=0; i<9; i++) {
                    let a = angle + (i - 4) * 0.15;
                    let b = new Bullet(this, a, 15, this.data.range*1.3, 480*dmgMult, 10, 'super'); 
                    b.knockback = 15; b.wallBreak = true; Game.bullets.push(b);
                }
            } else if (type === 'gadget') {
                if(this.gadget === 'dash') {
                    this.dashTimer = 15; this.dashVx = Math.cos(angle)*13; this.dashVy = Math.sin(angle)*13; 
                } else if(this.gadget === 'sharp') {
                    let b = new Bullet(this, angle, 17, this.data.range*1.5, 600*dmgMult, 5, 'gadget'); 
                    b.effects.push({type:'slow', time:150}); Game.bullets.push(b);
                }
            }
        }
        else if (this.type === 'colt') {
            if(type === 'normal') {
                let count = this.sp === 'million' ? 8 : 6;
                let sizeMult = this.sp === 'big' ? 1.5 : 1;
                for(let i=0; i<count; i++) {
                    this.fireQueue.push({ delay: i*4, angle: angle+(Math.random()-0.5)*0.06, speed: 15, range: this.data.range, dmg: 280*dmgMult, size: 7*sizeMult, type:'normal', hcColt: this.hcActive }); 
                }
            } else if (type === 'super') {
                for(let i=0; i<12; i++) {
                    this.fireQueue.push({ delay: i*3, angle: angle+(Math.random()-0.5)*0.08, speed: 17, range: this.data.range*1.2, dmg: 280*dmgMult, size: 12, type:'super', pierce: true, wallBreak: true }); 
                }
            } else if (type === 'gadget') {
                if(this.gadget === 'one') {
                    Game.bullets.push(new Bullet(this, angle, 22, this.data.range*1.5, 250*6*0.33 * dmgMult, 12, 'gadget')); 
                } else if (this.gadget === 'slow') {
                    let b = new Bullet(this, angle, 15, this.data.range, 0, 10, 'gadget'); 
                    b.pierce = true; b.effects.push({type:'slow', time:180}); Game.bullets.push(b);
                }
            }
        }
        else if (this.type === 'primo') {
            if(type === 'normal') {
                let rMult = this.hcActive ? 1.5 : 1; let sMult = this.hcActive ? 1.5 : 1;
                for(let i=0; i<4; i++) {
                    this.fireQueue.push({ delay: i*4, angle: angle, speed: 12, range: this.data.range*rMult, dmg: 550*dmgMult, size: 20*sMult, type:'normal', spSpeed: this.sp==='speed' }); 
                }
            } else if (type === 'super') {
                let maxJumpDist = 400; let jumpDist = maxJumpDist;
                if (this.isPlayer) {
                    if (this.autoAimTargetDist !== null && this.autoAimTargetDist !== undefined) {
                        jumpDist = Math.min(this.autoAimTargetDist, maxJumpDist);
                        this.autoAimTargetDist = null;
                    } else {
                        let btn = Input.btns.super;
                        jumpDist = btn.mag * maxJumpDist;
                    }
                } else {
                    if (this.aiTarget) {
                        let d = dist(this.x, this.y, this.aiTarget.x, this.aiTarget.y);
                        jumpDist = Math.min(d, maxJumpDist);
                    }
                }
                let landingSpot = getSafeLandingSpot(this.x, this.y, angle, jumpDist, this.r);
                this.targetX = landingSpot.x; this.targetY = landingSpot.y;
                this.dashTimer = 40; this.invincible = true; this.z = 1;
            } else if (type === 'gadget') {
                if(this.gadget === 'lariat') {
                    this.dashTimer = 15; this.dashVx = Math.cos(angle)*15; this.dashVy = Math.sin(angle)*15; this.lariatDmg = 650 * dmgMult; 
                } else if (this.gadget === 'catch') {
                    let b = new Bullet(this, angle, 16, 300, 150, 20, 'gadget'); 
                    b.pull = true; Game.bullets.push(b);
                }
            }
        }
        else if (this.type === 'gus') {
            if (type === 'normal') {
                let b = new Bullet(this, angle, 16, this.data.range, 2500 * dmgMult, 18, 'normal');
                b.isGusAttack = true;
                let maxGauge = this.sp === 'master' ? 1 : 2;
                if (this.hcActive) this.ghostGauge = maxGauge;
                if (this.ghostGauge >= maxGauge) {
                    b.spawnGhost = true;
                    this.ghostGauge = 0;
                }
                Game.bullets.push(b);
            } else if (type === 'super') {
                this.shield = 6000;
                Game.entities.forEach(e => {
                    if (e !== this && e.hp > 0 && e.team !== this.team && dist(this.x, this.y, e.x, e.y) < 150) {
                        let ang = Math.atan2(e.y - this.y, e.x - this.x);
                        e.x += Math.cos(ang) * 80;
                        e.y += Math.sin(ang) * 80;
                    }
                });
                Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "SHIELD!", '#f1c40f', 20));
            } else if (type === 'gadget') {
                if (this.gadget === 'cracker') {
                    Game.ghosts.forEach(g => {
                        if (g.owner === this) {
                            g.remove = true;
                            Game.entities.forEach(e => {
                                if (e.team !== this.team && e.hp > 0 && dist(g.x, g.y, e.x, e.y) < e.r + 110) {
                                    e.takeDamage(2500 * dmgMult, this);
                                }
                            });
                            for(let i=0; i<15; i++) Game.particles.push(new Particle(g.x, g.y, '#f1c40f', 5, (Math.random()-0.5)*10, (Math.random()-0.5)*10, 20));
                        }
                    });
                } else if (this.gadget === 'summoner') {
                    this.ghostGauge = this.sp === 'master' ? 1 : 2;
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "GAUGE MAX!", '#2ecc71', 16));
                }
            }
        }
        else if (this.type === 'mortis') {
            if (type === 'normal') {
                let rangeMult = 1 + this.longDashGauge * 2; 
                this.longDashGauge = 0;
                let dashDist = 150 * rangeMult;
                this.dashTimer = dashDist / 15;
                this.dashVx = Math.cos(angle) * 15;
                this.dashVy = Math.sin(angle) * 15;
                this.mortisNormalDmg = 1500 * dmgMult;
                this.mortisHitTargets = new Set();
                this.isMortisHCInvincible = this.hcActive;
            } else if (type === 'super') {
                let b = new Bullet(this, angle, 16, 600, 2000 * dmgMult, 30, 'super');
                b.text = "BAT";
                b.pierce = true;
                b.isMortisSuper = true;
                Game.bullets.push(b);
            } else if (type === 'gadget') {
                if (this.gadget === 'spinner') {
                    Game.entities.forEach(e => {
                        if (e !== this && e.team !== this.team && e.hp > 0 && dist(this.x, this.y, e.x, e.y) < this.r * 4 + e.r) {
                            e.takeDamage(3000 * dmgMult, this);
                        }
                    });
                    for (let i = 0; i < Math.PI * 2; i += Math.PI / 4) {
                        Game.particles.push(new Particle(this.x + Math.cos(i)*this.r*2, this.y + Math.sin(i)*this.r*2, '#2c3e50', 8, 0, 0, 15));
                    }
                } else if (this.gadget === 'batmove') {
                    this.dashTimer = 120;
                    this.dashVx = Math.cos(angle) * 8;
                    this.dashVy = Math.sin(angle) * 8;
                    this.invincible = true;
                    this.isBatMove = true;
                }
            }
        }
        else if (this.type === 'sirius') {
            if (type === 'normal') {
                let b = new Bullet(this, angle, 15, this.data.range, 1800 * dmgMult, 12, 'normal');
                b.isSiriusAttack = true;
                b.pierce = true; 
                Game.bullets.push(b);
            } else if (type === 'super') {
                let spawnCount = 0;
                let maxShadowLimit = this.hcActive ? 9 : 6;
                
                let currentShadowCount = Game.entities.filter(e => e.isShadow && e.owner === this).length;
                let availableSlots = maxShadowLimit - currentShadowCount;

                if (availableSlots > 0 && this.recordedBrawlers.length > 0) {
                    for (let i = 0; i < this.recordedBrawlers.length; i++) {
                        if (spawnCount >= availableSlots) break;
                        let targetBrawlerType = this.recordedBrawlers[i];
                        
                        let spawnAngle = angle + (spawnCount * (Math.PI * 2 / 6));
                        let spawnDist = 65;
                        let sSpot = getSafeLandingSpot(this.x, this.y, spawnAngle, spawnDist, 22);

                        let bName = CHAR_DATA[targetBrawlerType] ? CHAR_DATA[targetBrawlerType].name : "謎";
                        let shadow = new ShadowBot(sSpot.x, sSpot.y, targetBrawlerType, bName, this.team, this);
                        Game.entities.push(shadow);

                        for (let k = 0; k < 10; k++) {
                            Game.particles.push(new Particle(sSpot.x, sSpot.y, '#9b59b6', 4, (Math.random()-0.5)*6, (Math.random()-0.5)*6, 20));
                        }
                        spawnCount++;
                    }
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 60, `${spawnCount}体の影を召喚！`, '#9b59b6', 20));
                } else {
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 60, "影を召喚できない (記録不足 / 上限)", '#ff4d4d', 14));
                }

                this.recordedBrawlers = [];
            } else if (type === 'gadget') {
                if (this.gadget === 'novabirth') {
                    let b = new Bullet(this, angle, 20, this.data.range * 1.2, 800 * dmgMult, 22, 'gadget');
                    b.pierce = true;
                    b.isSiriusNova = true; 
                    Game.bullets.push(b);
                } else if (this.gadget === 'deepabyss') {
                    let targets = [];
                    Game.entities.forEach(e => {
                        if (e !== this && e.hp > 0 && e.team !== this.team && !e.isShadow) {
                            targets.push(e);
                        }
                    });
                    
                    targets.sort((a,b) => dist(this.x, this.y, a.x, a.y) - dist(this.x, this.y, b.x, b.y));
                    let count = 0;
                    for (let i = 0; i < Math.min(3, targets.length); i++) {
                        let t = targets[i];
                        this.recordEnemyHit(t, 1); 
                        count++;
                        
                        for (let k = 0; k < 8; k++) {
                            Game.particles.push(new Particle(t.x, t.y, '#4a154b', 3, (Math.random()-0.5)*4, (Math.random()-0.5)*4, 15));
                        }
                    }
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 60, `${count}体に深淵の刻印！`, '#9b59b6', 16));
                }
            }
        }
    }

    recordEnemyHit(enemy, hitCountVal = 1) {
        if (this.type !== 'sirius') return;
        
        let targetType = enemy.type;
        if (!targetType) return;

        let maxCapacity = this.hcActive ? 9 : 3;
        if (this.recordedBrawlers.length >= maxCapacity) {
            return; 
        }

        if (this.hcActive) {
            this.recordedBrawlers.push(targetType);
            Game.uiEffects.push(new FloatingText(this.x, this.y - 55, `記録: ${CHAR_DATA[targetType].name}`, '#9b59b6', 15));
            return;
        }

        if (!this.temporaryRecordGauge[enemy.name]) {
            this.temporaryRecordGauge[enemy.name] = 0;
        }
        
        this.temporaryRecordGauge[enemy.name] += hitCountVal;

        if (this.temporaryRecordGauge[enemy.name] >= 2) {
            this.recordedBrawlers.push(targetType);
            this.temporaryRecordGauge[enemy.name] = 0;
            Game.uiEffects.push(new FloatingText(this.x, this.y - 55, `記録完了: ${CHAR_DATA[targetType].name}`, '#9b59b6', 16));
        } else {
            Game.uiEffects.push(new FloatingText(enemy.x, enemy.y - 45, `記録中...`, '#bdc3c7', 12));
        }
    }

    update() {
        if(this.hp <= 0) return;

        this.lastDamagedTimer += Game.timeScale;
        if(this.lastDamagedTimer > 240 && this.hp < this.maxHp) { 
            let prevSeconds = Math.floor((this.lastDamagedTimer - Game.timeScale) / 60);
            let currSeconds = Math.floor(this.lastDamagedTimer / 60);
            if(currSeconds > prevSeconds) {
                let healAmt = Math.floor(this.maxHp * 0.1);
                this.hp = Math.min(this.maxHp, this.hp + healAmt);
                Game.uiEffects.push(new FloatingText(this.x, this.y - 45, `+${healAmt}`, '#2ecc71', 15));
            }
        }

        if (this.shield > 0) {
            this.shield -= (600 / 60) * Game.timeScale;
            if (this.shield < 0) this.shield = 0;
        }

        if (this.type === 'mortis') {
            if (this.ammo >= this.maxAmmo) {
                let chargeTime = this.sp === 'longdash' ? 90 : 180;
                this.longDashGauge = Math.min(1, this.longDashGauge + Game.timeScale / chargeTime);
            } else {
                this.longDashGauge = 0;
            }
        }

        // シリウス専用必殺技自動急速チャージ
        if (this.type === 'sirius' && this.superCharge < this.maxSuperCharge) {
            this.superCharge = Math.min(this.maxSuperCharge, this.superCharge + 1.0 * Game.timeScale);
        }

        for(let i=this.effects.length-1; i>=0; i--) {
            this.effects[i].time -= Game.timeScale;
            if(this.effects[i].time <= 0) this.effects.splice(i, 1);
        }
        if(this.gadgetCooldown > 0) this.gadgetCooldown = Math.max(0, this.gadgetCooldown - Game.timeScale);
        if(this.hcTimer > 0) { 
            this.hcTimer = Math.max(0, this.hcTimer - Game.timeScale); 
            if(this.hcTimer <= 0) {
                this.hcActive = false; 
                if (this.type === 'sirius') {
                    let shadows = Game.entities.filter(e => e.isShadow && e.owner === this && e.hp > 0);
                    if (shadows.length > 0) {
                        shadows.sort((a,b) => a.hp - b.hp);
                        let removeTargetCount = Math.min(3, shadows.length);
                        for (let k = 0; k < removeTargetCount; k++) {
                            shadows[k].remove = true;
                            for(let p=0; p<10; p++) Game.particles.push(new Particle(shadows[k].x, shadows[k].y, '#4a154b', 3, (Math.random()-0.5)*5, (Math.random()-0.5)*5, 15));
                        }
                        Game.uiEffects.push(new FloatingText(this.x, this.y - 60, "HC終了: 影が3体消滅", '#e74c3c', 14));
                    }
                }
            } 
        }

        let curReload = this.reloadTime;
        if(this.type === 'shelly' && this.hcActive) curReload /= 3;
        if(this.ammo < this.maxAmmo) {
            this.reloadTimer += Game.timeScale;
            if(this.reloadTimer >= curReload) { this.ammo++; this.reloadTimer = 0; }
        } else { this.reloadTimer = 0; }

        for(let i=this.fireQueue.length-1; i>=0; i--) {
            let f = this.fireQueue[i];
            f.delay -= Game.timeScale;
            if(f.delay <= 0) {
                let b = new Bullet(this, f.angle, f.speed, f.range, f.dmg, f.size, f.type);
                if(f.pierce) b.pierce = true; if(f.wallBreak) b.wallBreak = true;
                if(f.spSpeed) b.onHit = () => { this.effects.push({type:'speed', time:180}); };
                if(f.hcColt) b.hcColt = true;
                Game.bullets.push(b); this.fireQueue.splice(i, 1);
            }
        }

        let dx=0, dy=0;
        if(this.dashTimer > 0) {
            this.dashTimer = Math.max(0, this.dashTimer - Game.timeScale);
            if(this.z > 0) { 
                this.x += ((this.targetX - this.x) / (this.dashTimer+1)) * Game.timeScale;
                this.y += ((this.targetY - this.y) / (this.dashTimer+1)) * Game.timeScale;
                this.z = Math.sin((1 - this.dashTimer/40) * Math.PI) * 120; 
                if(this.dashTimer <= 0) {
                    this.z = 0; this.invincible = false;
                    let r = this.sp === 'shock' ? 140 : 100;
                    Game.entities.forEach(e => {
                        if(e !== this && e.hp > 0 && e.team !== this.team && dist(this.x, this.y, e.x, e.y) < r) {
                            e.takeDamage(1000 * (this.hcActive?1.25:1), this); 
                            if (this.type !== 'primo') {
                                let kbDist = 60; 
                                let ang = Math.atan2(e.y - this.y, e.x - this.x);
                                let subStep = 2;
                                for (let s = 0; s < kbDist; s += subStep) {
                                    let nextX = e.x + Math.cos(ang) * subStep;
                                    let nextY = e.y + Math.sin(ang) * subStep;
                                    let colX = false, colY = false;
                                    for (let w of Game.map) {
                                        if (circleRectCollide(nextX, e.y, e.r, w.x, w.y, w.w, w.h)) colX = true;
                                        if (circleRectCollide(e.x, nextY, e.r, w.x, w.y, w.w, w.h)) colY = true;
                                    }
                                    const margin = 25;
                                    if(nextX - e.r < margin || nextX + e.r > Game.mapW - margin) colX = true;
                                    if(nextY - e.r < margin || nextY + e.r > Game.mapH - margin) colY = true;
                                    if (!colX) e.x = nextX;
                                    if (!colY) e.y = nextY;
                                    if (colX && colY) break;
                                }
                            }
                        }
                    });
                    for(let i=0; i<20; i++) Game.particles.push(new Particle(this.x, this.y, '#95a5a6', Math.random()*8+4, (Math.random()-0.5)*15, (Math.random()-0.5)*15, 20));
                }
            } else { 
                dx = this.dashVx * Game.timeScale; dy = this.dashVy * Game.timeScale;
                if(this.gadget === 'lariat' && this.lariatDmg) {
                    Game.entities.forEach(e => {
                        if(e !== this && e.hp > 0 && e.team !== this.team && dist(this.x, this.y, e.x, e.y) < this.r + e.r) {
                            e.takeDamage(this.lariatDmg, this); this.lariatDmg = 0;
                        }
                    });
                }
                
                if (this.type === 'mortis' && this.mortisNormalDmg) {
                    if (this.isMortisHCInvincible) this.invincible = true;
                    Game.entities.forEach(e => {
                        if (e !== this && e.team !== this.team && e.hp > 0 && !this.mortisHitTargets.has(e)) {
                            if (dist(this.x, this.y, e.x, e.y) < this.r + e.r + 30) {
                                e.takeDamage(this.mortisNormalDmg, this);
                                this.mortisHitTargets.add(e);
                                if (this.sp === 'vampire') {
                                    this.hp = Math.min(this.maxHp, this.hp + 500);
                                    Game.uiEffects.push(new FloatingText(this.x, this.y - 45, "+500", '#2ecc71', 15));
                                }
                                this.chargeSuper(this.mortisNormalDmg * 0.05);
                            }
                        }
                    });
                }

                if(this.dashTimer <= 0) {
                    if (this.type === 'mortis') {
                        this.mortisNormalDmg = 0;
                        if (this.isMortisHCInvincible || this.isBatMove) {
                            this.invincible = false;
                        }
                        this.isBatMove = false;
                    }
                }
            }
        } else {
            if(this.isPlayer) {
                if(Input.leftJoy.active) {
                    let speed = this.getSpeed() * Input.leftJoy.mag;
                    dx = Input.leftJoy.nx * speed * Game.timeScale; dy = Input.leftJoy.ny * speed * Game.timeScale;
                    if(Input.leftJoy.mag > 0.1) this.facing = Math.atan2(dy, dx);
                }
            } else {
                this.updateBotAI();
                if(this.aiMoving) {
                    let speed = this.getSpeed();
                    dx = Math.cos(this.moveAng) * speed * Game.timeScale; dy = Math.sin(this.moveAng) * speed * Game.timeScale;
                    this.facing = this.moveAng;
                }
            }
        }

        if(this.z === 0) {
            let newX = this.x + dx, newY = this.y + dy;
            let colX = false, colY = false;
            
            for(let w of Game.map) {
                if(circleRectCollide(newX, this.y, this.r, w.x, w.y, w.w, w.h)) colX = true;
                if(circleRectCollide(this.x, newY, this.r, w.x, w.y, w.w, w.h)) colY = true;
            }

            const margin = 25;
            if(newX - this.r < margin || newX + this.r > Game.mapW - margin) colX = true;
            if(newY - this.r < margin || newY + this.r > Game.mapH - margin) colY = true;

            if(!colX) this.x = newX; 
            if(!colY) this.y = newY;
            
            this.x = Math.max(margin + this.r, Math.min(this.x, Game.mapW - margin - this.r));
            this.y = Math.max(margin + this.r, Math.min(this.y, Game.mapH - margin - this.r));

            if((dx!==0 || dy!==0) && Math.random()<0.2 * Game.timeScale) Game.particles.push(new Particle(this.x, this.y+10, '#ecf0f1', 3, 0, 0, 15));
        }

        for(let i=Game.items.length-1; i>=0; i--) {
            let it = Game.items[i];
            if(!this.isShadow && dist(this.x, this.y, it.x, it.y) < this.r + it.r) {
                if(it.type === 'gem') { this.gems++; Game.items.splice(i, 1); }
                else if(it.type === 'cube') {
                    this.cubes++; this.maxHp += 400; this.hp += 400; Game.items.splice(i, 1);
                    Game.uiEffects.push(new FloatingText(this.x, this.y-30, "+Power", '#2ecc71', 16));
                }
            }
        }
    }

    updateBotAI() {
        this.aiTimer -= Game.timeScale;
        
        if(dist(this.x, this.y, this.lastX, this.lastY) < 0.2 && this.aiMoving) {
            this.stuckTimer += Game.timeScale;
        } else {
            this.stuckTimer = 0;
        }
        this.lastX = this.x; this.lastY = this.y;

        if(this.aiTimer <= 0) {
            this.aiTimer = 10; 

            let closestEnemy = Game.findClosestEnemy(this, 1200);
            let closestItem = null;
            let minDistItem = Infinity;
            
            if(Game.mode === 'gemgrab' || Game.mode === 'showdown') {
                Game.items.forEach(it => {
                    let d = dist(this.x, this.y, it.x, it.y);
                    if(d < minDistItem) { minDistItem = d; closestItem = it; }
                });
            }

            let distToEne = closestEnemy ? dist(this.x, this.y, closestEnemy.x, closestEnemy.y) : Infinity;

            let distToCenter = dist(this.x, this.y, Game.mapW / 2, Game.mapH / 2);
            let nearPoison = (Game.mode === 'showdown' && distToCenter > Game.poisonRadius - 220);

            if (nearPoison) {
                this.aiState = 'escape_poison';
            } else if(this.hp < this.maxHp * 0.45) {
                this.aiState = 'heal'; 
            } else if(this.hp >= this.maxHp * 0.85) {
                this.aiState = 'fight'; 
            }

            let targetAng = 0;
            let hasTarget = false;

            if(this.stuckTimer > 15) {
                this.moveAng = this.facing + Math.PI/2 + (Math.random()-0.5);
                this.aiMoving = true;
                this.aiTimer = 30; 
                this.stuckTimer = 0;
                return;
            }

            if (this.aiState === 'escape_poison') {
                targetAng = Math.atan2(Game.mapH/2 - this.y, Game.mapW/2 - this.x);
                hasTarget = true;
            } else if (this.aiState === 'heal') {
                if (closestEnemy) {
                    targetAng = Math.atan2(this.y - closestEnemy.y, this.x - closestEnemy.x); 
                } else {
                    targetAng = Math.atan2(Game.mapH/2 - this.y, Game.mapW/2 - this.x);
                }
                hasTarget = true;
            } else {
                if(closestItem && (minDistItem < 300 || !closestEnemy)) {
                    targetAng = Math.atan2(closestItem.y - this.y, closestItem.x - this.x);
                    hasTarget = true;
                } else if (closestEnemy) {
                    let idealDist = this.type === 'primo' || this.type === 'mortis' ? 60 : (this.type === 'shelly' ? 180 : 330);
                    let angToEne = Math.atan2(closestEnemy.y - this.y, closestEnemy.x - this.x);
                    
                    if(distToEne > idealDist + 40) {
                        targetAng = angToEne; 
                    } else if(distToEne < idealDist - 40 && this.type !== 'primo' && this.type !== 'mortis') {
                        targetAng = angToEne + Math.PI; 
                    } else {
                        targetAng = angToEne + (this.stuckTimer > 0 ? Math.PI/2 : (Math.random() > 0.5 ? Math.PI/2 : -Math.PI/2)); 
                    }
                    hasTarget = true;
                }
            }

            if (hasTarget) {
                let lookAheadX = this.x + Math.cos(targetAng) * 60;
                let lookAheadY = this.y + Math.sin(targetAng) * 60;
                for (let w of Game.map) {
                    if (circleRectCollide(lookAheadX, lookAheadY, this.r + 5, w.x, w.y, w.w, w.h)) {
                        targetAng += (this.x < w.x + w.w/2) ? -Math.PI/3 : Math.PI/3;
                        break;
                    }
                }
                this.moveAng = targetAng;
                this.aiMoving = true;
            } else {
                this.moveAng = Math.atan2(Game.mapH/2 - this.y, Game.mapW/2 - this.x);
                this.aiMoving = true;
            }

            if(closestEnemy && this.aiState !== 'heal' && this.aiState !== 'escape_poison' && distToEne <= this.data.range * 1.15) {
                let angToEne = Math.atan2(closestEnemy.y - this.y, closestEnemy.x - this.x);
                this.facing = angToEne;

                let wallInWay = false;
                for(let w of Game.map) {
                    if(lineRectCollide(this.x, this.y, closestEnemy.x, closestEnemy.y, w.x, w.y, w.w, w.h)) {
                        wallInWay = true; break;
                    }
                }

                if((!wallInWay || this.type === 'primo' || this.type === 'mortis' || this.type === 'sirius' || this.superCharge >= this.maxSuperCharge) && this.ammo >= 1) {
                    if(this.hcCharge >= this.maxHcCharge && distToEne < this.data.range * 0.9) {
                        this.activateHC();
                    }
                    else if(this.superCharge >= this.maxSuperCharge) {
                        if(this.type === 'primo' && distToEne < 380) {
                            this.requestAttack(angToEne, 'super');
                        } else if (this.type === 'gus' && this.hp < this.maxHp * 0.5) { 
                            this.requestAttack(angToEne, 'super');
                        } else if (this.type === 'mortis' && distToEne < 600) {
                            this.requestAttack(angToEne, 'super');
                        } else if (this.type === 'sirius') {
                            if (this.recordedBrawlers.length > 0) {
                                this.requestAttack(angToEne, 'super');
                            }
                        } else if(distToEne < this.data.range && this.type !== 'gus' && this.type !== 'mortis') {
                            this.requestAttack(angToEne, 'super');
                        }
                    } 
                    else if(this.gadgetCooldown <= 0 && Math.random() < 0.25) {
                        if(this.type === 'shelly') {
                            if(this.gadget === 'dash' && distToEne < 160) this.requestAttack(angToEne, 'gadget'); 
                            else if(this.gadget === 'sharp' && distToEne > 220) this.requestAttack(angToEne, 'gadget'); 
                        } else if(this.type === 'colt') {
                            if(this.gadget === 'one' && !wallInWay) this.requestAttack(angToEne, 'gadget'); 
                            else if(this.gadget === 'slow' && wallInWay) this.requestAttack(angToEne, 'gadget'); 
                        } else if(this.type === 'primo') {
                            if(this.gadget === 'lariat' && distToEne > 100 && distToEne < 220) this.requestAttack(angToEne, 'gadget'); 
                            else if(this.gadget === 'catch' && distToEne > 150) this.requestAttack(angToEne, 'gadget'); 
                        } else if (this.type === 'gus') {
                            if (this.gadget === 'cracker' && Game.ghosts.some(g => g.owner===this && dist(g.x,g.y,closestEnemy.x,closestEnemy.y)<110)) {
                                this.requestAttack(angToEne, 'gadget');
                            } else if (this.gadget === 'summoner' && this.ghostGauge === 0) {
                                this.requestAttack(angToEne, 'gadget');
                            }
                        } else if (this.type === 'mortis') {
                            if (this.gadget === 'spinner' && distToEne < this.r*2) {
                                this.requestAttack(angToEne, 'gadget');
                            } else if (this.gadget === 'batmove' && this.hp < this.maxHp * 0.3) {
                                this.requestAttack(angToEne + Math.PI, 'gadget');
                            }
                        } else if (this.type === 'sirius') {
                            if (this.gadget === 'novabirth' && !wallInWay) {
                                this.requestAttack(angToEne, 'gadget');
                            } else if (this.gadget === 'deepabyss') {
                                this.requestAttack(angToEne, 'gadget');
                            }
                        }
                    }
                    else if(Math.random() < 0.7) {
                        this.requestAttack(angToEne, 'normal');
                    }
                }
            }
        }
    }

    draw(ctx) {
        if(this.hp <= 0 && this.z === 0) return;
        
        ctx.save(); ctx.translate(this.x, this.y - this.z);
        
        if(this.z === 0) {
            ctx.beginPath();
            ctx.ellipse(0, 20, 25, 10, 0, 0, Math.PI*2);
            if (this.isPlayer) {
                ctx.fillStyle = 'rgba(46, 204, 113, 0.4)'; 
            } else if (Game.mode !== 'showdown' && this.team === 1) {
                ctx.fillStyle = 'rgba(52, 152, 219, 0.4)';  
            } else {
                ctx.fillStyle = 'rgba(231, 76, 60, 0.4)';   
            }
            ctx.fill();
        }

        if (this.invincible) {
            ctx.save(); ctx.beginPath(); ctx.arc(0, 0, this.r + 10, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)'; ctx.lineWidth = 3.5; ctx.stroke();
            ctx.restore();
        }

        if(this.hcActive) {
            ctx.beginPath(); ctx.arc(0, 0, this.r+10, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(155, 89, 182, 0.4)'; ctx.fill();
            if(Math.random()<0.3) Game.particles.push(new Particle(this.x+(Math.random()-0.5)*30, this.y-this.z+(Math.random()-0.5)*30, '#9b59b6', 4, 0, -2, 15));
        }
        if(this.invincible) ctx.globalAlpha = 0.55;

        ctx.save();
        ctx.rotate(this.facing);
        
        ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2);
        ctx.fillStyle = this.data.color; ctx.fill();
        ctx.lineWidth = 3; ctx.strokeStyle = '#1e272e'; ctx.stroke();
        
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(8, -6, 5, 0, Math.PI*2); ctx.arc(8, 6, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(10, -6, 2, 0, Math.PI*2); ctx.arc(10, 6, 2, 0, Math.PI*2); ctx.fill();
        
        if(this.type === 'shelly') {
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(10, 4, 20, 6); 
            ctx.fillStyle = '#8e44ad'; ctx.beginPath(); ctx.arc(-5, 0, 18, Math.PI/2, Math.PI*1.5); ctx.fill(); 
        } else if (this.type === 'colt') {
            ctx.fillStyle = '#95a5a6'; ctx.fillRect(10, -12, 15, 5); ctx.fillRect(10, 7, 15, 5); 
            ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.arc(-5, 0, 16, Math.PI/2, Math.PI*1.5); ctx.fill(); 
        } else if (this.type === 'primo') {
            ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.arc(8, 0, 4, 0, Math.PI*2); ctx.fill(); 
        } else if (this.type === 'gus') {
            ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(-5, -5, 10, 0, Math.PI*2); ctx.fill();
        } else if (this.type === 'mortis') {
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(10, -2, 25, 4); 
            ctx.fillStyle = '#1e272e'; ctx.beginPath(); ctx.arc(0, 0, 18, Math.PI/2, Math.PI*1.5); ctx.fill(); 
        } else if (this.type === 'sirius') {
            ctx.fillStyle = '#2c1a30'; ctx.beginPath(); ctx.arc(-6, 0, 19, Math.PI/2, Math.PI*1.5); ctx.fill();
            ctx.fillStyle = '#bdc3c7'; ctx.fillRect(11, -3, 14, 6); 
            ctx.fillStyle = '#8e44ad'; ctx.beginPath(); ctx.arc(22, 0, 6, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();

        ctx.globalAlpha = 1.0;
        let barW = 50;
        
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Nunito'; ctx.textAlign = 'center';
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.strokeText(this.name, 0, -35); ctx.fillText(this.name, 0, -35);
        
        ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -28, barW, 8);
        ctx.fillStyle = (this.isPlayer || (Game.mode !== 'showdown' && this.team === 1)) ? '#2ecc71' : '#e74c3c';
        ctx.fillRect(-barW/2, -28, barW * (this.hp/this.maxHp), 8);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(-barW/2, -28, barW, 8);
        
        let aRatio = this.ammo / this.maxAmmo;
        if(this.ammo < this.maxAmmo) aRatio += (this.reloadTimer / (this.type==='shelly'&&this.hcActive?this.reloadTime/3:this.reloadTime)) * (1/this.maxAmmo);
        ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -18, barW, 4);
        ctx.fillStyle = '#f39c12'; ctx.fillRect(-barW/2, -18, barW * aRatio, 4);

        if (this.type === 'gus') {
            let maxGauge = this.sp === 'master' ? 1 : 2;
            ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -13, barW, 4);
            ctx.fillStyle = '#bdc3c7'; ctx.fillRect(-barW/2, -13, barW * (this.ghostGauge / maxGauge), 4);
            
            if (this.shield > 0) {
                ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -33, barW, 4);
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(-barW/2, -33, barW * (this.shield / 6000), 4);
            }
        } else if (this.type === 'mortis') {
            ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -13, barW, 4);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(-barW/2, -13, barW * this.longDashGauge, 4);
        } else if (this.type === 'sirius') {
            ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -13, barW, 4);
            let limit = this.hcActive ? 9 : 3;
            let ratio = this.recordedBrawlers.length / limit;
            ctx.fillStyle = '#9b59b6'; ctx.fillRect(-barW/2, -13, barW * ratio, 4);
            
            if (this.recordedBrawlers.length > 0) {
                ctx.fillStyle = '#e0b0ff'; ctx.font = 'bold 9px Nunito';
                ctx.strokeText(`👻x${this.recordedBrawlers.length}`, 0, -48);
                ctx.fillText(`👻x${this.recordedBrawlers.length}`, 0, -48);
            }
        }

        if(this.gems > 0 || this.cubes > 0) {
            ctx.fillStyle = this.gems > 0 ? '#9b59b6' : '#2ecc71';
            ctx.font = '900 16px Nunito';
            let txt = this.gems > 0 ? `💎${this.gems}` : `🟩${this.cubes}`;
            ctx.strokeText(txt, 0, -56); ctx.fillText(txt, 0, -56);
        }
        
        ctx.restore();
    }
}

class Bullet extends Entity {
    constructor(owner, angle, speed, range, dmg, size, type) {
        super(owner.x, owner.y, size);
        this.owner = owner; this.angle = angle;
        this.vx = Math.cos(angle)*speed; this.vy = Math.sin(angle)*speed;
        this.range = range; this.dmg = dmg; this.type = type;
        this.traveled = 0; this.pierce = false; this.wallBreak = false;
