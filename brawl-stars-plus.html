        this.pull = false; this.knockback = 0; this.effects = [];
        this.hcColt = false; this.hitTargets = new Set();
    }
    update() {
        let dx = this.vx * Game.timeScale;
        let dy = this.vy * Game.timeScale;
        this.x += dx; this.y += dy;
        let step = Math.hypot(dx, dy);
        this.traveled += step;
        
        if(this.hcColt) this.r += 0.3 * Game.timeScale;
        
        if(Math.random()<0.5 * Game.timeScale) Game.particles.push(new Particle(this.x, this.y, this.type==='super'?'#f1c40f':'#ff7675', this.r*0.5, 0,0, 10));

        if(this.traveled >= this.range) this.remove = true;
        
        if(!this.pierce) {
            for(let i=Game.map.length-1; i>=0; i--) {
                let w = Game.map[i];
                if(circleRectCollide(this.x, this.y, this.r, w.x, w.y, w.w, w.h)) {
                    if(this.wallBreak) {
                        Game.map.splice(i, 1);
                        for(let k=0; k<10; k++) Game.particles.push(new Particle(this.x, this.y, '#7f8c8d', 5, (Math.random()-0.5)*5, (Math.random()-0.5)*5, 20));
                    } else {
                        this.remove = true; break;
                    }
                }
            }
        }
        
        if(!this.remove) {
            Game.entities.forEach(e => {
                if(e !== this.owner && e.hp > 0 && e.team !== this.owner.team && e.z === 0) {
                    if(!this.hitTargets.has(e) && dist(this.x, this.y, e.x, e.y) < this.r + e.r) {
                        e.takeDamage(this.dmg, this.owner);
                        
                        if (this.isSiriusAttack && !e.isShadow) {
                            this.owner.recordEnemyHit(e, 1);
                        }

                        if (this.isSiriusNova && !e.isShadow) {
                            let bName = CHAR_DATA[e.type] ? CHAR_DATA[e.type].name : "謎";
                            let currentShadowCount = Game.entities.filter(sh => sh.isShadow && sh.owner === this.owner).length;
                            let maxShadowLimit = this.owner.hcActive ? 9 : 6;
                            if (currentShadowCount < maxShadowLimit) {
                                let shadow = new ShadowBot(e.x + (Math.random()-0.5)*30, e.y + (Math.random()-0.5)*30, e.type, bName, this.owner.team, this.owner);
                                Game.entities.push(shadow);
                                Game.uiEffects.push(new FloatingText(e.x, e.y - 60, `新星召喚: 影${bName}`, '#9b59b6', 15));
                            }
                        }

                        if (!this.isGhostAttack && !this.isShadowAttack) {
                            let superChargeMult = 1.0;
                            if (this.owner.type === 'sirius') {
                                superChargeMult = 0;
                                this.owner.hcCharge = Math.min(this.owner.maxHcCharge, this.owner.hcCharge + this.dmg * 0.015);
                            }
                            this.owner.chargeSuper(this.dmg * 0.05 * superChargeMult);
                        }
                        
                        if (this.isGusAttack && !this.isGhostAttack && !this.isShadowAttack) {
                            if (this.spawnGhost) {
                                Game.ghosts.push(new Ghost(e.x, e.y, this.owner));
                            } else {
                                let maxGauge = this.owner.sp === 'master' ? 1 : 2;
                                this.owner.ghostGauge = Math.min(maxGauge, this.owner.ghostGauge + 1);
                            }
                        }

                        if (this.isMortisSuper) {
                            this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + this.dmg);
                            Game.uiEffects.push(new FloatingText(this.owner.x, this.owner.y - 45, `+${this.dmg}`, '#2ecc71', 15));
                        }
                        
                        if (this.owner.isPlayer && navigator.vibrate) {
                            navigator.vibrate(30);
                        }
                        
                        for(let k=0; k<8; k++) Game.particles.push(new Particle(e.x, e.y, '#f39c12', 4, (Math.random()-0.5)*8, (Math.random()-0.5)*8, 15));

                        if(this.onHit) this.onHit();
                        this.effects.forEach(eff => e.effects.push({...eff}));
                        
                        if(this.knockback > 0) { e.x += Math.cos(this.angle)*this.knockback; e.y += Math.sin(this.angle)*this.knockback; }
                        if(this.pull) { e.x += (this.owner.x - e.x)*0.5; e.y += (this.owner.y - e.y)*0.5; }
                        
                        if(!this.pull && !this.pierce) this.remove = true;
                        else this.hitTargets.add(e);
                    }
                }
            });
        }
    }
    draw(ctx) {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        if(this.type === 'super') ctx.fillStyle = '#f1c40f';
        else if(this.type === 'gadget') ctx.fillStyle = '#2ecc71';
        else if (this.isSiriusAttack) ctx.fillStyle = '#bd76ff'; 
        else ctx.fillStyle = (this.owner.isPlayer || (Game.mode !== 'showdown' && this.owner.team === 1)) ? '#3498db' : '#e74c3c';
        ctx.fill();
    }
}

class Item extends Entity {
    constructor(x, y, type) { super(x, y, 15); this.type = type; this.anim = Math.random()*Math.PI; }
    update() { 
        this.anim += 0.08 * Game.timeScale; 
        
        for (let w of Game.map) {
            if (circleRectCollide(this.x, this.y, this.r, w.x, w.y, w.w, w.h)) {
                let leftDist = this.x - w.x;
                let rightDist = (w.x + w.w) - this.x;
                let topDist = this.y - w.y;
                let bottomDist = (w.y + w.h) - this.y;
                
                let minDist = Math.min(leftDist, rightDist, topDist, bottomDist);
                if (minDist === leftDist) {
                    this.x = w.x - this.r - 2;
                } else if (minDist === rightDist) {
                    this.x = w.x + w.w + this.r + 2;
                } else if (minDist === topDist) {
                    this.y = w.y - this.r - 2;
                } else {
                    this.y = w.y + w.h + this.r + 2;
                }
            }
        }
        
        const margin = 25;
        this.x = Math.max(margin + this.r, Math.min(this.x, Game.mapW - margin - this.r));
        this.y = Math.max(margin + this.r, Math.min(this.y, Game.mapH - margin - this.r));
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y + Math.sin(this.anim)*8);
        if(this.type === 'gem') {
            ctx.fillStyle = '#9b59b6'; ctx.beginPath();
            ctx.moveTo(0, -15); ctx.lineTo(15, 0); ctx.lineTo(0, 15); ctx.lineTo(-15, 0); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth=2; ctx.stroke();
        } else {
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(-12, -12, 24, 24);
            ctx.strokeStyle = '#fff'; ctx.lineWidth=3; ctx.strokeRect(-12, -12, 24, 24);
            ctx.fillStyle='#fff'; ctx.fillRect(-4,-4,8,8);
        }
        ctx.restore();
    }
}


/** ==========================================
 * ゲーム管理
 * ========================================== */
let player = null;
const Game = {
    state: 'menu', mode: 'gemgrab', mapW: 2000, mapH: 1600, 
    entities: [], bullets: [], items: [], ghosts: [], particles: [], uiEffects: [], map: [],
    score: { t1: 0, t2: 0, cd: -1 }, gemTimer: 0, poisonRadius: 2000,
    
    spectateX: 0, spectateY: 0,
    
    koRound: 1,
    koWinsT1: 0,
    koWinsT2: 0,
    koRoundOverTimer: 0,
    koRestarting: false,
    
    globalStats: {},
    
    lastTime: 0,
    timeScale: 1.0, 

    init(mode, charType) {
        this.mode = mode; this.state = 'playing';
        this.entities=[]; this.bullets=[]; this.items=[]; this.ghosts=[]; this.particles=[]; this.uiEffects=[]; this.map=[];
        this.score = { t1: 0, t2: 0, cd: -1 };
        this.spectateX = 0; this.spectateY = 0;
        
        this.globalStats = {};
        this.lastTime = performance.now();
        this.timeScale = 1.0;
        
        this.koRound = 1;
        this.koWinsT1 = 0;
        this.koWinsT2 = 0;
        this.koRoundOverTimer = 0;
        this.koRestarting = false;
        
        if(mode === 'showdown') { this.mapW=3200; this.mapH=3200; this.poisonRadius=2400; }
        else { this.mapW=2000; this.mapH=1600; }
        
        this.generateMap();
        this.setupRound(charType);
        
        document.getElementById('uiLayer').style.display = 'block';
        document.getElementById('kill-log').innerHTML = '';
        document.getElementById('resultsScreen').style.display = 'none';
    },
    
    setupRound(playerCharType) {
        this.entities.forEach(e => {
            if (!this.globalStats[e.name]) {
                this.globalStats[e.name] = { kills: e.kills, deaths: e.deaths, brawler: e.data.name, team: e.team };
            } else {
                this.globalStats[e.name].kills = e.kills;
                this.globalStats[e.name].deaths = e.deaths;
            }
        });

        this.entities = [];
        this.bullets = [];
        this.items = [];
        this.ghosts = [];
        
        let pSpawn = this.getSpawn(1);
        
        let prevKills = player ? player.kills : 0;
        let prevDeaths = player ? player.deaths : 0;
        player = new Character(playerCharType, true, 1, pSpawn.x, pSpawn.y);
        player.kills = prevKills;
        player.deaths = prevDeaths;
        this.entities.push(player);
        this.spectateX = player.x;
        this.spectateY = player.y;
        
        let botCount = this.mode === 'showdown' ? 11 : 5;
        let keys = Object.keys(CHAR_DATA);
        for(let i=0; i<botCount; i++) {
            let team = this.mode === 'showdown' ? i+2 : (i<2 ? 1 : 2);
            let spawn = this.getSpawn(team);
            this.entities.push(new Character(keys[Math.floor(Math.random()*keys.length)], false, team, spawn.x, spawn.y));
        }
    },
    
    generateMap() {
        let mw = this.mapW, mh = this.mapH; let bs = 60;
        this.map = [];
        this.map.push({x: mw/2 - bs*2, y: mh/2 - bs, w: bs*4, h: bs*2}); 
        this.map.push({x: mw/4, y: mh/4, w: bs*1.5, h: bs*3});
        this.map.push({x: mw*3/4 - bs*1.5, y: mh*3/4 - bs*3, w: bs*1.5, h: bs*3});
        this.map.push({x: mw/2 - bs, y: bs*2, w: bs*2, h: bs});
        this.map.push({x: mw/2 - bs, y: mh - bs*3, w: bs*2, h: bs});
    },
    
    getSpawn(team) {
        if(this.mode === 'showdown') return { x: 300+Math.random()*(this.mapW-600), y: 300+Math.random()*(this.mapH-600) };
        if(team === 1) return { x: 250+Math.random()*150, y: this.mapH/2 + (Math.random()-0.5)*500 };
        return { x: this.mapW - 400+Math.random()*150, y: this.mapH/2 + (Math.random()-0.5)*500 };
    },

    findClosestEnemy(source, maxDist) {
        let closest = null; let minDist = maxDist;
        this.entities.forEach(e => {
            if(e !== source && e.hp > 0 && e.team !== source.team) {
                let d = dist(source.x, source.y, e.x, e.y);
                if(d < minDist) { minDist = d; closest = e; }
            }
        });
        return closest;
    },
    
    update() {
        if(this.state !== 'playing') return;
        
        if(this.mode === 'gemgrab') {
            this.gemTimer += this.timeScale;
            if(this.gemTimer > 300) {
                this.items.push(new Item(this.mapW/2+(Math.random()-0.5)*60, this.mapH/2+(Math.random()-0.5)*60, 'gem'));
                this.gemTimer = 0;
            }
            
            let t1g = this.entities.filter(e=>e.team===1 && !e.isShadow).reduce((a,b)=>a+(b.gems || 0), 0);
            let t2g = this.entities.filter(e=>e.team===2 && !e.isShadow).reduce((a,b)=>a+(b.gems || 0), 0);
            
            if(t1g >= 10 || t2g >= 10) {
                if(this.score.cd < 0) this.score.cd = 15 * 60; else this.score.cd -= this.timeScale;
                if(this.score.cd <= 0) this.end(t1g > t2g ? 1 : 2);
            } else { this.score.cd = -1; }
            this.updateHUD(`🔵 ${t1g} - 🔴 ${t2g}${this.score.cd>0 ? ` <span style="color:#f1c40f;font-size:1rem;">(⏳${Math.ceil(this.score.cd/60)})</span>` : ''}`);
        }
        else if (this.mode === 'wipeout') {
            if(this.score.t1 >= 10) this.end(1); else if(this.score.t2 >= 10) this.end(2);
            this.updateHUD(`🔵 ${this.score.t1} - 🔴 ${this.score.t2} <span style="font-size:1rem;">/ 10</span>`);
        }
        else if (this.mode === 'knockout') {
            let t1Alive = this.entities.filter(e=>e.team===1 && e.hp>0);
            let t2Alive = this.entities.filter(e=>e.team===2 && e.hp>0);
            
            let t1Icons = t1Alive.map(e => e.isPlayer ? '⭐' : '🔵').join(' ');
            let t2Icons = t2Alive.map(e => '🔴').join(' ');
            if (t1Alive.length === 0) t1Icons = '❌全滅';
            if (t2Alive.length === 0) t2Icons = '❌全滅';
            
            this.updateHUD(
                `<div style="font-size:1rem; color:#aaa; margin-bottom:2px;">ラウンド ${this.koRound} / 3</div>` +
                `<div style="display:flex; justify-content:space-between; gap:20px; font-size:1.1rem;">` +
                `<span>味方: ${t1Icons} (${t1Alive.length})</span>` +
                `<span style="color:#f1c40f;">${this.koWinsT1} 🏆 ${this.koWinsT2}</span>` +
                `<span>敵: (${t2Alive.length}) ${t2Icons}</span>` +
                `</div>`
            );
            
            if (!this.koRestarting) {
                if (t1Alive.length === 0 || t2Alive.length === 0) {
                    this.koRestarting = true;
                    this.koRoundOverTimer = 180; 
                    
                    let roundWinner = t1Alive.length > 0 ? 1 : 2;
                    if (roundWinner === 1) this.koWinsT1++;
                    else this.koWinsT2++;
                }
            } else {
                this.koRoundOverTimer -= this.timeScale;
                if (this.koRoundOverTimer <= 0) {
                    this.koRestarting = false;
                    
                    if (this.koWinsT1 >= 2) {
                        this.end(1);
                    } else if (this.koWinsT2 >= 2) {
                        this.end(2);
                    } else {
                        this.koRound++;
                        this.setupRound(player.type); 
                        Game.uiEffects.push(new FloatingText(this.mapW/2, this.mapH/2, `ラウンド ${this.koRound}!`, '#f1c40f', 32));
                    }
                }
            }
        }
        else if (this.mode === 'showdown') {
            this.poisonRadius -= 0.25 * this.timeScale;
            let alive = 0, last = null;
            this.entities.forEach(e => {
                if(e.hp>0) {
                    alive++; last = e;
                    if(dist(e.x, e.y, this.mapW/2, this.mapH/2) > this.poisonRadius) {
                        if(Math.random()<0.05 * this.timeScale) {
                            e.takeDamage(1000, null);
                            this.uiEffects.push(new FloatingText(e.x, e.y-40, "POISON", '#2ecc71', 14));
                        }
                    }
                }
            });
            if(alive <= 1) this.end(last ? last.team : 0);
            this.updateHUD(`🏆 残り: ${alive}`);
        }

        this.entities.forEach(e => e.update());
        this.bullets.forEach(b => b.update());
        this.items.forEach(i => i.update());
        this.ghosts.forEach(g => g.update());
        this.particles.forEach(p => p.update());
        this.uiEffects.forEach(u => u.update());
        
        this.entities = this.entities.filter(e => !e.remove || e.hp > 0);
        this.bullets = this.bullets.filter(b => !b.remove);
        this.ghosts = this.ghosts.filter(g => !g.remove);
        this.particles = this.particles.filter(p => p.life > 0);
        this.uiEffects = this.uiEffects.filter(u => u.life > 0);
    },
    
    draw(ctx, cam) {
        ctx.fillStyle = '#1e272e'; ctx.fillRect(-cam.x, -cam.y, this.mapW, this.mapH);
        
        ctx.save(); ctx.translate(-cam.x, -cam.y);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 2;
        ctx.beginPath();
        for(let x=0; x<this.mapW; x+=100) { ctx.moveTo(x,0); ctx.lineTo(x,this.mapH); }
        for(let y=0; y<this.mapH; y+=100) { ctx.moveTo(0,y); ctx.lineTo(this.mapW,y); }
        ctx.stroke();

        if(this.mode === 'showdown') {
            ctx.fillStyle = 'rgba(46, 204, 113, 0.4)';
            ctx.beginPath(); ctx.rect(0, 0, this.mapW, this.mapH);
            ctx.arc(this.mapW/2, this.mapH/2, this.poisonRadius, 0, Math.PI*2, true); ctx.fill();
        }

        this.map.forEach(w => {
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(w.x, w.y+w.h, w.w, 15); 
            ctx.fillStyle = '#95a5a6'; ctx.fillRect(w.x, w.y, w.w, w.h); 
            ctx.strokeStyle = '#34495e'; ctx.lineWidth = 4; ctx.strokeRect(w.x, w.y, w.w, w.h);
        });

        let draws = [...this.items, ...this.entities, ...this.ghosts, ...this.particles];
        draws.sort((a,b) => a.y - b.y);
        draws.forEach(d => d.draw(ctx));
        
        this.bullets.forEach(b => b.draw(ctx)); 
        this.uiEffects.forEach(u => u.draw(ctx)); 
        
        if(player && player.hp > 0) {
            for(let key in Input.btns) {
                let btn = Input.btns[key];
                
                if(btn.id !== null && !btn.tapOnly && btn.dragged && btn.mag >= 0.35) {
                    ctx.save();
                    
                    let range = player.data.range;
                    if(key === 'super' && player.type === 'shelly') range *= 1.3;
                    if(key === 'gadget' && player.gadget === 'sharp') range *= 1.5;

                    let isNormalEmpty = (player.ammo === 0 && key === 'attack');
                    ctx.fillStyle = key==='attack' ? 'rgba(255,255,255,0.22)' : 'rgba(241,196,15,0.3)';
                    ctx.strokeStyle = key==='attack' ? 'rgba(255,255,255,0.5)' : 'rgba(241,196,15,0.7)';
                    if(isNormalEmpty) {
                        ctx.fillStyle = 'rgba(231,76,60,0.2)'; 
                        ctx.strokeStyle = 'rgba(231,76,60,0.5)';
                    }
                    ctx.lineWidth = 2;

                    ctx.translate(player.x, player.y);
                    
                    if (player.type === 'shelly') {
                        if (key === 'attack') {
                            ctx.rotate(btn.angle);
                            let w = player.data.attackWidth;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.arc(0, 0, range, -w, w);
                            ctx.closePath();
                            ctx.fill(); ctx.stroke();
                            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                            for (let step = -2; step <= 2; step++) {
                                            ctx.beginPath();
                                            ctx.moveTo(0,0);
                                            ctx.lineTo(Math.cos(step * 0.12) * range, Math.sin(step * 0.12) * range);
                                            ctx.stroke();
                            }
                        } else if (key === 'super') {
                            ctx.rotate(btn.angle);
                            let w = 0.8; 
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.arc(0, 0, range, -w, w);
                            ctx.closePath();
                            ctx.fill(); ctx.stroke();
                            ctx.strokeStyle = 'rgba(241, 196, 15, 0.4)';
                            for (let step = -4; step <= 4; step++) {
                                            ctx.beginPath();
                                            ctx.moveTo(0,0);
                                            ctx.lineTo(Math.cos(step * 0.1) * range, Math.sin(step * 0.1) * range);
                                            ctx.stroke();
                            }
                        } else if (key === 'gadget') {
                            if (player.gadget === 'dash') {
                                ctx.rotate(btn.angle);
                                ctx.strokeStyle = 'rgba(46, 204, 113, 0.6)';
                                ctx.lineWidth = 8;
                                ctx.beginPath();
                                ctx.moveTo(0, 0);
                                ctx.lineTo(195, 0);
                                ctx.stroke();
                                ctx.fillStyle = 'rgba(46, 204, 113, 0.8)';
                                ctx.beginPath();
                                ctx.moveTo(195, -12);
                                ctx.lineTo(220, 0);
                                ctx.lineTo(195, 12);
                                ctx.fill();
                            } else if (player.gadget === 'sharp') {
                                ctx.rotate(btn.angle);
                                ctx.fillRect(0, -8, range, 16);
                                ctx.strokeRect(0, -8, range, 16);
                            }
                        }
                    } 
                    else if (player.type === 'colt') {
                        ctx.rotate(btn.angle);
                        if (key === 'attack') {
                            ctx.fillRect(0, -12, range, 24);
                            ctx.strokeRect(0, -12, range, 24);
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(range, 0); ctx.stroke();
                        } else if (key === 'super') {
                            ctx.fillStyle = 'rgba(241, 196, 15, 0.25)';
                            ctx.fillRect(0, -20, range, 40);
                            ctx.strokeRect(0, -20, range, 40);
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(range, 0); ctx.stroke();
                        } else if (key === 'gadget') {
                            if (player.gadget === 'one') {
                                ctx.fillStyle = 'rgba(46, 204, 113, 0.25)';
                                ctx.strokeStyle = 'rgba(46, 204, 113, 0.7)';
                                ctx.fillRect(0, -6, range, 12);
                                ctx.strokeRect(0, -6, range, 12);
                            } else if (player.gadget === 'slow') {
                                ctx.fillStyle = 'rgba(155, 89, 182, 0.25)';
                                ctx.strokeStyle = 'rgba(155, 89, 182, 0.7)';
                                ctx.fillRect(0, -14, range, 28);
                                ctx.strokeRect(0, -14, range, 28);
                            }
                        }
                    } 
                    else if (player.type === 'primo') {
                        if (key === 'attack') {
                            ctx.rotate(btn.angle);
                            let w = player.data.attackWidth;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.arc(0, 0, range, -w, w);
                            ctx.closePath();
                            ctx.fill(); ctx.stroke();
                        } else if (key === 'super') {
                            let distToTarget = btn.mag * 400; 
                            let landingSpot = getSafeLandingSpot(player.x, player.y, btn.angle, distToTarget, player.r);
                            let tx = landingSpot.x - player.x;
                            let ty = landingSpot.y - player.y;
                            
                            ctx.strokeStyle = 'rgba(241, 196, 15, 0.6)';
                            ctx.lineWidth = 4;
                            ctx.setLineDash([8, 6]);
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(tx, ty); ctx.stroke();
                            ctx.setLineDash([]); 
                            
                            let landingRadius = player.sp === 'shock' ? 140 : 100;
                            ctx.fillStyle = 'rgba(241, 196, 15, 0.2)';
                            ctx.strokeStyle = 'rgba(241, 196, 15, 0.8)';
                            ctx.lineWidth = 3;
                            ctx.beginPath(); ctx.arc(tx, ty, landingRadius, 0, Math.PI * 2);
                            ctx.fill(); ctx.stroke();
                        } else if (key === 'gadget') {
                            if (player.gadget === 'lariat') {
                                ctx.rotate(btn.angle);
                                ctx.strokeStyle = 'rgba(46, 204, 113, 0.6)';
                                ctx.lineWidth = 8;
                                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(210, 0); ctx.stroke();
                                ctx.fillStyle = 'rgba(46, 204, 113, 0.8)';
                                ctx.beginPath(); ctx.moveTo(210, -12); ctx.lineTo(235, 0); ctx.lineTo(210, 12); ctx.fill();
                            } else if (player.gadget === 'catch') {
                                ctx.rotate(btn.angle);
                                ctx.fillStyle = 'rgba(46, 204, 113, 0.2)';
                                ctx.strokeStyle = 'rgba(46, 204, 113, 0.8)';
                                ctx.fillRect(0, -15, range, 30);
                                ctx.strokeRect(0, -15, range, 30);
                                ctx.beginPath();
                                ctx.arc(range, 0, 15, -Math.PI/2, Math.PI/2);
                                ctx.stroke();
                            }
                        }
                    }
                    else if (player.type === 'gus') {
                        ctx.rotate(btn.angle);
                        if (key === 'attack') {
                            ctx.fillRect(0, -9, range, 18);
                            ctx.strokeRect(0, -9, range, 18);
                        } else if (key === 'super') {
                            ctx.beginPath(); ctx.arc(0, 0, 150, 0, Math.PI*2); ctx.stroke(); 
                        } else if (key === 'gadget') {
                            if (player.gadget === 'cracker') {
                                ctx.beginPath(); ctx.arc(0, 0, 110, 0, Math.PI*2); ctx.stroke();
                            }
                        }
                    }
                    else if (player.type === 'mortis') {
                        ctx.rotate(btn.angle);
                        if (key === 'attack') {
                            let currentRange = range * (1 + player.longDashGauge * 2);
                            ctx.fillStyle = 'rgba(255,255,255,0.1)';
                            ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(currentRange, -20); ctx.lineTo(currentRange, 20); ctx.lineTo(0, 20); ctx.fill(); ctx.stroke();
                        } else if (key === 'super') {
                            ctx.fillRect(0, -15, 600, 30); ctx.strokeRect(0, -15, 600, 30);
                        } else if (key === 'gadget') {
                            if (player.gadget === 'spinner') {
                                ctx.beginPath(); ctx.arc(0, 0, player.r * 4, 0, Math.PI*2); ctx.stroke();
                            } else if (player.gadget === 'batmove') {
                                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(150,0); ctx.stroke();
                            }
                        }
                    }
                    else if (player.type === 'sirius') {
                        ctx.rotate(btn.angle);
                        if (key === 'attack') {
                            ctx.fillStyle = 'rgba(155, 89, 182, 0.2)';
                            ctx.strokeStyle = 'rgba(155, 89, 182, 0.65)';
                            ctx.fillRect(0, -7, range, 14);
                            ctx.strokeRect(0, -7, range, 14);
                        } else if (key === 'super') {
                            ctx.strokeStyle = 'rgba(155, 89, 182, 0.7)';
                            ctx.lineWidth = 3;
                            ctx.beginPath(); ctx.arc(0, 0, 80, 0, Math.PI*2); ctx.stroke();
                        } else if (key === 'gadget') {
                            if (player.gadget === 'novabirth') {
                                ctx.fillStyle = 'rgba(74, 21, 75, 0.3)';
                                ctx.strokeStyle = 'rgba(142, 68, 173, 0.8)';
                                ctx.fillRect(0, -14, range * 1.2, 28);
                                ctx.strokeRect(0, -14, range * 1.2, 28);
                            } else if (player.gadget === 'deepabyss') {
                                ctx.strokeStyle = 'rgba(74, 21, 75, 0.7)';
                                ctx.beginPath(); ctx.arc(0, 0, 400, 0, Math.PI*2); ctx.stroke();
                            }
                        }
                    }
                    
                    ctx.restore();
                }
            }
        }
        ctx.restore();
    },
    
    addLog(k, v, team) {
        let log = document.getElementById('kill-log');
        let div = document.createElement('div');
        div.className = 'log-item';
        let color = team === 1 ? '#3498db' : '#e74c3c';
        div.innerHTML = `<span style="color:${color}">${k}</span> 💥 <span>${v}</span>`;
        log.appendChild(div);
        setTimeout(() => { if(div.parentNode) div.parentNode.removeChild(div); }, 4000);
    },
    updateHUD(html) { document.getElementById('hud-top').innerHTML = html; },
    
    end(winTeam) {
        this.state = 'end';
        
        this.entities.forEach(e => {
            if (!this.globalStats[e.name]) {
                this.globalStats[e.name] = { kills: e.kills, deaths: e.deaths, brawler: e.data.name, team: e.team };
            } else {
                this.globalStats[e.name].kills = e.kills;
                this.globalStats[e.name].deaths = e.deaths;
            }
        });

        let msg = winTeam === 1 ? "🎉 VICTORY!" : (winTeam === 0 ? "➖ DRAW" : "💀 DEFEAT");
        if(this.mode === 'showdown') msg = winTeam === player.team ? "👑 #1 ドン勝！" : "💀 GAME OVER";
        
        let hud = document.getElementById('hud-top');
        hud.innerHTML = msg; hud.style.fontSize = '3rem'; hud.style.color = winTeam===1||winTeam===player.team ? '#f1c40f' : '#e74c3c';
        
        setTimeout(() => {
            hud.style.fontSize = '1.5rem'; hud.style.color = '#fff';
            this.showScoreboard(winTeam);
        }, 3000);
    },

    showScoreboard(winTeam) {
        document.getElementById('gameCanvas').style.display = 'none';
        document.getElementById('uiLayer').style.display = 'none';
        
        let resultsScreen = document.getElementById('resultsScreen');
        resultsScreen.style.display = 'flex';
        
        let title = document.getElementById('resultsTitle');
        if (this.mode === 'showdown') {
            title.textContent = winTeam === player.team ? "🏆 ROYAL VICTORY! (1位)" : "💀 BATTLE OVER";
        } else {
            title.textContent = winTeam === 1 ? "🎉 VICTORY (チーム勝利!)" : "💀 DEFEAT (敗北...)";
        }

        let tableBody = document.getElementById('resultsTableBody');
        tableBody.innerHTML = '';

        let statsArray = Object.keys(this.globalStats).map(name => ({
            name: name,
            kills: this.globalStats[name].kills,
            deaths: this.globalStats[name].deaths,
            brawler: this.globalStats[name].brawler,
            team: this.globalStats[name].team
        }));

        statsArray.sort((a, b) => {
            if (b.kills !== a.kills) return b.kills - a.kills;
            return a.deaths - b.deaths;
        });

        statsArray.forEach(data => {
            let tr = document.createElement('tr');
            
            if (data.name === "YOU") {
                tr.className = 'highlight';
            }

            let teamText = "";
            if (this.mode === 'showdown') {
                teamText = data.name === "YOU" ? "プレイヤー" : "ボット / 敵";
            } else {
                teamText = data.team === 1 ? "🟢 味方チーム" : "🔴 敵チーム";
            }

            tr.innerHTML = `
                <td>${data.name} (${data.brawler})</td>
                <td>${teamText}</td>
                <td><strong style="color: #2ecc71;">${data.kills}</strong></td>
                <td><strong style="color: #e74c3c;">${data.deaths}</strong></td>
            `;
            tableBody.appendChild(tr);
        });
    }
};

/** ==========================================
 * 広角ズームカメラ & 死亡時観戦移動システム
 * ========================================== */
const cam = {
    x: 0, y: 0,
    zoom: 0.45, 
    
    update(tgt) {
        if(!tgt) return;
        
        if (tgt.hp > 0) {
            Game.spectateX = tgt.x;
            Game.spectateY = tgt.y;
        } else {
            if (Input.leftJoy.active) {
                let moveSpeed = 8;
                Game.spectateX += Input.leftJoy.nx * moveSpeed * Input.leftJoy.mag * Game.timeScale;
                Game.spectateY += Input.leftJoy.ny * moveSpeed * Input.leftJoy.mag * Game.timeScale;
            } else {
                let aliveFriend = Game.entities.find(e => e.team === 1 && e.hp > 0);
                if (aliveFriend) {
                    Game.spectateX += (aliveFriend.x - Game.spectateX) * 0.05 * Game.timeScale;
                    Game.spectateY += (aliveFriend.y - Game.spectateY) * 0.05 * Game.timeScale;
                } else {
                    let aliveEnemy = Game.entities.find(e => e.hp > 0);
                    if (aliveEnemy) {
                        Game.spectateX += (aliveEnemy.x - Game.spectateX) * 0.05 * Game.timeScale;
                        Game.spectateY += (aliveEnemy.y - Game.spectateY) * 0.05 * Game.timeScale;
                    }
                }
            }
        }
        
        let targetCamX = Game.spectateX - (cw / 2) / this.zoom;
        let targetCamY = Game.spectateY - (ch / 2) / this.zoom;
        
        this.x += (targetCamX - this.x) * 0.15 * Game.timeScale;
        this.y += (targetCamY - this.y) * 0.15 * Game.timeScale;
        
        this.x = Math.max(0, Math.min(this.x, Game.mapW - cw / this.zoom));
        this.y = Math.max(0, Math.min(this.y, Game.mapH - ch / this.zoom));
    }
};

/** ==========================================
 * HUD / ジョイスティック描画
 * ========================================== */
function drawUI() {
    ctx.lineWidth = 3;
    
    if(Input.leftJoy.active) {
        ctx.beginPath(); ctx.arc(Input.leftJoy.ox, Input.leftJoy.oy, 60, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(52, 152, 219, 0.2)'; ctx.fill(); ctx.strokeStyle='rgba(52, 152, 219, 0.5)'; ctx.stroke();
        
        ctx.beginPath(); ctx.arc(Input.leftJoy.x, Input.leftJoy.y, 25, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(52, 152, 219, 0.8)'; ctx.fill();
    }
    
    if (player && player.hp <= 0) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(20, 20, 310, 45);
        ctx.strokeStyle = '#f1c40f';
        ctx.strokeRect(20, 20, 310, 45);
        ctx.fillStyle = '#fff';
        ctx.font = '900 13px Nunito';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText("📷 観戦中: 左ジョイスティックでカメラを移動できます", 28, 42.5);
    }
    
    for(let key in Input.btns) {
        let b = Input.btns[key];
        
        ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r, 0, Math.PI*2);
        
        if (key === 'gadget' && player && player.gadgetCooldown > 0) {
            ctx.fillStyle = 'rgba(120, 120, 120, 0.3)';
        } else {
            ctx.fillStyle = b.color + '66'; 
        }
        
        ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.stroke();
        
        ctx.fillStyle = '#fff'; ctx.font = `${b.r*0.6}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(b.icon, b.cx, b.cy);

        if(!player || player.hp <= 0) continue;

        if(b.id !== null && !b.tapOnly) {
            let nx = b.cx + Math.cos(b.angle)*b.mag*b.r;
            let ny = b.cy + Math.sin(b.angle)*b.mag*b.r;
            ctx.beginPath(); ctx.arc(nx, ny, b.r*0.5, 0, Math.PI*2);
            
            if (key === 'gadget' && player.gadgetCooldown > 0) {
                ctx.fillStyle = '#7f8c8d';
            } else {
                ctx.fillStyle = b.color;
            }
            
            ctx.fill(); ctx.stroke();
            
            if (b.dragged && b.mag < 0.35) {
                ctx.strokeStyle = 'rgba(255, 77, 77, 0.85)';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([5, 4]);
                ctx.beginPath();
                ctx.arc(b.cx, b.cy, b.r * 0.35, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        ctx.lineWidth = 6;
        if(key === 'super') {
            let ratio = player.superCharge / player.maxSuperCharge;
            if(ratio >= 1) { ctx.strokeStyle = '#f1c40f'; ctx.shadowBlur = 10; ctx.shadowColor = '#f1c40f'; }
            else { ctx.strokeStyle = 'rgba(241, 196, 15, 0.3)'; ctx.shadowBlur = 0; }
            ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r+5, -Math.PI/2, -Math.PI/2 + Math.PI*2*ratio); ctx.stroke();
            ctx.shadowBlur = 0;
        } else if (key === 'hc') {
            let ratio = player.hcCharge / player.maxHcCharge;
            if(ratio >= 1) { ctx.strokeStyle = '#9b59b6'; ctx.shadowBlur = 15; ctx.shadowColor = '#9b59b6'; }
            else { ctx.strokeStyle = 'rgba(155, 89, 182, 0.3)'; ctx.shadowBlur = 0; }
            ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r+5, -Math.PI/2, -Math.PI/2 + Math.PI*2*ratio); ctx.stroke();
            ctx.shadowBlur = 0;
        } else if (key === 'gadget') {
            if(player.gadgetCooldown > 0) {
                ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(30, 30, 30, 0.75)'; ctx.fill();
                
                let ratio = player.gadgetCooldown / 600;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath(); ctx.moveTo(b.cx, b.cy); ctx.arc(b.cx, b.cy, b.r, -Math.PI/2, -Math.PI/2 + Math.PI*2*ratio); ctx.fill();
                
                let remainingSec = (player.gadgetCooldown / 60).toFixed(1);
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#1e272e';
                ctx.lineWidth = 3;
                ctx.font = '900 18px Nunito';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeText(remainingSec + "s", b.cx, b.cy);
                ctx.fillText(remainingSec + "s", b.cx, b.cy);
            }
        }
    }
    
    if(player && player.hp > 0) {
        let bw = 200; let bx = cw/2 - bw/2; let by = ch - 50;
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, 20);
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(bx, by, bw * (player.hp/player.maxHp), 20);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, bw, 20);
        ctx.fillStyle = '#fff'; ctx.font = '900 16px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.strokeText(player.hp, cw/2, by+10); ctx.fillText(player.hp, cw/2, by+10);
        
        let slotW = bw / player.maxAmmo;
        for(let i=0; i<player.maxAmmo; i++) {
            let sx = bx + i*slotW;
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(sx, by+25, slotW-4, 12);
            if(player.ammo > i) {
                ctx.fillStyle = '#f39c12'; ctx.fillRect(sx, by+25, slotW-4, 12);
            } else if (player.ammo === i) {
                let aRatio = player.reloadTimer / (player.type==='shelly'&&player.hcActive ? player.reloadTime/3 : player.reloadTime);
                ctx.fillStyle = '#e67e22'; ctx.fillRect(sx, by+25, (slotW-4)*aRatio, 12);
            }
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(sx, by+25, slotW-4, 12);
        }
    }
}

/** ==========================================
 * メインループ
 * ========================================== */
function loop(now) {
    requestAnimationFrame(loop);
    
    if (!Game.lastTime) Game.lastTime = now;
    let elapsed = now - Game.lastTime;
    Game.lastTime = now;
    
    if (elapsed > 160) elapsed = 160; 
    
    Game.timeScale = elapsed / (1000 / 60);

    if(Game.state !== 'playing') return;
    
    Game.update();
    cam.update(player);
    
    ctx.clearRect(0,0,cw,ch);
    
    ctx.save();
    ctx.scale(cam.zoom, cam.zoom);
    Game.draw(ctx, cam);
    ctx.restore();
    
    drawUI();
}

document.getElementById('btnStart').addEventListener('click', () => {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameCanvas').style.display = 'block';
    Input.initLayout();
    Game.init(document.getElementById('selMode').value, document.getElementById('selChar').value);
});

document.getElementById('btnCloseResults').addEventListener('click', () => {
    document.getElementById('resultsScreen').style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
});

Input.initLayout();
requestAnimationFrame((now) => {
    Game.lastTime = now;
    loop(now);
});

</script>
