<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reaction Grid: Flow Fix</title>
    <style>
        :root {
            --bg-color: #020617;
            --tile-color: #0f172a;
            --active-color: #1e293b;
            --target-color: #f43f5e;
            --complete-color: #fbbf24;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #stats {
            width: 90%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: rgba(30, 41, 59, 0.7);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-label { font-size: 0.65rem; color: #94a3b8; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-weight: 800; font-family: monospace; font-size: 1.2rem; color: #38bdf8; }

        #game-board {
            display: grid;
            width: 94vw;
            height: 94vw;
            max-width: 440px;
            max-height: 440px;
            background: var(--tile-color);
            padding: 6px;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            box-sizing: border-box;
            position: relative;
            /* タイル自体に反応させるため pointer-events: auto (デフォルト) */
        }

        .tile {
            background-color: var(--active-color);
            border-radius: 2px;
            /* ここが pointer-events: none だと押せなくなるため削除 */
        }

        .tile.target {
            background-color: var(--target-color);
            box-shadow: 0 0 15px var(--target-color);
        }

        .tile.completed {
            background-color: var(--complete-color);
        }

        .flash {
            animation: flash-anim 0.2s ease-out;
        }

        @keyframes flash-anim {
            0% { background-color: #fff; transform: scale(1.1); filter: brightness(2); }
            100% { transform: scale(1); }
        }

        #clear-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 8px;
        }

        .btn {
            background: #334155;
            color: #f1f5f9;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-restart { background: var(--complete-color); color: #000; }
        .btn-danger { color: #f43f5e; background: transparent; font-size: 0.8rem; opacity: 0.6; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="stats">
        <div class="stat-box"><span class="stat-label">Level</span><span class="stat-value" id="lvl-display">1</span></div>
        <div class="stat-box"><span class="stat-label">Time</span><span class="stat-value" id="time-display">00:00.0</span></div>
        <div class="stat-box"><span class="stat-label">TPS</span><span class="stat-value" id="tps-display">0.00</span></div>
        <div class="stat-box"><span class="stat-label" id="prog-label">Next LVL</span><span class="stat-value" id="prog-display">0/25</span></div>
    </div>

    <div id="game-board">
        <div id="clear-overlay">
            <h1 style="color:var(--complete-color)">FINISH!</h1>
            <p id="final-stats"></p>
            <button class="btn btn-restart" onclick="confirmReset()">RESTART</button>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <button id="reset-btn" class="btn btn-danger" onclick="requestReset()">Delete Save Data</button>
        <button id="confirm-btn" class="btn btn-restart hidden" onclick="confirmReset()">CONFIRM RESET?</button>
    </div>

    <script>
        const MAX_GRID = 10;
        let state = {
            level: 1,
            totalTaps: 0,
            levelTaps: 0,
            startTime: null,
            targetIndex: -1,
            completedIndices: [],
            isCleared: false
        };

        const board = document.getElementById('game-board');
        let isTouching = false; 

        function getRequiredTaps(lvl) {
            return 15 + (lvl * 5);
        }

        function init() {
            const saved = localStorage.getItem('reactionGameV6');
            if (saved) state = JSON.parse(saved);
            renderBoard();
            updateUI();
            
            // pointerdown で開始
            board.addEventListener('pointerdown', (e) => {
                if (state.isCleared) return;
                isTouching = true;
                checkIntersection(e.clientX, e.clientY);
            });

            // 指が動いたとき（なぞり）
            window.addEventListener('pointermove', (e) => {
                if (!isTouching || state.isCleared) return;
                checkIntersection(e.clientX, e.clientY);
            });

            // 指が離れたとき
            window.addEventListener('pointerup', () => isTouching = false);
        }

        function checkIntersection(x, y) {
            const elem = document.elementFromPoint(x, y);
            // タイルであり、かつターゲットインデックスと一致するか確認
            if (elem && elem.classList.contains('tile')) {
                const index = parseInt(elem.id.split('-')[1]);
                if (index === state.targetIndex) {
                    processTap(index);
                }
            }
        }

        function renderBoard() {
            const tiles = board.querySelectorAll('.tile');
            tiles.forEach(t => t.remove());

            const gridSize = Math.min(state.level + 1, MAX_GRID);
            const gapSize = Math.max(1, 8 - (gridSize - 2) * 1);
            
            board.style.gap = `${gapSize}px`;
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            board.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}`;
                if (state.completedIndices.includes(i)) tile.classList.add('completed');
                board.appendChild(tile);
            }
            if (!state.isCleared) spawnTarget();
        }

        function spawnTarget() {
            const tiles = board.querySelectorAll('.tile');
            tiles.forEach(t => t.classList.remove('target'));
            
            const gridSize = Math.min(state.level + 1, MAX_GRID);
            const totalTiles = gridSize * gridSize;

            let available = [];
            for(let i=0; i<totalTiles; i++) {
                if (!state.completedIndices.includes(i)) available.push(i);
            }

            if (available.length === 0) {
                gameClear();
                return;
            }

            let newIndex = available[Math.floor(Math.random() * available.length)];
            state.targetIndex = newIndex;
            const targetTile = document.getElementById(`tile-${newIndex}`);
            if (targetTile) targetTile.classList.add('target');
        }

        function processTap(index) {
            if (state.isCleared || index !== state.targetIndex) return;

            if (navigator.vibrate) navigator.vibrate(30);
            if (!state.startTime) state.startTime = Date.now();

            const targetTile = document.getElementById(`tile-${index}`);
            targetTile.classList.remove('flash');
            void targetTile.offsetWidth; 
            targetTile.classList.add('flash');

            state.totalTaps++;
            state.levelTaps++;

            if (state.level + 1 >= MAX_GRID) {
                state.completedIndices.push(index);
                targetTile.classList.add('completed');
                targetTile.classList.remove('target');
            }

            if (state.level + 1 < MAX_GRID && state.levelTaps >= getRequiredTaps(state.level)) {
                state.level++;
                state.levelTaps = 0;
                renderBoard();
            } else {
                spawnTarget();
            }

            updateUI();
            save();
        }

        function gameClear() {
            state.isCleared = true;
            const timeStr = formatTime(Date.now() - state.startTime);
            document.getElementById('final-stats').innerHTML = `Time: ${timeStr}<br>Total Taps: ${state.totalTaps}`;
            document.getElementById('clear-overlay').style.display = 'flex';
            save();
        }

        function formatTime(ms) {
            const totalSec = ms / 1000;
            const min = Math.floor(totalSec / 60);
            const sec = (totalSec % 60).toFixed(1);
            return `${min}:${sec.padStart(4, '0')}`;
        }

        function updateUI() {
            const isFinal = state.level + 1 >= MAX_GRID;
            document.getElementById('lvl-display').innerText = isFinal ? "MAX" : state.level;
            
            if (isFinal) {
                document.getElementById('prog-label').innerText = "FILL TILES";
                document.getElementById('prog-display').innerText = `${state.completedIndices.length}/100`;
            } else {
                document.getElementById('prog-display').innerText = `${state.levelTaps}/${getRequiredTaps(state.level)}`;
            }
            
            if (state.startTime && !state.isCleared) {
                const ms = Date.now() - state.startTime;
                document.getElementById('time-display').innerText = formatTime(ms);
                const tps = (state.totalTaps / (ms / 1000)).toFixed(2);
                document.getElementById('tps-display').innerText = tps;
            }
        }

        function save() {
            localStorage.setItem('reactionGameV6', JSON.stringify(state));
        }

        setInterval(() => { if(state.startTime && !state.isCleared) updateUI(); }, 50);

        function requestReset() {
            document.getElementById('reset-btn').classList.add('hidden');
            document.getElementById('confirm-btn').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('reset-btn').classList.remove('hidden');
                document.getElementById('confirm-btn').classList.add('hidden');
            }, 4000);
        }

        function confirmReset() {
            localStorage.removeItem('reactionGameV6');
            location.reload();
        }

        init();
    </script>
</body>
</html>
