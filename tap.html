<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reaction Grid Pro</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --tile-color: #1e293b;
            --active-color: #334155;
            --target-color: #2dd4bf;
            --text-color: #f1f5f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* 誤操作防止 */
        }

        #stats {
            width: 90%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-label { font-size: 0.7rem; color: #94a3b8; display: block; }
        .stat-value { font-weight: bold; font-family: monospace; font-size: 1.1rem; }

        #game-board {
            display: grid;
            /* gapはJSで動的に制御 */
            width: 92vw;
            height: 92vw;
            max-width: 420px;
            max-height: 420px;
            background: var(--tile-color);
            padding: 8px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .tile {
            background-color: var(--active-color);
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        .tile.target {
            background-color: var(--target-color);
            box-shadow: 0 0 20px var(--target-color);
            z-index: 10;
        }

        @keyframes flash {
            0% { background-color: #fff; transform: scale(1.1); filter: brightness(2); }
            100% { background-color: var(--active-color); transform: scale(1); }
        }

        .flash-effect { animation: flash 0.25s cubic-bezier(0, 0.5, 0.5, 1); }

        #controls { margin-top: 25px; }
        button {
            background: #334155;
            color: #94a3b8;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
        }
        button.confirm { background: #e11d48; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="stats">
        <div class="stat-box"><span class="stat-label">LEVEL</span><span class="stat-value" id="lvl-display">1</span></div>
        <div class="stat-box"><span class="stat-label">SPEED (tps)</span><span class="stat-value" id="tps-display">0.00</span></div>
        <div class="stat-box"><span class="stat-label">MAX TAP / LVL</span><span class="stat-value" id="max-display">0</span></div>
        <div class="stat-box"><span class="stat-label">NEXT LEVEL</span><span class="stat-value" id="prog-display">0/15</span></div>
    </div>

    <div id="game-board"></div>

    <div id="controls">
        <button id="reset-btn" onclick="requestReset()">セーブデータを消去</button>
        <button id="confirm-btn" class="confirm hidden" onclick="confirmReset()">本当に消しますか？</button>
    </div>

    <script>
        let state = {
            level: 1,
            totalTaps: 0,
            levelTaps: 0,
            maxTapsThisLevel: 0,
            startTime: null,
            targetIndex: -1
        };

        const board = document.getElementById('game-board');
        
        function getRequiredTaps(lvl) {
            // レベルが上がるごとに必要タップ数が増える (15, 20, 25...)
            return 10 + (lvl * 5);
        }

        function init() {
            const saved = localStorage.getItem('reactionGameDataV2');
            if (saved) state = JSON.parse(saved);
            state.startTime = null; // 開始時にタイマーリセット
            state.levelTaps = 0;
            renderBoard();
            updateUI();
        }

        function renderBoard() {
            board.innerHTML = '';
            const gridSize = state.level + 1;
            
            // 隙間(gap)をレベルに応じて狭くする (最小2pxまで)
            const gapSize = Math.max(2, 12 - state.level * 1.5);
            board.style.gap = `${gapSize}px`;
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            board.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const trigger = (e) => { e.preventDefault(); handleTap(i); };
                tile.addEventListener('touchstart', trigger);
                tile.addEventListener('mousedown', trigger);
                board.appendChild(tile);
            }
            spawnTarget();
        }

        function spawnTarget() {
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(t => t.classList.remove('target'));
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * tiles.length);
            } while (newIndex === state.targetIndex);
            state.targetIndex = newIndex;
            tiles[newIndex].classList.add('target');
        }

        function handleTap(index) {
            if (index !== state.targetIndex) return;

            if (navigator.vibrate) navigator.vibrate(60);
            if (!state.startTime) state.startTime = Date.now();

            const tiles = document.querySelectorAll('.tile');
            const targetTile = tiles[index];
            targetTile.classList.remove('target');
            targetTile.classList.add('flash-effect');
            
            // クローンを作ってアニメーションをリセット可能にする
            const newTile = targetTile.cloneNode(true);
            targetTile.parentNode.replaceChild(newTile, targetTile);
            // イベント再登録
            newTile.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(index); });
            newTile.addEventListener('mousedown', () => handleTap(index));

            state.totalTaps++;
            state.levelTaps++;
            if (state.levelTaps > state.maxTapsThisLevel) state.maxTapsThisLevel = state.levelTaps;

            if (state.levelTaps >= getRequiredTaps(state.level)) {
                state.level++;
                state.levelTaps = 0;
                state.maxTapsThisLevel = 0;
                renderBoard();
            } else {
                spawnTarget();
            }

            updateUI();
            localStorage.setItem('reactionGameDataV2', JSON.stringify(state));
        }

        function updateUI() {
            document.getElementById('lvl-display').innerText = state.level;
            document.getElementById('max-display').innerText = state.maxTapsThisLevel;
            document.getElementById('prog-display').innerText = `${state.levelTaps}/${getRequiredTaps(state.level)}`;
            
            if (state.startTime) {
                const sec = (Date.now() - state.startTime) / 1000;
                document.getElementById('tps-display').innerText = (state.totalTaps / sec).toFixed(2);
            }
        }

        setInterval(() => { if(state.startTime) updateUI(); }, 100);

        function requestReset() {
            document.getElementById('reset-btn').classList.add('hidden');
            document.getElementById('confirm-btn').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('reset-btn').classList.remove('hidden');
                document.getElementById('confirm-btn').classList.add('hidden');
            }, 4000);
        }

        function confirmReset() {
            localStorage.removeItem('reactionGameDataV2');
            location.reload();
        }

        init();
    </script>
</body>
</html>
