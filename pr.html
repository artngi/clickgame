                                ctx.lineWidth = 4;
                                ctx.setLineDash([8, 6]);
                                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(tx, ty); ctx.stroke();
                                ctx.setLineDash([]);
                                
                                ctx.fillStyle = 'rgba(211, 84, 0, 0.2)';
                                ctx.strokeStyle = 'rgba(211, 84, 0, 0.8)';
                                ctx.beginPath(); ctx.arc(tx, ty, 140, 0, Math.PI*2);
                                ctx.fill(); ctx.stroke();
                            } else if (sType === 'stun') {
                                ctx.fillRect(0, -14, 500, 28);
                                ctx.strokeRect(0, -14, 500, 28);
                            } else if (sType === 'poison') {
                                ctx.beginPath();
                                ctx.moveTo(0,0);
                                ctx.arc(0,0, 350, -0.4, 0.4);
                                ctx.closePath();
                                ctx.fill(); ctx.stroke();
                            } else if (sType === 'ice') {
                                ctx.beginPath(); ctx.arc(0,0, 130, 0, Math.PI*2); ctx.stroke();
                            }
                        }
                    }
                    else if (player.type === 'pius') {
                        if (key === 'attack') {
                            ctx.rotate(btn.angle);
                            ctx.fillRect(0, -8, range, 16);
                            ctx.strokeRect(0, -8, range, 16);
                        } else if (key === 'super') {
                            let distToTarget = btn.mag * 450; 
                            let tx = Math.cos(btn.angle) * distToTarget;
                            let ty = Math.sin(btn.angle) * distToTarget;
                            
                            ctx.strokeStyle = 'rgba(26, 188, 156, 0.6)';
                            ctx.lineWidth = 4;
                            ctx.setLineDash([8, 6]);
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(tx, ty); ctx.stroke();
                            ctx.setLineDash([]); 
                            
                            let landingRadius = player.hcActive ? 200 : 150;
                            ctx.fillStyle = 'rgba(26, 188, 156, 0.2)';
                            ctx.strokeStyle = 'rgba(26, 188, 156, 0.8)';
                            ctx.lineWidth = 3;
                            ctx.beginPath(); ctx.arc(tx, ty, landingRadius, 0, Math.PI * 2);
                            ctx.fill(); ctx.stroke();
                        }
                    }
                    
                    ctx.restore();
                }
            }
        }
        ctx.restore();
    },
    
    addLog(k, v, team) {
        let log = document.getElementById('kill-log');
        let div = document.createElement('div');
        div.className = 'log-item';
        let color = team === 1 ? '#3498db' : '#e74c3c';
        div.innerHTML = `<span style="color:${color}">${k}</span> 💥 <span>${v}</span>`;
        log.appendChild(div);
        setTimeout(() => { if(div.parentNode) div.parentNode.removeChild(div); }, 4000);
    },
    updateHUD(html) { document.getElementById('hud-top').innerHTML = html; },
    
    end(winTeam) {
        this.state = 'end';
        
        this.entities.forEach(e => {
            if (!this.globalStats[e.name]) {
                this.globalStats[e.name] = { kills: e.kills, deaths: e.deaths, brawler: e.data.name, team: e.team };
            } else {
                this.globalStats[e.name].kills = e.kills;
                this.globalStats[e.name].deaths = e.deaths;
            }
        });

        let msg = winTeam === 1 ? "🎉 VICTORY!" : (winTeam === 0 ? "➖ DRAW" : "💀 DEFEAT");
        if(this.mode === 'showdown') msg = winTeam === player.team ? "👑 #1 ドン勝！" : "💀 GAME OVER";
        
        let hud = document.getElementById('hud-top');
        hud.innerHTML = msg; hud.style.fontSize = '3rem'; hud.style.color = winTeam===1||winTeam===player.team ? '#f1c40f' : '#e74c3c';
        
        setTimeout(() => {
            hud.style.fontSize = '1.5rem'; hud.style.color = '#fff';
            this.showScoreboard(winTeam);
        }, 3000);
    },

    showScoreboard(winTeam) {
        document.getElementById('gameCanvas').style.display = 'none';
        document.getElementById('uiLayer').style.display = 'none';
        
        let resultsScreen = document.getElementById('resultsScreen');
        resultsScreen.style.display = 'flex';
        
        let title = document.getElementById('resultsTitle');
        if (this.mode === 'showdown') {
            title.textContent = winTeam === player.team ? "🏆 ROYAL VICTORY! (1位)" : "💀 BATTLE OVER";
        } else {
            title.textContent = winTeam === 1 ? "🎉 VICTORY (チーム勝利!)" : "💀 DEFEAT (敗北...)";
        }

        let tableBody = document.getElementById('resultsTableBody');
        tableBody.innerHTML = '';

        let statsArray = Object.keys(this.globalStats).map(name => ({
            name: name,
            kills: this.globalStats[name].kills,
            deaths: this.globalStats[name].deaths,
            brawler: this.globalStats[name].brawler,
            team: this.globalStats[name].team
        }));

        statsArray.sort((a, b) => {
            if (b.kills !== a.kills) return b.kills - a.kills;
            return a.deaths - b.deaths;
        });

        statsArray.forEach(data => {
            let tr = document.createElement('tr');
            
            if (data.name === "YOU") {
                tr.className = 'highlight';
            }

            let teamText = "";
            if (this.mode === 'showdown') {
                teamText = data.name === "YOU" ? "プレイヤー" : "ボット / 敵";
            } else {
                teamText = data.team === 1 ? "🟢 味方チーム" : "🔴 敵チーム";
            }

            tr.innerHTML = `
                <td>${data.name} (${data.brawler})</td>
                <td>${teamText}</td>
                <td><strong style="color: #2ecc71;">${data.kills}</strong></td>
                <td><strong style="color: #e74c3c;">${data.deaths}</strong></td>
            `;
            tableBody.appendChild(tr);
        });
    }
};

/** ==========================================
 * 広角ズームカメラ & 死亡時観戦移動システム
 * ========================================== */
const cam = {
    x: 0, y: 0,
    zoom: 0.45, 
    
    update(tgt) {
        if(!tgt) return;
        
        if (tgt.hp > 0) {
            Game.spectateX = tgt.x;
            Game.spectateY = tgt.y;
        } else {
            if (Input.leftJoy.active) {
                let moveSpeed = 8;
                Game.spectateX += Input.leftJoy.nx * moveSpeed * Input.leftJoy.mag * Game.timeScale;
                Game.spectateY += Input.leftJoy.ny * moveSpeed * Input.leftJoy.mag * Game.timeScale;
            } else {
                let aliveFriend = Game.entities.find(e => e.team === 1 && e.hp > 0);
                if (aliveFriend) {
                    Game.spectateX += (aliveFriend.x - Game.spectateX) * 0.05 * Game.timeScale;
                    Game.spectateY += (aliveFriend.y - Game.spectateY) * 0.05 * Game.timeScale;
                } else {
                    let aliveEnemy = Game.entities.find(e => e.hp > 0);
                    if (aliveEnemy) {
                        Game.spectateX += (aliveEnemy.x - Game.spectateX) * 0.05 * Game.timeScale;
                        Game.spectateY += (aliveEnemy.y - Game.spectateY) * 0.05 * Game.timeScale;
                    }
                }
            }
        }
        
        let targetCamX = Game.spectateX - (cw / 2) / this.zoom;
        let targetCamY = Game.spectateY - (ch / 2) / this.zoom;
        
        this.x += (targetCamX - this.x) * 0.15 * Game.timeScale;
        this.y += (targetCamY - this.y) * 0.15 * Game.timeScale;
        
        this.x = Math.max(0, Math.min(this.x, Game.mapW - cw / this.zoom));
        this.y = Math.max(0, Math.min(this.y, Game.mapH - ch / this.zoom));
    }
};

/** ==========================================
 * HUD / ジョイスティック描画
 * ========================================== */
function drawUI() {
    ctx.lineWidth = 3;
    
    if(Input.leftJoy.active) {
        ctx.beginPath(); ctx.arc(Input.leftJoy.ox, Input.leftJoy.oy, 60, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(52, 152, 219, 0.2)'; ctx.fill(); ctx.strokeStyle='rgba(52, 152, 219, 0.5)'; ctx.stroke();
        
        ctx.beginPath(); ctx.arc(Input.leftJoy.x, Input.leftJoy.y, 25, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(52, 152, 219, 0.8)'; ctx.fill();
    }
    
    if (player && player.hp <= 0) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(20, 20, 310, 45);
        ctx.strokeStyle = '#f1c40f';
        ctx.strokeRect(20, 20, 310, 45);
        ctx.fillStyle = '#fff';
        ctx.font = '900 13px Nunito';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText("📷 観戦中: 左ジョイスティックでカメラを移動できます", 28, 42.5);
    }
    
    for(let key in Input.btns) {
        let b = Input.btns[key];
        
        ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r, 0, Math.PI*2);
        
        if (key === 'gadget' && player && player.gadgetCooldown > 0) {
            ctx.fillStyle = 'rgba(120, 120, 120, 0.3)';
        } else {
            ctx.fillStyle = b.color + '66'; 
        }
        
        ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.stroke();
        
        let currentIcon = b.icon;
        if (key === 'super' && player && player.hp > 0 && player.type === 'chester') {
            let revealEnabled = (player.sp === 'reveal' || player.superCharge >= player.maxSuperCharge);
            if (revealEnabled) {
                let sT = player.chesterSuperType;
                if (sT === 'explode') currentIcon = '💣';
                else if (sT === 'stun') currentIcon = '⚡';
                else if (sT === 'heal') currentIcon = '💖';
                else if (sT === 'poison') currentIcon = '🤢';
                else if (sT === 'ice') currentIcon = '❄️';
            } else {
                currentIcon = '❓';
            }
        }

        ctx.fillStyle = '#ffffff'; 
        ctx.font = `bold ${Math.floor(b.r * 0.9)}px system-ui, -apple-system, sans-serif`;
        ctx.textAlign = 'center'; 
        ctx.textBaseline = 'middle';
        ctx.fillText(currentIcon, b.cx, b.cy);

        if (player && player.hp > 0) {
            if(b.id !== null && !b.tapOnly) {
                let nx = b.cx + Math.cos(b.angle)*b.mag*b.r;
                let ny = b.cy + Math.sin(b.angle)*b.mag*b.r;
                ctx.beginPath(); ctx.arc(nx, ny, b.r*0.5, 0, Math.PI*2);
                
                if (key === 'gadget' && player.gadgetCooldown > 0) {
                    ctx.fillStyle = '#7f8c8d';
                } else {
                    ctx.fillStyle = b.color;
                }
                ctx.fill(); ctx.stroke();
                
                if (b.dragged && b.mag < 0.35) {
                    ctx.strokeStyle = 'rgba(255, 77, 77, 0.85)';
                    ctx.lineWidth = 2.5;
                    ctx.setLineDash([5, 4]);
                    ctx.beginPath();
                    ctx.arc(b.cx, b.cy, b.r * 0.35, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }

            ctx.lineWidth = 6;
            if(key === 'super') {
                let ratio = player.superCharge / player.maxSuperCharge;
                if(ratio >= 1) { 
                    ctx.strokeStyle = '#f1c40f'; 
                    ctx.shadowBlur = 10; 
                    ctx.shadowColor = '#f1c40f'; 
                } else { 
                    ctx.strokeStyle = 'rgba(241, 196, 15, 0.3)'; 
                    ctx.shadowBlur = 0; 
                }
                ctx.beginPath(); 
                ctx.arc(b.cx, b.cy, b.r+5, -Math.PI/2, -Math.PI/2 + Math.PI*2*Math.min(ratio, 1)); 
                ctx.stroke();
                ctx.shadowBlur = 0;
            } else if (key === 'hc') {
                let ratio = player.hcCharge / player.maxHcCharge;
                if(ratio >= 1) { 
                    ctx.strokeStyle = '#9b59b6'; 
                    ctx.shadowBlur = 15; 
                    ctx.shadowColor = '#9b59b6'; 
                } else { 
                    ctx.strokeStyle = 'rgba(155, 89, 182, 0.3)'; 
                    ctx.shadowBlur = 0; 
                }
                ctx.beginPath(); 
                ctx.arc(b.cx, b.cy, b.r+5, -Math.PI/2, -Math.PI/2 + Math.PI*2*Math.min(ratio, 1)); 
                ctx.stroke();
                ctx.shadowBlur = 0;
            } else if (key === 'gadget') {
                if(player.gadgetCooldown > 0) {
                    ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(30, 30, 30, 0.75)'; ctx.fill();
                    
                    let ratio = player.gadgetCooldown / 600;
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                    ctx.beginPath(); ctx.moveTo(b.cx, b.cy); ctx.arc(b.cx, b.cy, b.r, -Math.PI/2, -Math.PI/2 + Math.PI*2*ratio); ctx.fill();
                    
                    let remainingSec = (player.gadgetCooldown / 60).toFixed(1);
                    ctx.fillStyle = '#ffffff';
                    ctx.strokeStyle = '#1e272e';
                    ctx.lineWidth = 3;
                    ctx.font = '900 18px Nunito';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.strokeText(remainingSec + "s", b.cx, b.cy);
                    ctx.fillText(remainingSec + "s", b.cx, b.cy);
                }
            }
        }
    }
    
    if(player && player.hp > 0) {
        let bw = 200; let bx = cw/2 - bw/2; let by = ch - 50;
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, 20);
        ctx.fillStyle = '#2ecc71'; ctx.fillRect(bx, by, bw * (player.hp/player.maxHp), 20);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, bw, 20);
        ctx.fillStyle = '#fff'; ctx.font = '900 16px Nunito'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.strokeText(player.hp, cw/2, by+10); ctx.fillText(player.hp, cw/2, by+10);
        
        let slotW = bw / player.maxAmmo;
        for(let i=0; i<player.maxAmmo; i++) {
            let sx = bx + i*slotW;
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(sx, by+25, slotW-4, 12);
            if (player.type === 'pius') {
                if (player.piusReloading) {
                    let maxTimer = player.reloadTime * player.maxAmmo;
                    if (player.sp === 'no_gap') maxTimer /= 1.2;
                    let r = player.reloadTimer / maxTimer;
                    if (r > i / player.maxAmmo) {
                        let fillRatio = Math.min(1, (r - (i/player.maxAmmo)) * player.maxAmmo);
                        ctx.fillStyle = '#e67e22'; ctx.fillRect(sx, by+25, (slotW-4)*fillRatio, 12);
                    }
                } else {
                    if(player.ammo > i) {
                        ctx.fillStyle = '#f39c12'; ctx.fillRect(sx, by+25, slotW-4, 12);
                    }
                }
            } else {
                if(player.ammo > i) {
                    ctx.fillStyle = '#f39c12'; ctx.fillRect(sx, by+25, slotW-4, 12);
                } else if (player.ammo === i) {
                    let aRatio = player.reloadTimer / (player.type==='shelly'&&player.hcActive ? player.reloadTime/3 : player.reloadTime);
                    ctx.fillStyle = '#e67e22'; ctx.fillRect(sx, by+25, (slotW-4)*aRatio, 12);
                }
            }
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(sx, by+25, slotW-4, 12);
        }
    }
}

/** ==========================================
 * メインループ
 * ========================================== */
function loop(now) {
    requestAnimationFrame(loop);
    
    if (!Game.lastTime) Game.lastTime = now;
    let elapsed = now - Game.lastTime;
    Game.lastTime = now;
    
    if (elapsed > 160) elapsed = 160; 
    
    Game.timeScale = elapsed / (1000 / 60);

    if(Game.state !== 'playing') return;
    
    Game.update();
    cam.update(player);
    
    ctx.clearRect(0,0,cw,ch);
    
    ctx.save();
    ctx.scale(cam.zoom, cam.zoom);
    Game.draw(ctx, cam);
    ctx.restore();
    
    drawUI();
}

document.getElementById('btnStart').addEventListener('click', () => {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameCanvas').style.display = 'block';
    Input.initLayout();
    
    const selfSlot = SlotsManager.slots[0];
    Game.init(document.getElementById('selMode').value, selfSlot.brawler);
});

document.getElementById('btnCloseResults').addEventListener('click', () => {
    document.getElementById('resultsScreen').style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
    SlotsManager.render();
});

Input.initLayout();
requestAnimationFrame((now) => {
    Game.lastTime = now;
    loop(now);
});

</script>
