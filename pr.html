<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ブロスタ風 2Dアクション プロ版 3.3.2 (編成シミュレータ＆賞金稼ぎ＆画面最適化)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght=800;900&display=swap');
        
        :root {
            --bg-dark: #0f0f1a;
            --panel-bg: #1d1d35;
            --panel-border: #4a4a7a;
            --btn-blue: #3498db; --btn-blue-shadow: #217dbb;
            --btn-yellow: #f1c40f; --btn-yellow-shadow: #c29d0b;
            --btn-red: #e74c3c; --btn-red-shadow: #c0392b;
            --btn-green: #2ecc71; --btn-green-shadow: #27ae60;
            --text-main: #ffffff;
            --font-main: 'Nunito', sans-serif;
        }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; background-color: var(--bg-dark); color: var(--text-main);
            font-family: var(--font-main); overflow: hidden; overscroll-behavior: none;
        }
        
        /* キャンバスとUIレイヤー */
        #gameCanvas { display: none; width: 100%; height: 100%; display: block; image-rendering: pixelated; }
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        
        /* メニュー画面 (横画面モバイルに特化した全画面レイアウト) */
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #23233c 0%, #0c0c14 100%);
            background-size: 30px 30px;
            background-image: radial-gradient(#ffffff0a 1px, transparent 1px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20;
            padding: 10px 15px; overflow: hidden;
        }
        h1 {
            font-size: 1.8rem; margin-bottom: 4px; color: #f1c40f; letter-spacing: 2px;
            text-shadow: 0 3px 0 #c29d0b, 0 6px 8px rgba(0,0,0,0.6);
            -webkit-text-stroke: 1.5px #111;
            animation: pulseTitle 2s ease-in-out infinite alternate;
            line-height: 1;
        }
        @keyframes pulseTitle {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        /* 本格フレンドバトル編成シミュレーター UI (横画面高さを抑えるための超コンパクト設計) */
        .battle-setup-container {
            display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 900px;
            background: rgba(29, 29, 53, 0.95); padding: 10px 15px; border-radius: 16px;
            border: 3px solid var(--panel-border); box-shadow: 0 8px 24px rgba(0,0,0,0.7);
            flex-grow: 1; max-height: calc(100vh - 110px); min-height: 0;
        }
        
        .setup-row {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.08); padding-bottom: 4px;
        }

        .mode-selection-area {
            display: flex; align-items: center; gap: 8px;
        }
        .mode-label { font-size: 0.9rem; color: #00d2d3; font-weight: bold; text-shadow: 1px 1px 0 #000; }
        
        /* チームスロットレイアウト */
        .teams-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; flex-grow: 1; min-height: 0;
        }

        .team-box {
            background: rgba(15, 15, 26, 0.6); border-radius: 12px; padding: 8px;
            border: 2px dashed rgba(255,255,255,0.15);
            display: flex; flex-direction: column; min-height: 0; height: 100%;
        }
        .team-blue { border-color: rgba(52, 152, 219, 0.5); background: rgba(52, 152, 219, 0.04); }
        .team-red { border-color: rgba(231, 76, 60, 0.5); background: rgba(231, 76, 60, 0.04); }

        .team-title {
            font-size: 0.85rem; font-weight: 900; margin-bottom: 6px; display: flex; justify-content: space-between;
            flex-shrink: 0;
        }
        .team-blue .team-title { color: #3498db; }
        .team-red .team-title { color: #e74c3c; }

        /* スロットリスト自体をスクロール可能にすることで、11人表示等に対応し画面内収まりを保証 */
        .slots-list {
            display: flex; flex-direction: column; gap: 5px; overflow-y: auto; flex-grow: 1; min-height: 0;
            padding-right: 4px;
        }
        .slots-list::-webkit-scrollbar {
            width: 4px;
        }
        .slots-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.02);
            border-radius: 2px;
        }
        .slots-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
        }

        /* スロットカードスタイル (高さを抑えて情報密度をアップ) */
        .slot-card {
            display: flex; align-items: center; justify-content: space-between;
            background: #23233c; border: 2px solid #3d3d5c; border-radius: 8px;
            padding: 5px 8px; cursor: pointer; transition: transform 0.1s, border-color 0.1s;
            pointer-events: auto; flex-shrink: 0;
        }
        .slot-card:hover { border-color: #52528c; }
        .slot-card:active { transform: scale(0.98); }
        .slot-card.player-self { border-color: #2ecc71; background: rgba(46, 204, 113, 0.08); }
        .slot-card.disabled-slot { opacity: 0.4; border-style: dotted; background: #151522; }

        .slot-left { display: flex; align-items: center; gap: 6px; }
        .slot-icon {
            width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 1.1rem; border: 1.5px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .slot-info { display: flex; flex-direction: column; }
        .slot-name { font-size: 0.75rem; font-weight: 900; line-height: 1.1; }
        .slot-details { font-size: 0.7rem; color: #a5a5c5; line-height: 1.1; }

        .slot-right { display: flex; gap: 3px; align-items: center; }
        .badge {
            padding: 1px 4px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; color: #fff;
            white-space: nowrap;
        }
        .badge-gadget { background: #2ecc71; }
        .badge-sp { background: #f1c40f; color: #111; }
        .badge-disabled { background: #7f8c8d; }

        /* モーダルダイアログ */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; align-items: center;
            justify-content: center; z-index: 100; padding: 10px; pointer-events: auto;
        }
        .modal-content {
            background: #1d1d35; border: 3px solid var(--panel-border);
            border-radius: 16px; width: 100%; max-width: 440px; padding: 12px 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 8px;
        }
        .modal-header { font-size: 1.1rem; font-weight: 900; color: #f1c40f; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        
        select {
            appearance: none; padding: 8px 12px; border-radius: 8px; border: 2.5px solid #00d2d3;
            background: #1e1e2f; color: #fff; font-size: 0.85rem; font-family: var(--font-main); font-weight: bold;
            outline: none; cursor: pointer; box-shadow: 0 3px 0 #008f8f; transition: transform 0.1s; width: 100%;
        }
        select:active { transform: translateY(3px); box-shadow: 0 0 0 #008f8f; }

        .modal-buttons { display: flex; gap: 10px; margin-top: 5px; justify-content: flex-end; }
        .btn-modal {
            padding: 6px 15px; border-radius: 8px; border: none; font-family: var(--font-main); font-weight: 900; cursor: pointer; font-size: 0.85rem;
        }
        .btn-save { background: var(--btn-green); color: #fff; box-shadow: 0 3px 0 var(--btn-green-shadow); }
        .btn-save:active { transform: translateY(3px); box-shadow: 0 0 0 var(--btn-green-shadow); }
        .btn-cancel { background: #7f8c8d; color: #fff; box-shadow: 0 3px 0 #5f6c6d; }
        .btn-cancel:active { transform: translateY(3px); box-shadow: 0 0 0 #5f6c6d; }

        /* ボトムアクションバー */
        .bottom-action-bar {
            display: flex; width: 100%; max-width: 900px; justify-content: center; gap: 12px; align-items: center; margin-top: 6px;
            flex-shrink: 0;
        }
        .bottom-action-bar select { width: auto; min-width: 180px; padding: 6px 10px; }

        .btn-start {
            padding: 8px 30px; border-radius: 12px; border: none;
            background: var(--btn-yellow); color: #222; font-size: 1.15rem; font-weight: 900;
            font-family: var(--font-main); cursor: pointer;
            box-shadow: 0 4px 0 var(--btn-yellow-shadow), 0 6px 10px rgba(0,0,0,0.4);
            text-transform: uppercase; transition: transform 0.1s, box-shadow 0.1s;
            pointer-events: auto;
        }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 0 0 var(--btn-yellow-shadow); }

        /* ゲーム内HUD */
        #hud-top {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 5px; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.65); padding: 8px 30px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.2);
            font-size: 1.3rem; font-weight: 900; text-shadow: 2px 2px 0 #000;
            min-width: 260px; text-align: center;
        }
        .score-blue { color: #3498db; } .score-red { color: #e74c3c; }
        #kill-log {
            position: absolute; top: 20px; right: 20px; font-size: 0.9rem; font-weight: bold;
            text-align: right; text-shadow: 1px 1px 2px #000; display: flex; flex-direction: column; gap: 5px;
        }
        .log-item { background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 10px; animation: fadeOut 4s forwards; }
        @keyframes fadeOut { 0% { opacity: 1; transform: translateX(0); } 80% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(20px); } }

        /* リザルトスコアボード画面 */
        #resultsScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 28, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 30; padding: 20px; overflow-y: auto;
        }
        #resultsScreen h2 {
            font-size: 2.5rem; color: #f1c40f; text-shadow: 0 3px 0 #c29d0b;
            margin-bottom: 15px; text-align: center; -webkit-text-stroke: 1px #000;
        }
        .results-container {
            width: 100%; max-width: 700px; background: #22223b;
            border-radius: 15px; border: 3px solid #4a4a6a;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); overflow: hidden;
            margin-bottom: 15px;
        }
        .results-table {
            width: 100%; border-collapse: collapse; text-align: left;
        }
        .results-table th, .results-table td {
            padding: 10px 15px; border-bottom: 1.5px solid #2d2d44; font-size: 0.95rem;
        }
        .results-table th {
            background-color: #1a1a2e; color: #00d2d3; font-weight: 900; font-size: 1rem;
        }
        .results-table tr.highlight {
            background-color: rgba(241, 196, 15, 0.15); font-weight: bold;
        }
        .results-table tr.highlight td:first-child {
            color: #f1c40f;
        }
        .btn-close-results {
            padding: 12px 35px; border-radius: 12px; border: none;
            background: var(--btn-blue); color: #fff; font-size: 1.2rem; font-weight: 900;
            font-family: var(--font-main); cursor: pointer;
            box-shadow: 0 4px 0 var(--btn-blue-shadow);
            transition: transform 0.1s;
        }
        .btn-close-results:active { transform: translateY(4px); box-shadow: 0 0 0 var(--btn-blue-shadow); }

        /* 画面回転警告 */
        #rotatePrompt {
            position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg-dark);
            display: none; z-index: 100; align-items: center; justify-content: center; text-align: center;
        }
        #rotatePrompt h2 { color: #fff; font-size: 2rem; }
        @media screen and (orientation: portrait) {
            #rotatePrompt { display: flex; flex-direction: column; }
            #menu, #gameCanvas, #uiLayer, #resultsScreen, .modal { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="rotatePrompt">
        <h2>📱 スマホを横向きにしてください</h2><p>Please rotate your device.</p>
    </div>

    <!-- メニュー画面 -->
    <div id="menu">
        <h1>BRAWL CLONE</h1>
        
        <div class="battle-setup-container">
            <div class="setup-row">
                <div style="font-size:0.95rem; font-weight: 900; color:#fff;">🛡️ メンバー編成シミュレーター</div>
                <div style="font-size:0.75rem; color:#a5a5c5;">枠タップでキャラ・ガジェット・スタパを詳細カスタム！</div>
            </div>

            <div class="teams-grid">
                <!-- 青チーム (味方) -->
                <div class="team-box team-blue">
                    <div class="team-title">
                        <span>🟢 味方チーム (TEAM ALPHA)</span>
                        <span id="blueCountText">3人</span>
                    </div>
                    <div class="slots-list" id="blueSlots">
                        <!-- JSで動的に構築されます -->
                    </div>
                </div>

                <!-- 赤チーム (敵) -->
                <div class="team-box team-red">
                    <div class="team-title">
                        <span>🔴 敵チーム (TEAM OMEGA)</span>
                        <span id="redCountText">3人</span>
                    </div>
                    <div class="slots-list" id="redSlots">
                        <!-- JSで動的に構築されます -->
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-action-bar">
            <div class="mode-selection-area">
                <span class="mode-label">モード</span>
                <select id="selMode">
                    <option value="gemgrab">💎 エメラルドハント (3v3)</option>
                    <option value="wipeout">⚔️ 殲滅 (3v3)</option>
                    <option value="bounty">⭐ 賞金稼ぎ (3v3 - 星奪い合い)</option>
                    <option value="knockout">💀 ノックアウト (3v3 / 3ラウンド2本先取)</option>
                    <option value="showdown">🏜️ ソロバトル (1v11 / バロワイヤル)</option>
                </select>
            </div>
            <button class="btn-start" id="btnStart">BATTLE START</button>
        </div>
    </div>

    <!-- スロット編集用モーダル -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">スロット編集</div>
            
            <div style="display:flex; flex-direction:column; gap:3px;">
                <label style="font-size:0.8rem; color:#00d2d3; font-weight:bold;">キャラクター</label>
                <select id="modalCharSelect"></select>
            </div>

            <div style="display:flex; flex-direction:column; gap:3px;" id="modalGadgetArea">
                <label style="font-size:0.8rem; color:#00d2d3; font-weight:bold;">ガジェット</label>
                <select id="modalGadgetSelect"></select>
            </div>

            <div style="display:flex; flex-direction:column; gap:3px;" id="modalSpArea">
                <label style="font-size:0.8rem; color:#00d2d3; font-weight:bold;">スターパワー</label>
                <select id="modalSpSelect"></select>
            </div>

            <div class="modal-buttons">
                <button class="btn-modal btn-cancel" id="btnModalCancel">キャンセル</button>
                <button class="btn-modal btn-save" id="btnModalSave">設定を適用</button>
            </div>
        </div>
    </div>

    <!-- リザルト画面 -->
    <div id="resultsScreen">
        <h2 id="resultsTitle">🎉 BATTLE RESULTS</h2>
        <div class="results-container">
            <table class="results-table">
                <thead>
                    <tr>
                        <th>キャラクター</th>
                        <th>チーム / 所属</th>
                        <th>キル数 (KILLS)</th>
                        <th>デス数 (DEATHS)</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                    <!-- JavaScriptで動的に挿入されます -->
                </tbody>
            </table>
        </div>
        <button class="btn-close-results" id="btnCloseResults">メニューに戻る</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div id="hud-top"></div>
        <div id="kill-log"></div>
    </div>

/** ==========================================
 * スロット管理システム (編成シミュレーター)
 * ========================================== */
const SlotsManager = {
    slots: [], // 各スロットのデータ配列
    currentEditIndex: -1,

    init() {
        // デフォルトのスロット構成を設定
        this.slots = [];
        
        // プレイヤー自身 (Slot 0 - Blue Team)
        this.slots.push({
            isPlayer: true,
            team: 1, // 1: Blue, 2: Red
            brawler: 'pius', // デフォルトをピアスに
            gadget: 'shield_absorb',
            sp: 'auto_aim',
            enabled: true,
            name: 'YOU (プレイヤー)'
        });

        // 味方スロット (Slot 1, 2 - Blue Team)
        this.slots.push({ isPlayer: false, team: 1, brawler: 'colt', gadget: 'one', sp: 'million', enabled: true, name: '味方ボットA' });
        this.slots.push({ isPlayer: false, team: 1, brawler: 'primo', gadget: 'lariat', sp: 'speed', enabled: true, name: '味方ボットB' });

        // 敵スロット (Slot 3, 4, 5 - Red Team)
        this.slots.push({ isPlayer: false, team: 2, brawler: 'gus', gadget: 'cracker', sp: 'master', enabled: true, name: '敵ボットA' });
        this.slots.push({ isPlayer: false, team: 2, brawler: 'mortis', gadget: 'spinner', sp: 'longdash', enabled: true, name: '敵ボットB' });
        this.slots.push({ isPlayer: false, team: 2, brawler: 'kit', gadget: 'cardboard', sp: 'fastcharge', enabled: true, name: '敵ボットC' });

        // ショーダウン用スロット (最大11敵)
        for (let i = 1; i <= 11; i++) {
            this.slots.push({
                isPlayer: false,
                team: i + 1, // 各自別のチーム
                brawler: 'random',
                gadget: 'random',
                sp: 'random',
                enabled: true,
                name: `敵ボット${i}`
            });
        }

        this.render();
    },

    // 現在のモードに合わせて枠の可視状態、編成数を切り替える
    render() {
        const mode = document.getElementById('selMode').value;
        const blueSlotsList = document.getElementById('blueSlots');
        const redSlotsList = document.getElementById('redSlots');
        blueSlotsList.innerHTML = '';
        redSlotsList.innerHTML = '';

        let blueCount = 0;
        let redCount = 0;

        // 表示スロットの定義
        this.slots.forEach((slot, index) => {
            // ショーダウン時の調整
            if (mode === 'showdown') {
                if (slot.isPlayer) {
                    // プレイヤー枠を表示
                    blueSlotsList.appendChild(this.createCardElement(slot, index));
                    blueCount++;
                } else if (index >= 6 && index < 17) {
                    // 敵ボット11体を表示
                    redSlotsList.appendChild(this.createCardElement(slot, index));
                    if (slot.enabled) redCount++;
                }
            } else {
                // 3v3モード (gemgrab, wipeout, bounty, knockout)
                if (index < 6) {
                    if (slot.team === 1) {
                        blueSlotsList.appendChild(this.createCardElement(slot, index));
                        if (slot.enabled) blueCount++;
                    } else {
                        redSlotsList.appendChild(this.createCardElement(slot, index));
                        if (slot.enabled) redCount++;
                    }
                }
            }
        });

        document.getElementById('blueCountText').textContent = `${blueCount}人`;
        document.getElementById('redCountText').textContent = `${redCount}人`;
    },

    createCardElement(slot, index) {
        const card = document.createElement('div');
        card.className = `slot-card ${slot.isPlayer ? 'player-self' : ''} ${!slot.enabled ? 'disabled-slot' : ''}`;
        
        let charName = '';
        let charIcon = '❓';
        let charColor = '#7f8c8d';

        if (!slot.enabled) {
            charIcon = '❌';
            charName = '不参加 (DISABLED)';
        } else if (slot.brawler === 'random') {
            charIcon = '🎲';
            charName = 'ランダム (RANDOM)';
            charColor = '#1abc9c';
        } else {
            const data = CHAR_DATA[slot.brawler];
            if (data) {
                charName = data.name;
                charIcon = data.icon;
                charColor = data.color;
            }
        }

        let gadgetLabel = 'ランダム';
        let spLabel = 'ランダム';

        if (slot.enabled && slot.brawler !== 'random') {
            const data = CHAR_DATA[slot.brawler];
            if (data) {
                const gObj = data.gadgets.find(g => g.id === slot.gadget);
                gadgetLabel = gObj ? gObj.name.split(' (')[0] : 'ランダム';
                
                const spObj = data.sps.find(s => s.id === slot.sp);
                spLabel = spObj ? spObj.name.split(' (')[0] : 'ランダム';
            }
        }

        card.innerHTML = `
            <div class="slot-left">
                <div class="slot-icon" style="background-color: ${charColor}33; border-color: ${charColor};">${charIcon}</div>
                <div class="slot-info">
                    <span class="slot-name">${slot.name}</span>
                    <span class="slot-details" style="color: ${charColor}; font-weight: bold;">${charName}</span>
                </div>
            </div>
            <div class="slot-right">
                ${!slot.enabled ? '<span class="badge badge-disabled">不参加</span>' : `
                    <span class="badge badge-gadget">🔧 ${gadgetLabel}</span>
                    <span class="badge badge-sp">⭐ ${spLabel}</span>
                `}
            </div>
        `;

        card.addEventListener('click', () => {
            this.openEditModal(index);
        });

        return card;
    },

    openEditModal(index) {
        this.currentEditIndex = index;
        const slot = this.slots[index];
        const modal = document.getElementById('editModal');
        const modalTitle = document.getElementById('modalTitle');
        const charSelect = document.getElementById('modalCharSelect');

        modalTitle.textContent = `${slot.name} のカスタム設定`;
        
        // キャラクター選択肢の構築
        charSelect.innerHTML = '';
        if (!slot.isPlayer) {
            charSelect.innerHTML += `<option value="disabled">❌ 不参加 (DISABLED - 数的有利不利用)</option>`;
            charSelect.innerHTML += `<option value="random">🎲 ランダム (RANDOM)</option>`;
        }
        for (let key in CHAR_DATA) {
            charSelect.innerHTML += `<option value="${key}">${CHAR_DATA[key].icon} ${CHAR_DATA[key].name}</option>`;
        }

        // 現在の値を反映
        if (!slot.enabled) {
            charSelect.value = 'disabled';
        } else {
            charSelect.value = slot.brawler;
        }

        this.updateModalSubSelects();
        modal.style.display = 'flex';
    },

    updateModalSubSelects() {
        const brawler = document.getElementById('modalCharSelect').value;
        const gadgetArea = document.getElementById('modalGadgetArea');
        const spArea = document.getElementById('modalSpArea');
        const gadgetSelect = document.getElementById('modalGadgetSelect');
        const spSelect = document.getElementById('modalSpSelect');

        if (brawler === 'disabled' || brawler === 'random') {
            gadgetArea.style.display = 'none';
            spArea.style.display = 'none';
        } else {
            gadgetArea.style.display = 'flex';
            spArea.style.display = 'flex';

            const data = CHAR_DATA[brawler];
            gadgetSelect.innerHTML = `<option value="random">🎲 ランダムガジェット</option>` + data.gadgets.map(g => `<option value="${g.id}">🔧 ${g.name}</option>`).join('');
            spSelect.innerHTML = `<option value="random">🎲 ランダムスターパワー</option>` + data.sps.map(s => `<option value="${s.id}">⭐ ${s.name}</option>`).join('');

            const slot = this.slots[this.currentEditIndex];
            if (slot.brawler === brawler) {
                gadgetSelect.value = slot.gadget;
                spSelect.value = slot.sp;
            } else {
                gadgetSelect.value = 'random';
                spSelect.value = 'random';
            }
        }
    },

    saveModalSettings() {
        const index = this.currentEditIndex;
        if (index === -1) return;

        const slot = this.slots[index];
        const brawler = document.getElementById('modalCharSelect').value;

        if (brawler === 'disabled') {
            slot.enabled = false;
        } else {
            slot.enabled = true;
            slot.brawler = brawler;
            if (brawler !== 'random') {
                slot.gadget = document.getElementById('modalGadgetSelect').value;
                slot.sp = document.getElementById('modalSpSelect').value;
            } else {
                slot.gadget = 'random';
                slot.sp = 'random';
            }
        }

        document.getElementById('editModal').style.display = 'none';
        this.render();
    }
};

document.getElementById('selMode').addEventListener('change', () => {
    SlotsManager.render();

/** ==========================================
 * 基盤システム・ユーティリティ & デルタタイム定義
 * ========================================== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let cw, ch;
function resize() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function dist(x1,y1,x2,y2) { return Math.hypot(x1-x2, y1-y2); }

function circleRectCollide(cx, cy, r, rx, ry, rw, rh) {
    let testX = cx, testY = cy;
    if (cx < rx) testX = rx; else if (cx > rx + rw) testX = rx + rw;
    if (cy < ry) testY = ry; else if (cy > ry + rh) testY = ry + rh;
    let dx = cx - testX, dy = cy - testY;
    return (dx*dx + dy*dy) <= r*r;
}

function lineRectCollide(x1, y1, x2, y2, rx, ry, rw, rh) {
    let left = rx, right = rx+rw, top = ry, bottom = ry+rh;
    let minX = Math.min(x1,x2), maxX = Math.max(x1,x2), minY = Math.min(y1,y2), maxY = Math.max(y1,y2);
    if(maxX < left || minX > right || maxY < top || minY > bottom) return false;
    return true; 
}

function getSafeLandingSpot(startX, startY, angle, jumpDist, characterRadius) {
    let rawDestX = startX + Math.cos(angle) * jumpDist;
    let rawDestY = startY + Math.sin(angle) * jumpDist;
    
    const margin = 25;
    rawDestX = Math.max(margin + characterRadius, Math.min(rawDestX, Game.mapW - margin - characterRadius));
    rawDestY = Math.max(margin + characterRadius, Math.min(rawDestY, Game.mapH - margin - characterRadius));
    
    function isLocationSafe(x, y, r) {
        if (x - r < margin || x + r > Game.mapW - margin) return false;
        if (y - r < margin || y + r > Game.mapH - margin) return false;
        for (let w of Game.map) {
            if (circleRectCollide(x, y, r * 0.8, w.x, w.y, w.w, w.h)) {
                return false;
            }
        }
        return true;
    }
    
    if (isLocationSafe(rawDestX, rawDestY, characterRadius)) {
        return { x: rawDestX, y: rawDestY };
    }
    
    let stepAngle = Math.PI / 8;
    let radiusStep = 10;
    let maxRadius = 300;
    
    for (let searchR = radiusStep; searchR <= maxRadius; searchR += radiusStep) {
        for (let a = 0; a < Math.PI * 2; a += stepAngle) {
            let checkX = rawDestX + Math.cos(a) * searchR;
            let checkY = rawDestY + Math.sin(a) * searchR;
            if (isLocationSafe(checkX, checkY, characterRadius)) {
                return { x: checkX, y: checkY };
            }
        }
    }
    return { x: rawDestX, y: rawDestY };
}

const Input = {

        super:  { type:'super',  id:null, cx:0, cy:0, x:0, y:0, angle:0, mag:0, r:45, color:'#f1c40f', icon:'💀', dragged:false, startTime:0, startX:0, startY:0 },
        gadget: { type:'gadget', id:null, cx:0, cy:0, x:0, y:0, angle:0, mag:0, r:35, color:'#2ecc71', icon:'🔧', dragged:false, startTime:0, startX:0, startY:0 },
        hc:     { type:'hc',     id:null, cx:0, cy:0, x:0, y:0, angle:0, mag:0, r:40, color:'#9b59b6', icon:'🔥', tapOnly:true, dragged:false, startTime:0, startX:0, startY:0 }
    },

        const rx = cw - 150, by = ch - 120;
        this.btns.attack.cx = rx;       this.btns.attack.cy = by;
        this.btns.super.cx  = rx - 110; this.btns.super.cy  = by - 20;
        this.btns.gadget.cx = rx - 50;  this.btns.gadget.cy = by - 120;

canvas.addEventListener('touchstart', handleTouch, {passive: false});
canvas.addEventListener('touchmove', handleTouch, {passive: false});
canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
canvas.addEventListener('touchcancel', handleTouchEnd, {passive: false});

function handleTouch(e) {
    e.preventDefault();
    Input.initLayout();
    for (let i=0; i<e.touches.length; i++) {
        const t = e.touches[i];
        if (t.clientX < cw / 2) {
            if (!Input.leftJoy.active) {
                Input.leftJoy.active = true; Input.leftJoy.id = t.identifier;
                Input.leftJoy.ox = t.clientX; Input.leftJoy.oy = t.clientY;
            }
            if (Input.leftJoy.id === t.identifier) {
                let dx = t.clientX - Input.leftJoy.ox, dy = t.clientY - Input.leftJoy.oy;
                let distVal = Math.hypot(dx, dy);
                Input.leftJoy.mag = Math.min(distVal / 60, 1);
                if (distVal > 0) { Input.leftJoy.nx = dx/distVal; Input.leftJoy.ny = dy/distVal; }
                Input.leftJoy.x = t.clientX; Input.leftJoy.y = t.clientY;
            }
        } 
        else {
            let assigned = false;
            for(let key in Input.btns) {
                let b = Input.btns[key];
                if(b.id === t.identifier) {
                    assigned = true;
                    b.x = t.clientX; b.y = t.clientY;
                    b.angle = Math.atan2(b.y - b.cy, b.x - b.cx);
                    b.mag = Math.min(Math.hypot(b.x - b.cx, b.y - b.cy) / b.r, 1);
                    
                    let dragDist = Math.hypot(b.x - b.startX, b.y - b.startY);
                    if (dragDist > 15 || b.mag > 0.3) {
                        b.dragged = true;
                    }
                    break;
                }
            }
            if(!assigned) {
                for(let key in Input.btns) {
                    let b = Input.btns[key];
                    if(b.id === null && Math.hypot(t.clientX - b.cx, t.clientY - b.cy) < b.r * 1.5) {
                        b.id = t.identifier; b.x = t.clientX; b.y = t.clientY;
                        b.angle = Math.atan2(b.y - b.cy, b.x - b.cx);
                        b.mag = Math.min(Math.hypot(b.x - b.cx, b.y - b.cy) / b.r, 1);
                        b.dragged = false; 
                        b.startTime = Date.now();
                        b.startX = t.clientX;
                        b.startY = t.clientY;
                        break;
                    }
                }
            }
        }
    }
}

function handleTouchEnd(e) {
    e.preventDefault();
    let currentIds = Array.from(e.touches).map(t => t.identifier);
    
    if (Input.leftJoy.active && !currentIds.includes(Input.leftJoy.id)) {
        Input.leftJoy.active = false; Input.leftJoy.id = null;
        Input.leftJoy.nx = Input.leftJoy.ny = Input.leftJoy.mag = 0;
    }
    for(let key in Input.btns) {
        let b = Input.btns[key];
        if (b.id !== null && !currentIds.includes(b.id)) {
            if (player && Game.state === 'playing') {
                if (player.hp > 0) {
                    if (key === 'hc') {
                        player.activateHC();
                    } else {
                        let pressDuration = Date.now() - b.startTime;
                        let totalDragDist = Math.hypot(b.x - b.startX, b.y - b.startY);

                        if (!b.dragged || (totalDragDist < 20 && pressDuration < 220) || b.mag < 0.3) {
                            let target = Game.findClosestEnemy(player, player.data.range * 3.5);
                            let finalAngle = target ? Math.atan2(target.y - player.y, target.x - player.x) : player.facing;
                            
                            if ((player.type === 'primo' || player.type === 'kit' || player.type === 'pius' || (player.type === 'chester' && player.chesterSuperType === 'explode')) && b.type === 'super' && target) {
                                player.autoAimTargetDist = dist(player.x, player.y, target.x, target.y);
                            } else {
                                player.autoAimTargetDist = null;
                            }
                            player.requestAttack(finalAngle, b.type);
                        } else {
                            if (b.mag < 0.35) {
                                Game.uiEffects.push(new FloatingText(player.x, player.y - 60, "CANCEL", '#ff4d4d', 16));
                            } else {
                                player.autoAimTargetDist = null; 
                                player.requestAttack(b.angle, b.type);
                            }
                        }
                    }
                }
            }
            b.id = null; b.mag = 0; b.dragged = false;
        }
    }
}


/** ==========================================
 * エフェクト・描画クラス
 * ========================================== */
class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x=x; this.y=y; this.color=color; this.size=size;
        this.vx=vx; this.vy=vy; this.life=life; this.maxLife=life;
    }
    update() { 
        this.x += this.vx * Game.timeScale; 
        this.y += this.vy * Game.timeScale; 
        this.vx *= Math.pow(0.9, Game.timeScale); 
        this.vy *= Math.pow(0.9, Game.timeScale); 
        this.life -= Game.timeScale; 
    }
    draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, this.life / this.maxLife));
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

class FloatingText {
    constructor(x, y, text, color, size=20) {
        this.x=x; this.y=y; this.text=text; this.color=color; this.size=size;
        this.life = 40; this.maxLife = 40; this.vy = -1.5;
    }
    update() { 
        this.y += this.vy * Game.timeScale; 
        this.life -= Game.timeScale; 
    }
    draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, this.life / this.maxLife));
        ctx.font = `900 ${this.size}px ${getComputedStyle(document.documentElement).getPropertyValue('--font-main')}`;
        ctx.fillStyle = this.color; ctx.textAlign = 'center';
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        ctx.strokeText(this.text, this.x, this.y); ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
    }
}


/** ==========================================
 * エンティティクラス
 * ========================================== */
class Entity {
    constructor(x, y, r) { this.x=x; this.y=y; this.r=r; this.remove=false; }
}

class Ghost extends Entity {
    constructor(x, y, owner) {
        super(x, y, 20);
        this.owner = owner;
        this.life = 10000;
        this.remove = false;
        this.team = owner.team;
    }
    update() {
        if (this.owner.hcActive) {
            this.attackTimer = (this.attackTimer || 0) + Game.timeScale;
            if (this.attackTimer >= 90) {
                let target = Game.findClosestEnemy(this, 500);
                if (target) {
                    let angle = Math.atan2(target.y - this.y, target.x - this.x);
                    let b = new Bullet(this.owner, angle, 16, 500, 1800, 10, 'normal');
                    b.x = this.x; b.y = this.y;
                    b.isGhostAttack = true; 
                    Game.bullets.push(b);
                }
                this.attackTimer = 0;
            }
        }

        Game.entities.forEach(e => {
            if (e.hp > 0 && e.team === this.team && dist(this.x, this.y, e.x, e.y) < this.r + e.r) {
                let healAmt = this.owner.sp === 'health' ? 3990 : 3000;
                e.hp = Math.min(e.maxHp, e.hp + healAmt);
                Game.uiEffects.push(new FloatingText(e.x, e.y - 45, `+${healAmt}`, '#2ecc71', 16));
                this.remove = true;
            }
        });
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y + Math.sin(Date.now()*0.005)*5);
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#bdc3c7';
        ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-5, -5, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(5, -5, 3, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }
}

// ピアスの弾薬
class PiusAmmo extends Entity {
    constructor(x, y, owner) {
        super(x, y, 15);
        this.owner = owner;
        this.pickupDelay = 30; // 0.5s 回収不可時間
        this.anim = Math.random() * Math.PI;
    }
    update() {
        this.anim += 0.1 * Game.timeScale;
        if (this.pickupDelay > 0) this.pickupDelay -= Game.timeScale;
        
        if (this.pickupDelay <= 0 && this.owner.hp > 0) {
            if (dist(this.x, this.y, this.owner.x, this.owner.y) < this.r + this.owner.r) {
                this.owner.collectPiusAmmo(this, true); 
                this.remove = true;
            }
        }
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y + Math.sin(this.anim)*5);
        ctx.fillStyle = '#3498db';
        ctx.globalAlpha = this.pickupDelay > 0 ? 0.5 : 1.0;
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        ctx.restore();
    }
}

class AreaEffect extends Entity {
    constructor(x, y, r, owner, type) {
        super(x, y, r);
        this.owner = owner;
        this.type = type;
        this.life = type === 'ice_zone' ? 600 : 180;
    }
    update() {
        this.life -= Game.timeScale;
        if (this.life <= 0) {
            this.remove = true;
            return;
        }
        
        let prevSec = Math.floor((this.life + Game.timeScale) / 60);
        let currSec = Math.floor(this.life / 60);
        if (currSec < prevSec) {
            Game.entities.forEach(e => {
                if (e.hp > 0 && e.team !== this.owner.team && dist(this.x, this.y, e.x, e.y) < this.r + e.r) {
                    if (this.type === 'ice_zone') {
                        let dmgMult = this.owner.hcActive ? 1.25 : 1;
                        if (this.owner.cubes > 0) dmgMult *= (1 + this.owner.cubes * 0.1);
                        e.takeDamage(500 * dmgMult, this.owner);
                        e.effects.push({ type: 'slow', time: 60 });
                    }
                }
            });
        }
        
        if (Math.random() < 0.3 * Game.timeScale) {
            Game.particles.push(new Particle(
                this.x + (Math.random() - 0.5) * this.r,
                this.y + (Math.random() - 0.5) * this.r,
                this.type === 'ice_zone' ? '#74b9ff' : '#00dec5',
                Math.random() * 5 + 2, 0, -1, 20
            ));
        }
    }
    draw(ctx) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        if (this.type === 'ice_zone') {
            ctx.fillStyle = 'rgba(116, 185, 255, 0.2)';
            ctx.strokeStyle = 'rgba(116, 185, 255, 0.5)';
        } else {
            ctx.fillStyle = 'rgba(0, 222, 197, 0.2)';
            ctx.strokeStyle = 'rgba(0, 222, 197, 0.5)';
        }
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
    }
}

// 青い星（タイブレーク用の真ん中スター）
class BountyCenterStar extends Entity {
    constructor(x, y) {
        super(x, y, 16);
        this.anim = 0;
    }
    update() {
        this.anim += 0.05 * Game.timeScale;
        Game.entities.forEach(e => {
            if (e.hp > 0 && dist(this.x, this.y, e.x, e.y) < this.r + e.r) {
                // 拾ったキャラクターに星を加算、チームスコア加算
                e.bountyStars = (e.bountyStars || 2) + 1;
                if (e.team === 1) Game.score.t1++; else Game.score.t2++;
                Game.uiEffects.push(new FloatingText(e.x, e.y - 45, "+1 ⭐", '#f1c40f', 22));
                
                // 取得パーティクル
                for (let i = 0; i < 12; i++) {
                    Game.particles.push(new Particle(this.x, this.y, '#3498db', 5, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8, 20));
                }
                this.remove = true;
            }
        });
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y + Math.sin(this.anim) * 5);
        ctx.rotate(this.anim * 0.5);
        ctx.fillStyle = '#3498db';
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * 16, Math.sin((18 + i * 72) * Math.PI / 180) * 16);
            ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * 7, Math.sin((54 + i * 72) * Math.PI / 180) * 7);
        }
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.restore();
    }
}

class Character extends Entity {
    constructor(type, isPlayer, team, x, y, customSlot = null) {
        super(x, y, 22);
        this.type = type; this.isPlayer = isPlayer; this.team = team;
        this.data = CHAR_DATA[type];
        this.hp = this.maxHp = this.data.hp;
        this.baseSpeed = this.data.speed;
        this.maxAmmo = this.data.ammo; this.ammo = this.maxAmmo;
        this.reloadTime = this.data.reload; this.reloadTimer = 0;
        
        this.superCharge = 0; this.maxSuperCharge = 100;
        this.hcCharge = 0; this.maxHcCharge = 250;
        
        this.gadgetCooldown = 0; this.hcActive = false; this.hcTimer = 0;
        
        this.effects = []; this.fireQueue = [];
        this.dashTimer = 0; this.dashVx = 0; this.dashVy = 0;
        this.invincible = false; this.z = 0;
        this.gems = 0; this.cubes = 0;
        
        this.kills = 0; this.deaths = 0;
        this.facing = 0; this.lastDamagedTimer = 0;
        this.autoAimTargetDist = null;
        
        this.ghostGauge = 0;
        this.shield = 0;
        this.longDashGauge = 0;

        // 通常攻撃間隔クールダウン（連射速度を最高0.2秒に抑制用）
        this.attackIntervalTimer = 0;

        // ノックバック・引き寄せ滑らか壁めり込み防止用変数
        this.pushVx = 0;
        this.pushVy = 0;
        this.pushTimer = 0;

        // 賞金稼ぎモード用
        this.bountyStars = 2; // スタート時・復活時は2個固定

        // キット固有
        this.invisibleTimer = 0;
        this.ridingTarget = null;
        this.ridingTimer = 0;
        this.kitStunCooldown = 0;

        // チェスター固有
        this.chesterGauge = 0;
        this.chesterSuperTypes = ['explode', 'stun', 'heal', 'poison', 'ice'];
        this.chesterSuperType = this.chesterSuperTypes[Math.floor(Math.random() * this.chesterSuperTypes.length)];
        this.candyBuffTimer = 0;
        this.candyBuffType = '';
        
        // ピアス固有
        if (this.type === 'pius') {
            this.piusReloading = false;
            this.piusHCDelayTimer = 0;
        }

        // スロットに基づくカスタム装備の設定
        if (customSlot) {
            this.name = customSlot.isPlayer ? "YOU" : customSlot.name;
            
            // ガジェット設定
            if (customSlot.gadget === 'random') {
                this.gadget = this.data.gadgets[Math.floor(Math.random() * this.data.gadgets.length)].id;
            } else {
                this.gadget = customSlot.gadget;
            }

            // スタパ設定
            if (customSlot.sp === 'random') {
                this.sp = this.data.sps[Math.floor(Math.random() * this.data.sps.length)].id;
            } else {
                this.sp = customSlot.sp;
            }
        } else {
            // フォールバック
            if(isPlayer) {
                const selGadget = document.getElementById('selGadget');
                const selSp = document.getElementById('selSp');
                this.gadget = selGadget ? selGadget.value : 'dash';
                this.sp = selSp ? selSp.value : 'hyper';
                this.name = "YOU";
            } else {
                this.gadget = this.data.gadgets[Math.floor(Math.random()*this.data.gadgets.length)].id;
                this.sp = this.data.sps[Math.floor(Math.random()*this.data.sps.length)].id;
                this.name = "Bot " + Math.floor(Math.random()*99);
            }
        }

        if (this.sp === 'combo' && this.type === 'shelly') this.maxAmmo = 4;
        if (this.sp === 'speedcat' && this.type === 'kit') this.baseSpeed = CHAR_DATA.kit.speed * 1.1;
        
        this.aiState = 'fight'; 
        this.aiTarget = null;
        this.moveAng = 0; this.aiTimer = 0;
        this.stuckTimer = 0; 
        this.lastX = x; this.lastY = y;
    }
    
    getSpeed() {
        if (this.ridingTarget) return 0;
        if (this.effects.some(e => e.type === 'stun')) return 0;
        let s = this.baseSpeed;
        if(this.hcActive) s *= 1.25;
        if(this.effects.some(e=>e.type==='speed')) s *= 1.3;
        if(this.effects.some(e=>e.type==='slow')) s *= 0.6;
        if(this.candyBuffTimer > 0 && this.candyBuffType === 'speed') s *= 1.35;
        return s;
    }
    
    takeDamage(dmg, attacker) {
        if(this.invincible || this.hp <= 0) return;
        if(this.hcActive && this.type === 'shelly') dmg *= 0.5; 
        if(this.cubes > 0) dmg = dmg * (1 - Math.min(this.cubes*0.05, 0.5));
        
        if (this.shield && this.shield > 0) {
            if (this.shield >= dmg) {
                this.shield -= dmg;
                dmg = 0;
            } else {
                dmg -= this.shield;
                this.shield = 0;
            }
            Game.uiEffects.push(new FloatingText(this.x, this.y - 60, "BLOCKED", '#f1c40f', 14));
        }

        if (dmg <= 0) return;

        let finalDmg = Math.floor(dmg);
        this.hp -= finalDmg;
        this.lastDamagedTimer = 0; 
        
        if (this.type === 'kit' && this.invisibleTimer > 0) {
            this.invisibleTimer = 0;
            Game.uiEffects.push(new FloatingText(this.x, this.y - 60, "REVEALED", '#ff4757', 15));
        }
        
        if (this.isPlayer && navigator.vibrate) {
            navigator.vibrate(100);
        }
        
        Game.uiEffects.push(new FloatingText(this.x + (Math.random()-0.5)*20, this.y - 30, finalDmg, '#ff4757'));
        
        if(this.hp <= 0) this.die(attacker);
        else this.chargeSuper(finalDmg * 0.015);
    }
    
    chargeSuper(amt) {
        let rate = this.data.superChargeRate || 1;
        this.superCharge = Math.min(this.maxSuperCharge, this.superCharge + amt * rate);
        this.hcCharge = Math.min(this.maxHcCharge, this.hcCharge + amt * rate * 0.6);
    }
    
    die(attacker) {
        this.hp = 0;
        this.deaths++; 
        
        this.effects = [];
        
        if (this.ridingTarget) {
            this.ridingTarget.effects = this.ridingTarget.effects.filter(e => e.type !== 'stun');
            this.ridingTarget = null;
        }

        Game.entities.forEach(e => {
            if (e.type === 'kit' && e.ridingTarget === this) {
                e.ridingTarget = null;
                e.effects = e.effects.filter(eff => eff.type !== 'stun');
                e.z = 0;
            }
        });
        
        if (attacker) {
            attacker.kills++;
            if (!Game.globalStats[attacker.name]) Game.globalStats[attacker.name] = { kills: 0, deaths: 0, brawler: attacker.data.name, team: attacker.team };
            Game.globalStats[attacker.name].kills++;
        }
        
        if (!Game.globalStats[this.name]) Game.globalStats[this.name] = { kills: 0, deaths: 0, brawler: this.data.name, team: this.team };
        Game.globalStats[this.name].deaths++;
        
        Game.addLog(attacker ? attacker.name : "System", this.name, this.team);
        
        for(let i=0; i<15; i++) Game.particles.push(new Particle(this.x, this.y, this.team===1?'#3498db':'#e74c3c', Math.random()*6+2, (Math.random()-0.5)*10, (Math.random()-0.5)*10, 30));
        
        // -------------------------------------------------------------
        // 各種ゲームモードの死亡時スコアリング＆アイテムドロップ処理
        // -------------------------------------------------------------
        if(Game.mode === 'gemgrab' && this.gems > 0) {
            for(let i=0; i<this.gems; i++) Game.items.push(new Item(this.x+(Math.random()-0.5)*50, this.y+(Math.random()-0.5)*50, 'gem'));
            this.gems = 0;
        } else if (Game.mode === 'showdown') {
            let dropCount = 1 + Math.floor(this.cubes/2);
            for(let i=0; i<dropCount; i++) Game.items.push(new Item(this.x+(Math.random()-0.5)*30, this.y+(Math.random()-0.5)*30, 'cube'));
        } else if (Game.mode === 'bounty') {
            // 賞金稼ぎ（Bounty）モードの処理：
            // 倒した敵チームに倒されたキャラが持っていた星をすべて加算
            if (attacker) {
                let starsGained = this.bountyStars;
                if (attacker.team === 1) {
                    Game.score.t1 += starsGained;
                } else {
                    Game.score.t2 += starsGained;
                }
                
                // 倒したキャラクター自身に星が引き継がれ加算される（持っていた星を相手にプレゼント＋自身の星加算）
                attacker.bountyStars = (attacker.bountyStars || 2) + 1; // 相手を倒すと、倒したキャラの頭上の星はさらに+1される
                Game.uiEffects.push(new FloatingText(attacker.x, attacker.y - 60, `+${starsGained} ⭐ (TOTAL)`, '#f1c40f', 22));
            }
            // 自身の星数はリセット（復活時は再び2個から）
            this.bountyStars = 2;
        }
        
        if(Game.mode === 'wipeout' && attacker) {
            if(attacker.team === 1) Game.score.t1++; else Game.score.t2++;
        }
        
        if(Game.mode === 'knockout' || Game.mode === 'showdown') {
            this.remove = true;
        } else {
            // 復活処理
            setTimeout(() => {
                if(Game.state === 'playing' && !this.remove) {
                    this.hp = this.maxHp;
                    let sp = Game.getSpawn(this.team);
                    this.x = sp.x; this.y = sp.y; this.ammo = this.maxAmmo;
                    this.pushTimer = 0; // ノックバック状態リセット
                    this.bountyStars = 2; // 賞金稼ぎ時は2個星から再スタート
                    this.invincible = true; setTimeout(()=>this.invincible=false, 3000);
                    if(this.type === 'pius') this.piusReloading = false;
                }
            }, 3000);
        }
    }

    activateHC() {
        if (this.hcCharge >= this.maxHcCharge) {
            this.hcCharge = 0; this.hcActive = true; this.hcTimer = 300; 
            Game.uiEffects.push(new FloatingText(this.x, this.y-50, "HYPER CHARGE!", '#9b59b6', 24));
        }
    }

    requestAttack(angle, btnType) {
        if(this.dashTimer > 0 || this.z > 0) return;
        if (this.ridingTarget) return;
        if (this.effects.some(e => e.type === 'stun')) return;
        
        this.facing = angle;
        this.lastDamagedTimer = 0; 
        
        if(btnType === 'normal') {
            // 連射速度制限（通常攻撃は前回の攻撃から0.2秒(12フレーム)間は放てない）
            if (this.attackIntervalTimer > 0) return;

            if (this.type === 'pius') {
                if (this.ammo >= 1 && !this.piusReloading) {
                    this.ammo--; 
                    this.executeAttack(angle, 'normal');
                    this.attackIntervalTimer = 12; // 0.2秒のインターバルを設定
                }
            } else if (this.ammo >= 1) {
                this.ammo--; 
                this.executeAttack(angle, 'normal');
                this.attackIntervalTimer = 12; // 0.2秒のインターバルを設定
            }
        } else if (btnType === 'super' && this.superCharge >= this.maxSuperCharge) {
            this.superCharge = 0; this.executeAttack(angle, 'super');
        } else if (btnType === 'gadget' && this.gadgetCooldown <= 0) {
            this.gadgetCooldown = 600; this.executeAttack(angle, 'gadget');
        }
    }
    
    // ピアス用 弾薬回収メソッド
    collectPiusAmmo(ammoObj, fireBullet) {
        if (this.ammo < this.maxAmmo) {
            this.ammo++;
        }
        if (this.piusReloading) {
            this.piusReloading = false;
            this.reloadTimer = 0;
        }
        
        Game.uiEffects.push(new FloatingText(this.x, this.y - 30, "+AMMO", '#3498db', 14));
        
        if (fireBullet) {
            let target = Game.findClosestEnemy(this, 600); // 射程内
            let angle = this.facing;
            if (target) {
                angle = Math.atan2(target.y - this.y, target.x - this.x);
            }
            let dmgMult = this.hcActive ? 1.25 : 1;
            if(this.cubes > 0) dmgMult *= (1 + this.cubes*0.1); 
            
            let b = new Bullet(this, angle, 18, 550, 1900 * dmgMult, 12, 'normal');
            b.pierce = true;
            b.isPiusAutoBullet = true;
            if (this.sp === 'auto_aim') {
                b.homing = true;
            }
            Game.bullets.push(b);
        }
    }
    
    // ピアス用 必殺技実行メソッド
    executePiusSuper(targetX, targetY, radius, dmgMult) {
        Game.entities.forEach(e => {
            if (e.hp > 0 && e.team !== this.team && dist(targetX, targetY, e.x, e.y) < radius + e.r) {
                e.takeDamage(2800 * dmgMult, this);
                
                let spawnAng = Math.atan2(this.y - e.y, this.x - e.x) + (Math.random()-0.5)*0.5;
                let spawnDist = 40;
                let ax = this.x + Math.cos(spawnAng) * spawnDist;
                let ay = this.y + Math.sin(spawnAng) * spawnDist;
                Game.areaEffects.push(new PiusAmmo(ax, ay, this));
                
                let angToEne = Math.atan2(e.y - this.y, e.x - this.x);
                let b = new Bullet(this, angToEne, 18, 550, 1900 * dmgMult, 12, 'super');
                b.pierce = true;
                b.isPiusAutoBullet = true;
                if (this.sp === 'auto_aim') b.homing = true;
                Game.bullets.push(b);
            }
        });
        
        for(let i=0; i<15; i++) Game.particles.push(new Particle(targetX, targetY, '#1abc9c', Math.random()*8+4, (Math.random()-0.5)*12, (Math.random()-0.5)*12, 20));
        Game.uiEffects.push(new FloatingText(targetX, targetY, "STRIKE!", '#1abc9c', 20));
    }

    executeAttack(angle, type) {
        let dmgMult = this.hcActive ? 1.25 : 1;
        if(this.cubes > 0) dmgMult *= (1 + this.cubes*0.1); 
        if(this.candyBuffTimer > 0 && this.candyBuffType === 'dmg_up') dmgMult *= 1.35;

        if (this.type === 'kit' && type !== 'gadget' && this.invisibleTimer > 0) {
            this.invisibleTimer = 0;
        }
        
        if(this.type === 'shelly') {
            let rangeMult = 1;
            if(type === 'normal') {
                if(this.sp === 'hyper' && this.ammo === this.maxAmmo -1) rangeMult = 1.3;
                for(let i=0; i<5; i++) {
                    let a = angle + (i - 2) * 0.12;
                    Game.bullets.push(new Bullet(this, a, 13, this.data.range*rangeMult, 450*dmgMult, 6, 'normal')); 
                }
            } else if (type === 'super') {
                for(let i=0; i<9; i++) {
                    let a = angle + (i - 4) * 0.15;
                    let b = new Bullet(this, a, 15, this.data.range*1.3, 480*dmgMult, 10, 'super'); 
                    b.knockback = 15; b.wallBreak = true; Game.bullets.push(b);
                }
            } else if (type === 'gadget') {
                if(this.gadget === 'dash') {
                    this.dashTimer = 15; this.dashVx = Math.cos(angle)*13; this.dashVy = Math.sin(angle)*13; 
                } else if(this.gadget === 'sharp') {
                    let b = new Bullet(this, angle, 17, this.data.range*1.5, 600*dmgMult, 5, 'gadget'); 
                    b.effects.push({type:'slow', time:150}); Game.bullets.push(b);
                }
            }
        }
        else if (this.type === 'colt') {
            if(type === 'normal') {
                let count = this.sp === 'million' ? 8 : 6;
                let sizeMult = this.sp === 'big' ? 1.5 : 1;
                for(let i=0; i<count; i++) {
                    this.fireQueue.push({ delay: i*4, angle: angle+(Math.random()-0.5)*0.06, speed: 15, range: this.data.range, dmg: 280*dmgMult, size: 7*sizeMult, type:'normal', hcColt: this.hcActive }); 
                }
            } else if (type === 'super') {
                for(let i=0; i<12; i++) {
                    this.fireQueue.push({ delay: i*3, angle: angle+(Math.random()-0.5)*0.08, speed: 17, range: this.data.range*1.2, dmg: 280*dmgMult, size: 12, type:'super', pierce: true, wallBreak: true }); 
                }
            } else if (type === 'gadget') {
                if(this.gadget === 'one') {
                    Game.bullets.push(new Bullet(this, angle, 22, this.data.range*1.5, 250*6*0.33 * dmgMult, 12, 'gadget')); 
                } else if (this.gadget === 'slow') {
                    let b = new Bullet(this, angle, 15, this.data.range, 0, 10, 'gadget'); 
                    b.textDmg = false; b.pierce = true; b.effects.push({type:'slow', time:180}); Game.bullets.push(b);
                }
            }
        }
        else if (this.type === 'primo') {
            if(type === 'normal') {
                let rMult = this.hcActive ? 1.5 : 1; let sMult = this.hcActive ? 1.5 : 1;
                for(let i=0; i<4; i++) {
                    this.fireQueue.push({ delay: i*4, angle: angle, speed: 12, range: this.data.range*rMult, dmg: 550*dmgMult, size: 20*sMult, type:'normal', spSpeed: this.sp==='speed' }); 
                }
            } else if (type === 'super') {
                let maxJumpDist = 400; let jumpDist = maxJumpDist;
                if (this.isPlayer) {
                    if (this.autoAimTargetDist !== null && this.autoAimTargetDist !== undefined) {
                        jumpDist = Math.min(this.autoAimTargetDist, maxJumpDist);
                        this.autoAimTargetDist = null;
                    } else {
                        let btn = Input.btns.super;
                        jumpDist = btn.mag * maxJumpDist;
                    }
                } else {
                    if (this.aiTarget) {
                        let d = dist(this.x, this.y, this.aiTarget.x, this.aiTarget.y);
                        jumpDist = Math.min(d, maxJumpDist);
                    }
                }
                let landingSpot = getSafeLandingSpot(this.x, this.y, angle, jumpDist, this.r);
                this.targetX = landingSpot.x; this.targetY = landingSpot.y;
                this.dashTimer = 40; this.invincible = true; this.z = 1;
            } else if (type === 'gadget') {
                if(this.gadget === 'lariat') {
                    this.dashTimer = 15; this.dashVx = Math.cos(angle)*15; this.dashVy = Math.sin(angle)*15; this.lariatDmg = 650 * dmgMult; 
                } else if (this.gadget === 'catch') {
                    // 引き寄せ用弾の発射（命中すると滑らかな引き寄せ処理を起動）
                    let b = new Bullet(this, angle, 16, 300, 150, 20, 'gadget'); 
                    b.pull = true; Game.bullets.push(b);
                }
            }
        }
        else if (this.type === 'gus') {
            if (type === 'normal') {
                let b = new Bullet(this, angle, 16, this.data.range, 2500 * dmgMult, 18, 'normal');
                b.isGusAttack = true;
                let maxGauge = this.sp === 'master' ? 1 : 2;
                if (this.hcActive) this.ghostGauge = maxGauge;
                if (this.ghostGauge >= maxGauge) {
                    b.spawnGhost = true;
                    this.ghostGauge = 0;
                }
                Game.bullets.push(b);
            } else if (type === 'super') {
                this.shield = 6000;
                
                // ガスの必殺技ノックバック：滑らかに＆壁埋まりしない移動処理
                Game.entities.forEach(e => {
                    if (e !== this && e.hp > 0 && e.team !== this.team && dist(this.x, this.y, e.x, e.y) < 150) {
                        let ang = Math.atan2(e.y - this.y, e.x - this.x);
                        e.pushVx = Math.cos(ang) * 12; // 滑らかな移動速度
                        e.pushVy = Math.sin(ang) * 12;
                        e.pushTimer = 10; // 10フレームかけてゆっくりノックバック
                        
                        // エフェクト
                        for(let i=0; i<8; i++) {
                            Game.particles.push(new Particle(e.x, e.y, '#f1c40f', 4, (Math.random()-0.5)*8, (Math.random()-0.5)*8, 12));
                        }
                    }
                });
                Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "SHIELD!", '#f1c40f', 20));
            } else if (type === 'gadget') {
                if (this.gadget === 'cracker') {
                    Game.ghosts.forEach(g => {
                        if (g.owner === this) {
                            g.remove = true;
                            Game.entities.forEach(e => {
                                if (e.team !== this.team && e.hp > 0 && dist(g.x, g.y, e.x, e.y) < e.r + 110) {
                                    e.takeDamage(2500 * dmgMult, this);
                                }
                            });
                            for(let i=0; i<15; i++) Game.particles.push(new Particle(g.x, g.y, '#f1c40f', 5, (Math.random()-0.5)*10, (Math.random()-0.5)*10, 20));
                        }
                    });
                } else if (this.gadget === 'summoner') {
                    this.ghostGauge = this.sp === 'master' ? 1 : 2;
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "GAUGE MAX!", '#2ecc71', 16));
                }
            }
        }
        else if (this.type === 'mortis') {
            if (type === 'normal') {
                let rangeMult = 1 + this.longDashGauge * 2; 
                this.longDashGauge = 0;
                let dashDist = 150 * rangeMult;
                this.dashTimer = dashDist / 15;
                this.dashVx = Math.cos(angle) * 15;
                this.dashVy = Math.sin(angle) * 15;
                this.mortisNormalDmg = 1500 * dmgMult;
                this.mortisHitTargets = new Set();
                this.isMortisHCInvincible = this.hcActive;
            } else if (type === 'super') {
                let b = new Bullet(this, angle, 16, 600, 2000 * dmgMult, 30, 'super');
                b.pierce = true;
                b.isMortisSuper = true;
                Game.bullets.push(b);
            } else if (type === 'gadget') {
                if (this.gadget === 'spinner') {
                    Game.entities.forEach(e => {
                        if (e !== this && e.team !== this.team && e.hp > 0 && dist(this.x, this.y, e.x, e.y) < this.r * 4 + e.r) {
                            e.takeDamage(3000 * dmgMult, this);
                        }
                    });
                    for (let i = 0; i < Math.PI * 2; i += Math.PI / 4) {
                        Game.particles.push(new Particle(this.x + Math.cos(i)*this.r*2, this.y + Math.sin(i)*this.r*2, '#2c3e50', 8, 0, 0, 15));
                    }
                } else if (this.gadget === 'batmove') {
                    this.dashTimer = 120;
                    this.dashVx = Math.cos(angle) * 8;
                    this.dashVy = Math.sin(angle) * 8;
                    this.invincible = true;
                    this.isBatMove = true;
                }
            }
        }
        else if (this.type === 'kit') {
            if (type === 'normal') {
                Game.entities.forEach(e => {
                    if (e !== this && e.team !== this.team && e.hp > 0 && e.z === 0) {
                        let d = dist(this.x, this.y, e.x, e.y);
                        if (d < this.data.range + e.r) {
                            let angToEne = Math.atan2(e.y - this.y, e.x - this.x);
                            let diff = Math.abs(angToEne - angle);
                            if (diff > Math.PI) diff = Math.PI * 2 - diff;
                            if (diff <= this.data.attackWidth) {
                                e.takeDamage(1200 * dmgMult, this); 
                                this.chargeSuper(34);
                                for(let k=0; k<6; k++) Game.particles.push(new Particle(e.x, e.y, '#f39c12', 4, (Math.random()-0.5)*8, (Math.random()-0.5)*8, 15));
                            }
                        }
                    }
                });
                for (let a = -this.data.attackWidth; a <= this.data.attackWidth; a += 0.2) {
                    let px = this.x + Math.cos(angle + a) * this.data.range;
                    let py = this.y + Math.sin(angle + a) * this.data.range;
                    Game.particles.push(new Particle(px, py, '#f39c12', 6, 0, 0, 10));
                }
            } else if (type === 'super') {
                let maxJumpDist = 420; let jumpDist = maxJumpDist;
                if (this.isPlayer) {
                    if (this.autoAimTargetDist !== null && this.autoAimTargetDist !== undefined) {
                        jumpDist = Math.min(this.autoAimTargetDist, maxJumpDist);
                        this.autoAimTargetDist = null;
                    } else {
                        let btn = Input.btns.super;
                        jumpDist = btn.mag * maxJumpDist;
                    }
                } else {
                    if (this.aiTarget) {
                        let d = dist(this.x, this.y, this.aiTarget.x, this.aiTarget.y);
                        jumpDist = Math.min(d, maxJumpDist);
                    }
                }
                let landingSpot = getSafeLandingSpot(this.x, this.y, angle, jumpDist, this.r);
                this.targetX = landingSpot.x; this.targetY = landingSpot.y;
                this.dashTimer = 25;
                this.invincible = true; this.z = 1;
            } else if (type === 'gadget') {
                if (this.gadget === 'cardboard') {
                    this.invisibleTimer = 180;
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "INVISIBLE", '#fff', 18));
                } else if (this.gadget === 'fastfood') {
                    this.hp = Math.min(this.maxHp, this.hp + 1000);
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "+1000", '#2ecc71', 18));
                }
            }
        }
        else if (this.type === 'chester') {
            if (type === 'normal') {
                let activeGauge = this.hcActive ? 3 : this.chesterGauge;
                let numBullets = activeGauge + 1;

                let baseDmg = 1000;
                let baseSize = 8;
                let baseSpeed = 15;

                let isFirstStrike = (activeGauge === 0 && this.sp === 'firststrike');
                if (isFirstStrike) {
                    baseDmg = 1500;
                    baseSize = 14;
                    baseSpeed = 20;
                }

                let spread = 0.08;
                for (let i = 0; i < numBullets; i++) {
                    let a = angle;
                    if (numBullets > 1) {
                        a = angle + (i - (numBullets - 1) / 2) * spread;
                    }
                    let b = new Bullet(this, a, baseSpeed, this.data.range, baseDmg * dmgMult, baseSize, 'normal');
                    Game.bullets.push(b);
                }

                if (!this.hcActive) {
                    this.chesterGauge = (this.chesterGauge + 1) % 4;
                }
            } else if (type === 'super') {
                let currentSuper = this.chesterSuperType;

                if (currentSuper === 'explode') {
                    let maxJumpDist = 450; let jumpDist = maxJumpDist;
                    if (this.isPlayer) {
                        if (this.autoAimTargetDist !== null && this.autoAimTargetDist !== undefined) {
                            jumpDist = Math.min(this.autoAimTargetDist, maxJumpDist);
                            this.autoAimTargetDist = null;
                        } else {
                            let btn = Input.btns.super;
                            jumpDist = btn.mag * maxJumpDist;
                        }
                    } else {
                        if (this.aiTarget) {
                            let d = dist(this.x, this.y, this.aiTarget.x, this.aiTarget.y);
                            jumpDist = Math.min(d, maxJumpDist);
                        }
                    }
                    let bombX = this.x + Math.cos(angle) * jumpDist;
                    let bombY = this.y + Math.sin(angle) * jumpDist;
                    
                    Game.entities.forEach(e => {
                        if (e.hp > 0 && e.team !== this.team && dist(bombX, bombY, e.x, e.y) < 140) {
                            e.takeDamage(2200 * dmgMult, this);
                        }
                    });
                    for(let i=Game.map.length-1; i>=0; i--) {
                        let w = Game.map[i];
                        if (circleRectCollide(bombX, bombY, 120, w.x, w.y, w.w, w.h)) {
                            Game.map.splice(i, 1);
                        }
                    }
                    for(let i=0; i<15; i++) Game.particles.push(new Particle(bombX, bombY, '#d35400', Math.random()*8+4, (Math.random()-0.5)*12, (Math.random()-0.5)*12, 20));
                    Game.uiEffects.push(new FloatingText(bombX, bombY, "BOOM!", '#d35400', 20));

                } else if (currentSuper === 'stun') {
                    let b = new Bullet(this, angle, 18, 500, 1600 * dmgMult, 18, 'super');
                    b.effects.push({ type: 'stun', time: 60 });
                    Game.bullets.push(b);

                } else if (currentSuper === 'heal') {
                    let healAmt = 3000 * (this.cubes > 0 ? (1 + this.cubes*0.1) : 1);
                    this.hp = Math.min(this.maxHp, this.hp + healAmt);
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 50, `+${Math.floor(healAmt)}`, '#2ecc71', 22));

                } else if (currentSuper === 'poison') {
                    for (let i = -1; i <= 1; i++) {
                        let b = new Bullet(this, angle + i * 0.2, 12, 350, 400 * dmgMult, 16, 'super');
                        b.pierce = true;
                        b.effects.push({ type: 'poison', time: 90 });
                        Game.bullets.push(b);
                    }

                } else if (currentSuper === 'ice') {
                    Game.areaEffects.push(new AreaEffect(this.x, this.y, 130, this, 'ice_zone'));
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "ICE ZONE!", '#74b9ff', 20));
                }

                this.chesterSuperType = this.chesterSuperTypes[Math.floor(Math.random() * this.chesterSuperTypes.length)];
            } else if (type === 'gadget') {
                if (this.gadget === 'candy') {
                    let r = Math.random();
                    if (r < 0.33) {
                        this.candyBuffType = 'speed';
                        Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "SPEED UP!", '#f1c40f', 18));
                    } else if (r < 0.66) {
                        this.candyBuffType = 'dmg_up';
                        Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "POWER UP!", '#ff4757', 18));
                    } else {
                        this.candyBuffType = 'heal_regen';
                        Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "REGEN!", '#2ecc71', 18));
                    }
                    this.candyBuffTimer = 180;
                } else if (this.gadget === 'redraw') {
                    this.chesterSuperType = this.chesterSuperTypes[Math.floor(Math.random() * this.chesterSuperTypes.length)];
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "REDRAW!", '#9b59b6', 18));
                }
            }
        }
        else if (this.type === 'pius') {
            if (type === 'normal') {
                let isLast = (this.ammo === 0);
                let b = new Bullet(this, angle, 20, this.data.range, 1900 * dmgMult, 14, 'normal');
                b.isPiusNormal = true;
                b.isLastAmmo = isLast;
                Game.bullets.push(b);
            } else if (type === 'super') {
                let maxJumpDist = 450; let jumpDist = maxJumpDist;
                if (this.isPlayer) {
                    if (this.autoAimTargetDist !== null && this.autoAimTargetDist !== undefined) {
                        jumpDist = Math.min(this.autoAimTargetDist, maxJumpDist);
                        this.autoAimTargetDist = null;
                    } else {
                        let btn = Input.btns.super;
                        jumpDist = btn.mag * maxJumpDist;
                    }
                } else {
                    if (this.aiTarget) {
                        let d = dist(this.x, this.y, this.aiTarget.x, this.aiTarget.y);
                        jumpDist = Math.min(d, maxJumpDist);
                    }
                }
                let targetX = this.x + Math.cos(angle) * jumpDist;
                let targetY = this.y + Math.sin(angle) * jumpDist;
                let superRadius = this.hcActive ? 200 : 150;
                
                this.executePiusSuper(targetX, targetY, superRadius, dmgMult);
                
                if (this.hcActive) {
                    this.piusHCDelayTimer = 30; // 0.5s
                    this.piusHCTargetX = targetX;
                    this.piusHCTargetY = targetY;
                    this.piusHCDmgMult = dmgMult;
                }

            } else if (type === 'gadget') {
                if (this.gadget === 'shield_absorb') {
                    let count = 0;
                    Game.areaEffects.forEach(ae => {
                        if (ae instanceof PiusAmmo && ae.owner === this) {
                            ae.remove = true;
                            this.collectPiusAmmo(ae, false);
                            count++;
                        }
                    });
                    if (count > 0) {
                        this.shield += count * 600;
                        Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "+SHIELD", '#f1c40f', 18));
                    }
                    Game.entities.forEach(e => {
                        if (e !== this && e.hp > 0 && e.team !== this.team && dist(this.x, this.y, e.x, e.y) < 150) {
                            let ang = Math.atan2(e.y - this.y, e.x - this.x);
                            e.pushVx = Math.cos(ang) * 12;
                            e.pushVy = Math.sin(ang) * 12;
                            e.pushTimer = 10;
                            for(let i=0; i<8; i++) Game.particles.push(new Particle(e.x, e.y, '#f1c40f', 4, (Math.random()-0.5)*8, (Math.random()-0.5)*8, 12));
                        }
                    });
                } else if (this.gadget === 'remote_shoot') {
                    Game.areaEffects.forEach(ae => {
                        if (ae instanceof PiusAmmo && ae.owner === this) {
                            ae.remove = true;
                            this.collectPiusAmmo(ae, true);
                        }
                    });
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 50, "REMOTE SHOOT", '#e74c3c', 18));
                }
            }
        }
    }

    update() {
        if(this.hp <= 0) return;

        // 連射インターバルタイマーの減衰
        if (this.attackIntervalTimer > 0) {
            this.attackIntervalTimer = Math.max(0, this.attackIntervalTimer - Game.timeScale);
        }

        if (this.candyBuffTimer > 0) {
            this.candyBuffTimer -= Game.timeScale;
            if (this.candyBuffType === 'heal_regen') {
                let prevSec = Math.floor((this.candyBuffTimer + Game.timeScale) / 60);
                let currSec = Math.floor(this.candyBuffTimer / 60);
                if (currSec < prevSec) {
                    this.hp = Math.min(this.maxHp, this.hp + 500);
                    Game.uiEffects.push(new FloatingText(this.x, this.y - 45, "+500", '#2ecc71', 14));
                }
            }
            if (this.candyBuffTimer <= 0) this.candyBuffType = '';
        }

        if (this.effects.some(e => e.type === 'stun')) {
            if (Math.random() < 0.25 * Game.timeScale) {
                Game.particles.push(new Particle(this.x, this.y - 20, '#f1c40f', 4, (Math.random()-0.5)*4, (Math.random()-0.5)*4, 10));
            }
        }

        this.effects.forEach(e => {
            if (e.type === 'poison') {
                let prevSec = Math.floor((e.time + Game.timeScale) / 30);
                let currSec = Math.floor(e.time / 30);
                if (currSec < prevSec) {
                    this.takeDamage(400, null);
                }
                if (Math.random() < 0.25 * Game.timeScale) {
                    Game.particles.push(new Particle(this.x, this.y - 15, '#2ecc71', 3, 0, -1.5, 12));
                }
            }
        });

        if (this.type === 'kit') {
            if (this.kitStunCooldown > 0) this.kitStunCooldown -= Game.timeScale;
            
            if (this.superCharge < this.maxSuperCharge) {
                let fillRate = this.sp === 'fastcharge' ? 0.25 : 0.167;
                this.chargeSuper(fillRate * Game.timeScale);
            }

            if (this.ridingTarget) {
                if (this.ridingTarget.hp <= 0 || this.ridingTarget.remove) {
                    this.ridingTarget = null;
                    this.effects = this.effects.filter(eff => eff.type !== 'stun');
                    this.z = 0;
                } else {
                    this.ridingTimer -= Game.timeScale;
                    this.x = this.ridingTarget.x;
                    this.y = this.ridingTarget.y;
                    this.z = 32;

                    if (!this.ridingTarget.effects.some(eff => eff.type === 'stun')) {
                        this.ridingTarget.effects.push({ type: 'stun', time: 10 });
                    }

                    let prevTick = Math.floor((this.ridingTimer + Game.timeScale) / 15);
                    let currTick = Math.floor(this.ridingTimer / 15);
                    if (currTick < prevTick) {
                        let dmgMult = this.hcActive ? 1.25 : 1;
                        if (this.cubes > 0) dmgMult *= (1 + this.cubes * 0.1);
                        this.ridingTarget.takeDamage(350 * dmgMult, this);
                    }

                    if (this.ridingTimer <= 0) {
                        let enemy = this.ridingTarget;
                        this.ridingTarget = null;
                        this.effects = this.effects.filter(eff => eff.type !== 'stun');
                        this.z = 0;
                        this.kitStunCooldown = 120;

                        enemy.effects = enemy.effects.filter(eff => eff.type !== 'stun');
                        enemy.effects.push({ type: 'stun', time: 30 });
