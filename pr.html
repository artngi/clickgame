                        this.x += (Math.random() - 0.5) * 50;
                        this.y += (Math.random() - 0.5) * 50;
                    }
                }
            }
        }

        if (this.invisibleTimer > 0) {
            this.invisibleTimer -= Game.timeScale;
        }

        this.lastDamagedTimer += Game.timeScale;
        if(this.lastDamagedTimer > 240 && this.hp < this.maxHp) { 
            let prevSeconds = Math.floor((this.lastDamagedTimer - Game.timeScale) / 60);
            let currSeconds = Math.floor(this.lastDamagedTimer / 60);
            if(currSeconds > prevSeconds) {
                let healAmt = Math.floor(this.maxHp * 0.1);
                this.hp = Math.min(this.maxHp, this.hp + healAmt);
                Game.uiEffects.push(new FloatingText(this.x, this.y - 45, `+${healAmt}`, '#2ecc71', 15));
            }
        }

        if (this.shield > 0) {
            this.shield -= (600 / 60) * Game.timeScale;
            if (this.shield < 0) this.shield = 0;
        }

        if (this.type === 'mortis') {
            if (this.ammo >= this.maxAmmo) {
                let chargeTime = this.sp === 'longdash' ? 90 : 180;
                this.longDashGauge = Math.min(1, this.longDashGauge + Game.timeScale / chargeTime);
            } else {
                this.longDashGauge = 0;
            }
        }

        if (this.type === 'pius') {
            if (this.piusHCDelayTimer > 0) {
                this.piusHCDelayTimer -= Game.timeScale;
                if (this.piusHCDelayTimer <= 0) {
                    let superRadius = 200;
                    this.executePiusSuper(this.piusHCTargetX, this.piusHCTargetY, superRadius, this.piusHCDmgMult);
                }
            }
        }

        for(let i=this.effects.length-1; i>=0; i--) {
            this.effects[i].time -= Game.timeScale;
            if(this.effects[i].time <= 0) this.effects.splice(i, 1);
        }
        if(this.gadgetCooldown > 0) this.gadgetCooldown = Math.max(0, this.gadgetCooldown - Game.timeScale);
        if(this.hcTimer > 0) { 
            this.hcTimer = Math.max(0, this.hcTimer - Game.timeScale); 
            if(this.hcTimer <= 0) this.hcActive = false; 
        }

        let stunActive = this.effects.some(e => e.type === 'stun');
        let shouldReload = true;
        if (stunActive && !this.ridingTarget) {
            shouldReload = false;
        }

        if (this.type === 'pius') {
            if (shouldReload) {
                if (this.ammo === 0 && !this.piusReloading) {
                    this.piusReloading = true;
                    this.reloadTimer = 0;
                }
                
                if (this.piusReloading) {
                    let curReload = this.reloadTime;
                    if (this.sp === 'no_gap') curReload /= 1.2;
                    
                    this.reloadTimer += Game.timeScale;
                    if (this.reloadTimer >= curReload * this.maxAmmo) {
                        this.ammo = this.maxAmmo;
                        this.reloadTimer = 0;
                        this.piusReloading = false;
                    }
                } else {
                    this.reloadTimer = 0;
                }
            }
        } else {
            let curReload = this.reloadTime;
            if(this.type === 'shelly' && this.hcActive) curReload /= 3;
            
            if(shouldReload && this.ammo < this.maxAmmo) {
                this.reloadTimer += Game.timeScale;
                if(this.reloadTimer >= curReload) { this.ammo++; this.reloadTimer = 0; }
            } else { this.reloadTimer = 0; }
        }

        for(let i=this.fireQueue.length-1; i>=0; i--) {
            let f = this.fireQueue[i];
            f.delay -= Game.timeScale;
            if(f.delay <= 0) {
                let b = new Bullet(this, f.angle, f.speed, f.range, f.dmg, f.size, f.type);
                if(f.pierce) b.pierce = true; if(f.wallBreak) b.wallBreak = true;
                if(f.spSpeed) b.onHit = () => { this.effects.push({type:'speed', time:180}); };
                if(f.hcColt) b.hcColt = true;
                Game.bullets.push(b); this.fireQueue.splice(i, 1);
            }
        }

        let dx=0, dy=0;
        
        // -------------------------------------------------------------
        // 滑らかなノックバック/引き寄せの壁めり込み判定処理の合流
        // -------------------------------------------------------------
        let pushDx = 0, pushDy = 0;
        if (this.pushTimer > 0) {
            pushDx = this.pushVx * Game.timeScale;
            pushDy = this.pushVy * Game.timeScale;
            this.pushTimer = Math.max(0, this.pushTimer - Game.timeScale);
            // 減衰処理
            this.pushVx *= Math.pow(0.85, Game.timeScale);
            this.pushVy *= Math.pow(0.85, Game.timeScale);
        }

        if(this.dashTimer > 0) {
            this.dashTimer = Math.max(0, this.dashTimer - Game.timeScale);
            if(this.z > 0) { 
                this.x += ((this.targetX - this.x) / (this.dashTimer+1)) * Game.timeScale;
                this.y += ((this.targetY - this.y) / (this.dashTimer+1)) * Game.timeScale;
                
                let totalJumpF = this.type === 'kit' ? 25 : 40;
                this.z = Math.sin((1 - this.dashTimer/totalJumpF) * Math.PI) * 120; 
                
                if(this.dashTimer <= 0) {
                    this.z = 0; this.invincible = false;
                    
                    if (this.type === 'kit') {
                        if (this.hcActive) {
                            Game.entities.forEach(e => {
                                if (e !== this && e.hp > 0 && e.team !== this.team && dist(this.x, this.y, e.x, e.y) < 140) {
                                    e.takeDamage(1200 * 1.25, this); // 1800 -> 1200ダメージに減少
                                    e.effects.push({ type: 'stun', time: 60 });
                                }
                            });
                            for(let i=0; i<15; i++) Game.particles.push(new Particle(this.x, this.y, '#9b59b6', Math.random()*8+4, (Math.random()-0.5)*15, (Math.random()-0.5)*15, 20));
                        } else {
                            let target = Game.findClosestEnemy(this, 120);
                            if (target && this.kitStunCooldown <= 0) {
                                target.takeDamage(1200, this); // 1800 -> 1200ダメージに減少
                                this.ridingTarget = target;
                                this.ridingTimer = 90;
                                
                                this.effects.push({ type: 'stun', time: 90 });
                                target.effects.push({ type: 'stun', time: 90 });
                                Game.uiEffects.push(new FloatingText(target.x, target.y - 60, "CLING!", '#f1c40f', 22));
                            } else {
                                for(let i=0; i<10; i++) Game.particles.push(new Particle(this.x, this.y, '#95a5a6', Math.random()*6+2, (Math.random()-0.5)*10, (Math.random()-0.5)*10, 15));
                            }
                        }
                    } else {
                        let r = this.sp === 'shock' ? 140 : 100;
                        Game.entities.forEach(e => {
                            if(e !== this && e.hp > 0 && e.team !== this.team && dist(this.x, this.y, e.x, e.y) < r) {
                                e.takeDamage(1000 * (this.hcActive?1.25:1), this); 
                                if (this.type !== 'primo') {
                                    let kbDist = 60; 
                                    let ang = Math.atan2(e.y - this.y, e.x - this.x);
                                    let subStep = 2;
                                    for (let s = 0; s < kbDist; s += subStep) {
                                        let nextX = e.x + Math.cos(ang) * subStep;
                                        let nextY = e.y + Math.sin(ang) * subStep;
                                        let colX = false, colY = false;
                                        for (let w of Game.map) {
                                            if (circleRectCollide(nextX, e.y, e.r, w.x, w.y, w.w, w.h)) colX = true;
                                            if (circleRectCollide(e.x, nextY, e.r, w.x, w.y, w.w, w.h)) colY = true;
                                        }
                                        const margin = 25;
                                        if(nextX - e.r < margin || nextX + e.r > Game.mapW - margin) colX = true;
                                        if(nextY - e.r < margin || nextY + e.r > Game.mapH - margin) colY = true;
                                        if (!colX) e.x = nextX;
                                        if (!colY) e.y = nextY;
                                        if (colX && colY) break;
                                    }
                                }
                            }
                        });
                        for(let i=0; i<20; i++) Game.particles.push(new Particle(this.x, this.y, '#95a5a6', Math.random()*8+4, (Math.random()-0.5)*15, (Math.random()-0.5)*15, 20));
                    }
                }
            } else { 
                dx = this.dashVx * Game.timeScale; dy = this.dashVy * Game.timeScale;
                if(this.gadget === 'lariat' && this.lariatDmg) {
                    Game.entities.forEach(e => {
                        if(e !== this && e.hp > 0 && e.team !== this.team && dist(this.x, this.y, e.x, e.y) < this.r + e.r) {
                            e.takeDamage(this.lariatDmg, this); this.lariatDmg = 0;
                        }
                    });
                }
                
                if (this.type === 'mortis' && this.mortisNormalDmg) {
                    if (this.isMortisHCInvincible) this.invincible = true;
                    Game.entities.forEach(e => {
                        if (e !== this && e.team !== this.team && e.hp > 0 && !this.mortisHitTargets.has(e)) {
                            if (dist(this.x, this.y, e.x, e.y) < this.r + e.r + 30) {
                                e.takeDamage(this.mortisNormalDmg, this);
                                this.mortisHitTargets.add(e);
                                if (this.sp === 'vampire') {
                                    this.hp = Math.min(this.maxHp, this.hp + 500);
                                    Game.uiEffects.push(new FloatingText(this.x, this.y - 45, "+500", '#2ecc71', 15));
                                }
                                this.chargeSuper(this.mortisNormalDmg * 0.05);
                            }
                        }
                    });
                }

                if(this.dashTimer <= 0) {
                    if (this.type === 'mortis') {
                        this.mortisNormalDmg = 0;
                        if (this.isMortisHCInvincible || this.isBatMove) {
                            this.invincible = false;
                        }
                        this.isBatMove = false;
                    }
                }
            }
        } else {
            if(this.isPlayer) {
                if(Input.leftJoy.active) {
                    let speed = this.getSpeed() * Input.leftJoy.mag;
                    dx = Input.leftJoy.nx * speed * Game.timeScale; dy = Input.leftJoy.ny * speed * Game.timeScale;
                    if(Input.leftJoy.mag > 0.1) this.facing = Math.atan2(dy, dx);
                }
            } else {
                this.updateBotAI();
                if(this.aiMoving) {
                    let speed = this.getSpeed();
                    dx = Math.cos(this.moveAng) * speed * Game.timeScale; dy = Math.sin(this.moveAng) * speed * Game.timeScale;
                    this.facing = this.moveAng;
                }
            }
        }

        if(this.z === 0) {
            // 通常移動ベクトル dx, dy と、ノックバック・引き寄せ用の移動ベクトル pushDx, pushDy を合算
            let finalDx = dx + pushDx;
            let finalDy = dy + pushDy;

            let newX = this.x + finalDx, newY = this.y + finalDy;
            let colX = false, colY = false;
            
            for(let w of Game.map) {
                if(circleRectCollide(newX, this.y, this.r, w.x, w.y, w.w, w.h)) colX = true;
                if(circleRectCollide(this.x, newY, this.r, w.x, w.y, w.w, w.h)) colY = true;
            }

            const margin = 25;
            if(newX - this.r < margin || newX + this.r > Game.mapW - margin) colX = true;
            if(newY - this.r < margin || newY + this.r > Game.mapH - margin) colY = true;

            if(!colX) this.x = newX; 
            if(!colY) this.y = newY;
            
            this.x = Math.max(margin + this.r, Math.min(this.x, Game.mapW - margin - this.r));
            this.y = Math.max(margin + this.r, Math.min(this.y, Game.mapH - margin - this.r));

            if((dx!==0 || dy!==0) && Math.random()<0.2 * Game.timeScale) Game.particles.push(new Particle(this.x, this.y+10, '#ecf0f1', 3, 0, 0, 15));
        }

        for(let i=Game.items.length-1; i>=0; i--) {
            let it = Game.items[i];
            if(dist(this.x, this.y, it.x, it.y) < this.r + it.r) {
                if(it.type === 'gem') { this.gems++; Game.items.splice(i, 1); }
                else if(it.type === 'cube') {
                    this.cubes++; this.maxHp += 400; this.hp += 400; Game.items.splice(i, 1);
                    Game.uiEffects.push(new FloatingText(this.x, this.y-30, "+Power", '#2ecc71', 16));
                }
            }
        }
    }

    /**
     * 高性能ボットAIルーチン (弾よけ・状況判断強化)
     */
    updateBotAI() {
        this.aiTimer -= Game.timeScale;
        
        if(dist(this.x, this.y, this.lastX, this.lastY) < 0.2 && this.aiMoving) {
            this.stuckTimer += Game.timeScale;
        } else {
            this.stuckTimer = 0;
        }
        this.lastX = this.x; this.lastY = this.y;

        // -------------------------------------------------------------
        // 1. 周辺状況の解析 (敵、アイテム、毒ガス、迫り来る弾、ピアスの弾薬)
        // -------------------------------------------------------------
        let closestEnemy = null;
        let minDistEnemy = Infinity;
        Game.entities.forEach(e => {
            if (e !== this && e.hp > 0 && e.team !== this.team) {
                if (e.type === 'kit' && e.invisibleTimer > 0) return;
                
                let d = dist(this.x, this.y, e.x, e.y);
                if (d < minDistEnemy) {
                    minDistEnemy = d;
                    closestEnemy = e;
                }
            }
        });

        let closestItem = null;
        let minDistItem = Infinity;
        
        if(Game.mode === 'gemgrab' || Game.mode === 'showdown') {
            Game.items.forEach(it => {
                let d = dist(this.x, this.y, it.x, it.y);
                if(d < minDistItem) { minDistItem = d; closestItem = it; }
            });
        }

        // ピアスは自分が設置した弾薬をアイテム(エメラルドなど)と同等に最優先で拾いに行く
        if (this.type === 'pius') {
            let closestPiusAmmo = null;
            let minDistPiusAmmo = Infinity;
            Game.areaEffects.forEach(ae => {
                if (ae instanceof PiusAmmo && ae.owner === this && ae.pickupDelay <= 0) {
                    let d = dist(this.x, this.y, ae.x, ae.y);
                    if (d < minDistPiusAmmo) {
                        minDistPiusAmmo = d;
                        closestPiusAmmo = ae;
                    }
                }
            });
            // 近辺（350以内）に自分の弾薬がある、もしくは敵がいない場合は最優先で拾う
            if (closestPiusAmmo && (minDistPiusAmmo < 350 || !closestEnemy)) {
                closestItem = closestPiusAmmo;
                minDistItem = minDistPiusAmmo;
            }
        }

        let distToEne = closestEnemy ? dist(this.x, this.y, closestEnemy.x, closestEnemy.y) : Infinity;
        let distToCenter = dist(this.x, this.y, Game.mapW / 2, Game.mapH / 2);
        let nearPoison = (Game.mode === 'showdown' && distToCenter > Game.poisonRadius - 220);

        // -------------------------------------------------------------
        // 2. 基本ステートの決定 (HP割合に基づくフェーズ移行)
        // -------------------------------------------------------------
        let shouldRunAway = false;
        let shouldAttackAggressively = false;

        if (Game.mode === 'gemgrab') {
            let myTeamGems = Game.entities.filter(e => e.team === this.team).reduce((sum, e) => sum + e.gems, 0);
            let enemyTeamGems = Game.entities.filter(e => e.team !== this.team).reduce((sum, e) => sum + e.gems, 0);
            let isWinning = myTeamGems >= 10 && myTeamGems > enemyTeamGems;
            
            if (isWinning) {
                let myTeamMembers = Game.entities.filter(e => e.team === this.team && e.hp > 0);
                let maxGemsInTeam = Math.max(...myTeamMembers.map(e => e.gems));
                let isCarrier = (this.gems === maxGemsInTeam && this.gems > 0);
                let canSacrifice = (myTeamGems - this.gems) >= 10;

                if (isCarrier) {
                    shouldRunAway = true;
                } else if (canSacrifice) {
                    shouldAttackAggressively = true;
                }
            }
        }

        if (nearPoison) {
            this.aiState = 'escape_poison';
        } else if (shouldRunAway) {
            this.aiState = 'escape_with_gems';
        } else if(this.hp < this.maxHp * 0.45 && !shouldAttackAggressively) {
            this.aiState = 'heal';
        } else if (shouldAttackAggressively) {
            this.aiState = 'aggressive';
        } else if(this.hp >= this.maxHp * 0.85) {
            this.aiState = 'fight'; 
        } else {
            this.aiState = 'fight'; 
        }

        // -------------------------------------------------------------
        // 3. 回避対象となる「危険な弾」＆「氷エリア」の選別＆回避ベクトル算出
        // -------------------------------------------------------------
        let dodgeDx = 0;
        let dodgeDy = 0;
        let incomingBulletCount = 0;

        Game.bullets.forEach(b => {
            if (b.owner && b.owner.team !== this.team) {
                let dToBullet = dist(this.x, this.y, b.x, b.y);
                if (dToBullet < 300) {
                    let bVelMag = Math.hypot(b.vx, b.vy);
                    if (bVelMag > 0) {
                        let bDirX = b.vx / bVelMag;
                        let bDirY = b.vy / bVelMag;
                        let relX = this.x - b.x;
                        let relY = this.y - b.y;
                        let dot = relX * bDirX + relY * bDirY;
                        
                        if (dot > 0) {
                            let projX = b.x + bDirX * dot;
                            let projY = b.y + bDirY * dot;
                            let minDistanceToTrajectory = dist(this.x, this.y, projX, projY);
                            
                            if (minDistanceToTrajectory < (this.r + b.r + 35)) {
                                let perpX1 = -bDirY;
                                let perpY1 = bDirX;
                                let perpX2 = bDirY;
                                let perpY2 = -bDirX;
                                let dot1 = (this.x - projX) * perpX1 + (this.y - projY) * perpY1;
                                let usePerpX = dot1 >= 0 ? perpX1 : perpX2;
                                let usePerpY = dot1 >= 0 ? perpY1 : perpY2;
                                
                                dodgeDx += usePerpX;
                                dodgeDy += usePerpY;
                                incomingBulletCount++;
                            }
                        }
                    }
                }
            }
        });

        // 敵のチェスターが設置した氷エリアを回避するAI判定を追加
        Game.areaEffects.forEach(ae => {
            if (ae.type === 'ice_zone' && ae.owner && ae.owner.team !== this.team) {
                let dToZone = dist(this.x, this.y, ae.x, ae.y);
                if (dToZone < ae.r + 80) { 
                    let escapeAng = Math.atan2(this.y - ae.y, this.x - ae.x);
                    dodgeDx += Math.cos(escapeAng) * 3; 
                    dodgeDy += Math.sin(escapeAng) * 3;
                    incomingBulletCount++;
                }
            }
        });

        let needToDodge = false;
        let dodgeAng = 0;
        if (incomingBulletCount > 0) {
            let len = Math.hypot(dodgeDx, dodgeDy);
            if (len > 0) {
                dodgeAng = Math.atan2(dodgeDy, dodgeDx);
                needToDodge = true;
            }
        }

        // -------------------------------------------------------------
        // 4. 移動意志の決定 (AIのタイマー間隔、または弾よけ割込み)
        // -------------------------------------------------------------
        let targetAng = 0;
        let hasTarget = false;

        if(this.stuckTimer > 15) {
            this.moveAng = this.facing + Math.PI/2 + (Math.random()-0.5);
            this.aiMoving = true;
            this.aiTimer = 30; 
            this.stuckTimer = 0;
            return;
        }

        if (needToDodge) {
            targetAng = dodgeAng;
            hasTarget = true;
            this.aiTimer = 5; 
        } 
        else if (this.aiTimer <= 0) {
            this.aiTimer = 10; 

            if (this.aiState === 'escape_poison') {
                targetAng = Math.atan2(Game.mapH/2 - this.y, Game.mapW/2 - this.x);
                hasTarget = true;
            } 
            else if (this.aiState === 'escape_with_gems') {
                // 自陣の奥深くへ逃げる
                let safeX = this.team === 1 ? 150 : Game.mapW - 150;
                let safeY = Game.mapH / 2;
                let escapeAngle = Math.atan2(safeY - this.y, safeX - this.x);
                
                if (closestEnemy && distToEne < 550) {
                    // 敵が近い場合は敵と逆方向にもベクトルを向ける
                    let awayFromEnemyAng = Math.atan2(this.y - closestEnemy.y, this.x - closestEnemy.x);
                    let dx = Math.cos(escapeAngle) + Math.cos(awayFromEnemyAng) * 2.0;
                    let dy = Math.sin(escapeAngle) + Math.sin(awayFromEnemyAng) * 2.0;
                    escapeAngle = Math.atan2(dy, dx);
                }

                // マップの端で引っかからないように、端に近すぎる場合は中央方向に補正
                const edgeMargin = 150;
                let pushX = 0, pushY = 0;
                if (this.x < edgeMargin) pushX = 1;
                else if (this.x > Game.mapW - edgeMargin) pushX = -1;
                if (this.y < edgeMargin) pushY = 1;
                else if (this.y > Game.mapH - edgeMargin) pushY = -1;
                
                if (pushX !== 0 || pushY !== 0) {
                    let dx = Math.cos(escapeAngle) + pushX * 1.5;
                    let dy = Math.sin(escapeAngle) + pushY * 1.5;
                    escapeAngle = Math.atan2(dy, dx);
                }
                
                targetAng = escapeAngle;
                hasTarget = true;
            }
            else if (this.aiState === 'aggressive') {
                // 特攻役: 敵にまっすぐ向かう
                if (closestEnemy) {
                    targetAng = Math.atan2(closestEnemy.y - this.y, closestEnemy.x - this.x);
                    hasTarget = true;
                } else {
                    targetAng = Math.atan2(Game.mapH/2 - this.y, Game.mapW/2 - this.x);
                    hasTarget = true;
                }
            }
            else if (this.aiState === 'heal') {
                let canDashEscape = false;
                let escapeAngle = 0;

                if (closestEnemy) {
                    escapeAngle = Math.atan2(this.y - closestEnemy.y, this.x - closestEnemy.x);
                } else {
                    escapeAngle = Math.atan2(Game.mapH/2 - this.y, Game.mapW/2 - this.x);
                }

                if (closestEnemy && distToEne < 320) {
                    if (this.type === 'mortis' && this.ammo >= 1) {
                        this.requestAttack(escapeAngle, 'normal');
                        canDashEscape = true;
                    }
                    else if (this.gadgetCooldown <= 0) {
                        if (this.type === 'shelly' && this.gadget === 'dash') {
                            this.requestAttack(escapeAngle, 'gadget');
                            canDashEscape = true;
                        } else if (this.type === 'primo' && this.gadget === 'lariat') {
                            this.requestAttack(escapeAngle, 'gadget');
                            canDashEscape = true;
                        }
                    }
                }

                if (!canDashEscape) {
                    targetAng = escapeAngle;
                    hasTarget = true;
                }
            } 
            else {
                // 賞金稼ぎモード：中央の青い星が存在すれば優先回収しに行く
                let centerStar = Game.areaEffects.find(ae => ae instanceof BountyCenterStar);
                if (Game.mode === 'bounty' && centerStar && dist(this.x, this.y, centerStar.x, centerStar.y) < 400) {
                    targetAng = Math.atan2(centerStar.y - this.y, centerStar.x - this.x);
                    hasTarget = true;
                }
                else if(closestItem && (minDistItem < 300 || !closestEnemy)) {
                    targetAng = Math.atan2(closestItem.y - this.y, closestItem.x - this.x);
                    hasTarget = true;
                } else if (closestEnemy) {
                    let idealDist = 330;
                    if (this.type === 'primo' || this.type === 'mortis' || this.type === 'kit') {
                        idealDist = 60;
                    } else if (this.type === 'shelly') {
                        idealDist = 180;
                    }
                    
                    let angToEne = Math.atan2(closestEnemy.y - this.y, closestEnemy.x - this.x);
                    
                    if(distToEne > idealDist + 40) {
                        targetAng = angToEne; 
                    } else if(distToEne < idealDist - 40 && this.type !== 'primo' && this.type !== 'mortis' && this.type !== 'kit') {
                        targetAng = angToEne + Math.PI; 
                    } else {
                        targetAng = angToEne + (this.stuckTimer > 0 ? Math.PI/2 : (Math.random() > 0.5 ? Math.PI/2 : -Math.PI/2)); 
                    }
                    hasTarget = true;
                }
            }

            if (hasTarget) {
                let lookAheadX = this.x + Math.cos(targetAng) * 60;
                let lookAheadY = this.y + Math.sin(targetAng) * 60;
                for (let w of Game.map) {
                    if (circleRectCollide(lookAheadX, lookAheadY, this.r + 5, w.x, w.y, w.w, w.h)) {
                        targetAng += (this.x < w.x + w.w/2) ? -Math.PI/3 : Math.PI/3;
                        break;
                    }
                }
                this.moveAng = targetAng;
                this.aiMoving = true;
            } else {
                this.moveAng = Math.atan2(Game.mapH/2 - this.y, Game.mapW/2 - this.x);
                this.aiMoving = true;
            }
        }

        if (needToDodge) {
            this.moveAng = dodgeAng;
            this.aiMoving = true;
        }

        // -------------------------------------------------------------
        // 5. 攻撃の意志・戦闘ロジック
        // -------------------------------------------------------------
        // ガスの通常攻撃は消極的なため、判定射程を少し広げて、遮蔽物(wallInWay)も一部無視して撃つように改良
        let detectionRange = this.data.range * (this.type === 'gus' ? 1.25 : 1.15);
        if(closestEnemy && distToEne <= detectionRange) {
            let angToEne = Math.atan2(closestEnemy.y - this.y, closestEnemy.x - this.x);
            let wallInWay = false;
            for(let w of Game.map) {
                if(lineRectCollide(this.x, this.y, closestEnemy.x, closestEnemy.y, w.x, w.y, w.w, w.h)) {
                    wallInWay = true; break;
                }
            }

            let shouldAttack = false;

            if (this.aiState === 'heal') {
                let extremelyCloseAndDying = (distToEne < 220 && this.hp < this.maxHp * 0.2);
                let counterAttackChance = (this.ammo >= this.maxAmmo && closestEnemy.hp < this.maxHp * 0.3);

                if (extremelyCloseAndDying || counterAttackChance) {
                    shouldAttack = true;
                    if (this.superCharge >= this.maxSuperCharge && !wallInWay) {
                        this.requestAttack(angToEne, 'super');
                    }
                }
            } else if (this.aiState === 'escape_with_gems') {
                if (!wallInWay && this.ammo >= 1 && distToEne <= this.data.range * 0.9) {
                    shouldAttack = true;
                }
            } else if (this.aiState === 'aggressive') {
                // ガスの場合は壁越しでも35%の確率で威嚇射撃を実行し、消極性を払拭する
                if (!wallInWay || this.type === 'primo' || this.type === 'mortis' || this.type === 'kit' || this.superCharge >= this.maxSuperCharge || (this.type === 'gus' && Math.random() < 0.35)) {
                    shouldAttack = true;
                }
            } else {
                // 通常時もガスは遮蔽物があっても35%の確率で撃つ
                if (!wallInWay || this.type === 'primo' || this.type === 'mortis' || this.type === 'kit' || this.superCharge >= this.maxSuperCharge || (this.type === 'gus' && Math.random() < 0.35)) {
                    shouldAttack = true;
                }
            }

            if(shouldAttack && this.ammo >= 1) {
                this.facing = angToEne;

                if(this.hcCharge >= this.maxHcCharge && distToEne < this.data.range * 0.9) {
                    this.activateHC();
                }
                else if(this.superCharge >= this.maxSuperCharge) {
                    if(this.type === 'primo' && distToEne < 380) {
                        this.requestAttack(angToEne, 'super');
                    } else if (this.type === 'gus' && this.hp < this.maxHp * 0.5) { 
                        this.requestAttack(angToEne, 'super');
                    } else if (this.type === 'mortis' && distToEne < 600) {
                        this.requestAttack(angToEne, 'super');
                    } else if (this.type === 'kit' && distToEne < 380) {
                        this.requestAttack(angToEne, 'super');
                    } else if (this.type === 'chester') {
                        if (this.chesterSuperType === 'heal') {
                            if (this.hp < this.maxHp * 0.7) this.requestAttack(angToEne, 'super');
                        } else if (this.chesterSuperType === 'ice') {
                            if (distToEne < 130) this.requestAttack(angToEne, 'super');
                        } else {
                            this.requestAttack(angToEne, 'super');
                        }
                    } else if (this.type === 'pius') {
                        this.requestAttack(angToEne, 'super');
                    } else if(distToEne < this.data.range && this.type !== 'gus' && this.type !== 'mortis') {
                        this.requestAttack(angToEne, 'super');
                    }
                } 
                else if(this.gadgetCooldown <= 0 && Math.random() < 0.25) {
                    if(this.type === 'shelly') {
                        if(this.gadget === 'dash' && distToEne < 160) this.requestAttack(angToEne, 'gadget'); 
                        else if(this.gadget === 'sharp' && distToEne > 220) this.requestAttack(angToEne, 'gadget'); 
                    } else if(this.type === 'colt') {
                        if(this.gadget === 'one' && !wallInWay) this.requestAttack(angToEne, 'gadget'); 
                        else if(this.gadget === 'slow' && wallInWay) this.requestAttack(angToEne, 'gadget'); 
                    } else if(this.type === 'primo') {
                        if(this.gadget === 'lariat' && distToEne > 100 && distToEne < 220) this.requestAttack(angToEne, 'gadget'); 
                        else if(this.gadget === 'catch' && distToEne > 150) this.requestAttack(angToEne, 'gadget'); 
                    } else if (this.type === 'gus') {
                        if (this.gadget === 'cracker' && Game.ghosts.some(g => g.owner===this && dist(g.x,g.y,closestEnemy.x,closestEnemy.y)<110)) {
                            this.requestAttack(angToEne, 'gadget');
                        } else if (this.gadget === 'summoner' && this.ghostGauge === 0) {
                            this.requestAttack(angToEne, 'gadget');
                        }
                    } else if (this.type === 'mortis') {
                        if (this.gadget === 'spinner' && distToEne < this.r*2) {
                            this.requestAttack(angToEne, 'gadget');
                        } else if (this.gadget === 'batmove' && this.hp < this.maxHp * 0.3) {
                            this.requestAttack(angToEne + Math.PI, 'gadget');
                        }
                    } else if (this.type === 'kit') {
                        if (this.gadget === 'cardboard' && distToEne > 250) {
                            this.requestAttack(angToEne, 'gadget');
                        } else if (this.gadget === 'fastfood' && this.hp < this.maxHp * 0.6) {
                            this.requestAttack(angToEne, 'gadget');
                        }
                    } else if (this.type === 'chester') {
                        if (this.gadget === 'candy') {
                            this.requestAttack(angToEne, 'gadget');
                        } else if (this.gadget === 'redraw') {
                            if (this.chesterSuperType === 'heal' && this.hp > this.maxHp * 0.8) {
                                this.requestAttack(angToEne, 'gadget');
                            } else if (this.chesterSuperType === 'ice' && distToEne > 250) {
                                this.requestAttack(angToEne, 'gadget');
                            }
                        }
                    } else if (this.type === 'pius') {
                        let myAmmoCount = Game.areaEffects.filter(ae => ae instanceof PiusAmmo && ae.owner === this).length;
                        if (this.gadget === 'shield_absorb' && myAmmoCount > 0 && (this.hp < this.maxHp * 0.4 || distToEne < 200)) {
                            this.requestAttack(angToEne, 'gadget');
                        } else if (this.gadget === 'remote_shoot' && myAmmoCount > 0 && distToEne < 500) {
                            this.requestAttack(angToEne, 'gadget');
                        }
                    }
                }
                // BOTガスの場合は攻撃確率を0.95に強化し、とにかく積極射撃にする
                else if(Math.random() < (this.type === 'gus' ? 0.95 : 0.7)) {
                    this.requestAttack(angToEne, 'normal');
                }
            }
        }
    }

    draw(ctx) {
        if(this.hp <= 0 && this.z === 0) return;
        
        ctx.save(); ctx.translate(this.x, this.y - this.z);
        
        if (this.type === 'kit' && this.invisibleTimer > 0) {
            if (this.isPlayer) {
                ctx.globalAlpha = 0.4;
            } else {
                ctx.globalAlpha = 0;
            }
        }

        if(this.z === 0) {
            ctx.beginPath();
            ctx.ellipse(0, 20, 25, 10, 0, 0, Math.PI*2);
            if (this.isPlayer) {
                ctx.fillStyle = 'rgba(46, 204, 113, 0.4)'; 
            } else if (Game.mode !== 'showdown' && this.team === 1) {
                ctx.fillStyle = 'rgba(52, 152, 219, 0.4)';  
            } else {
                ctx.fillStyle = 'rgba(231, 76, 60, 0.4)';   
            }
            ctx.fill();
        }

        if (this.invincible) {
            ctx.save(); ctx.beginPath(); ctx.arc(0, 0, this.r + 10, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.75)'; ctx.lineWidth = 3.5; ctx.stroke();
            ctx.restore();
        }

        if(this.hcActive) {
            ctx.beginPath(); ctx.arc(0, 0, this.r+10, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(155, 89, 182, 0.4)'; ctx.fill();
            if(Math.random()<0.3) Game.particles.push(new Particle(this.x+(Math.random()-0.5)*30, this.y-this.z+(Math.random()-0.5)*30, '#9b59b6', 4, 0, -2, 15));
        }
        if(this.invincible) ctx.globalAlpha = 0.55;

        ctx.save();
        ctx.rotate(this.facing);
        
        ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2);
        ctx.fillStyle = this.data.color; ctx.fill();
        ctx.lineWidth = 3; ctx.strokeStyle = '#1e272e'; ctx.stroke();
        
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(8, -6, 5, 0, Math.PI*2); ctx.arc(8, 6, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(10, -6, 2, 0, Math.PI*2); ctx.arc(10, 6, 2, 0, Math.PI*2); ctx.fill();
        
        if(this.type === 'shelly') {
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(10, 4, 20, 6); 
            ctx.fillStyle = '#8e44ad'; ctx.beginPath(); ctx.arc(-5, 0, 18, Math.PI/2, Math.PI*1.5); ctx.fill(); 
        } else if (this.type === 'colt') {
            ctx.fillStyle = '#95a5a6'; ctx.fillRect(10, -12, 15, 5); ctx.fillRect(10, 7, 15, 5); 
            ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.arc(-5, 0, 16, Math.PI/2, Math.PI*1.5); ctx.fill(); 
        } else if (this.type === 'primo') {
            ctx.fillStyle = '#c0392b'; ctx.beginPath(); ctx.arc(8, 0, 4, 0, Math.PI*2); ctx.fill(); 
        } else if (this.type === 'gus') {
            ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(-5, -5, 10, 0, Math.PI*2); ctx.fill();
        } else if (this.type === 'mortis') {
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(10, -2, 25, 4); 
            ctx.fillStyle = '#1e272e'; ctx.beginPath(); ctx.arc(0, 0, 18, Math.PI/2, Math.PI*1.5); ctx.fill(); 
        } else if (this.type === 'kit') {
            ctx.fillStyle = '#f39c12';
            ctx.beginPath(); ctx.moveTo(-15, -15); ctx.lineTo(-22, -28); ctx.lineTo(-2, -20); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-15, 15); ctx.lineTo(-22, 28); ctx.lineTo(-2, 20); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(10, -2); ctx.lineTo(18, -4); ctx.moveTo(10, 0); ctx.lineTo(20, 0); ctx.moveTo(10, 2); ctx.lineTo(18, 4); ctx.stroke();
        } else if (this.type === 'chester') {
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath(); ctx.moveTo(-10, -18); ctx.lineTo(-24, -30); ctx.lineTo(0, -20); ctx.fill();
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.arc(-24, -30, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#3498db';
            ctx.beginPath(); ctx.moveTo(-10, 18); ctx.lineTo(-24, 30); ctx.lineTo(0, 20); ctx.fill();
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath(); ctx.arc(-24, 30, 4, 0, Math.PI*2); ctx.fill();
        } else if (this.type === 'pius') {
            ctx.fillStyle = '#16a085'; 
            ctx.beginPath(); ctx.moveTo(-10, -15); ctx.lineTo(-25, 0); ctx.lineTo(-10, 15); ctx.fill();
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath(); ctx.arc(-5, 0, 14, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();

        ctx.globalAlpha = 1.0;
        let barW = 50;
        
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Nunito'; ctx.textAlign = 'center';
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
        ctx.strokeText(this.name, 0, -35); ctx.fillText(this.name, 0, -35);
        
        ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -28, barW, 8);
        ctx.fillStyle = (this.isPlayer || (Game.mode !== 'showdown' && this.team === 1)) ? '#2ecc71' : '#e74c3c';
        ctx.fillRect(-barW/2, -28, barW * (this.hp/this.maxHp), 8);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(-barW/2, -28, barW, 8);
        
        let aRatio = this.ammo / this.maxAmmo;
        if(this.ammo < this.maxAmmo) aRatio += (this.reloadTimer / (this.type==='shelly'&&this.hcActive ? this.reloadTime/3 : this.reloadTime)) * (1/this.maxAmmo);
        ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -18, barW, 4);
        
        if (this.type !== 'pius') {
            ctx.fillStyle = '#f39c12'; ctx.fillRect(-barW/2, -18, barW * aRatio, 4);
        } else {
            if (this.piusReloading) {
                let maxTimer = this.reloadTime * this.maxAmmo;
                if (this.sp === 'no_gap') maxTimer /= 1.2;
                let r = this.reloadTimer / maxTimer;
                ctx.fillStyle = '#e67e22'; ctx.fillRect(-barW/2, -18, barW * r, 4);
            } else {
                ctx.fillStyle = '#f39c12'; ctx.fillRect(-barW/2, -18, barW * (this.ammo / this.maxAmmo), 4);
            }
        }

        // 賞金稼ぎモード：頭の上に星をスタックして並べて表示
        if (Game.mode === 'bounty') {
            let stars = this.bountyStars || 2;
            let starSize = 10;
            let startX = -((stars - 1) * (starSize + 2)) / 2;
            ctx.fillStyle = '#f1c40f';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            for (let i = 0; i < stars; i++) {
                let sx = startX + i * (starSize + 2);
                let sy = -46;
                // ミニ星描画
                ctx.beginPath();
                for (let k = 0; k < 5; k++) {
                    ctx.lineTo(sx + Math.cos((18 + k * 72) * Math.PI / 180) * (starSize/2), sy + Math.sin((18 + k * 72) * Math.PI / 180) * (starSize/2));
                    ctx.lineTo(sx + Math.cos((54 + k * 72) * Math.PI / 180) * (starSize/4), sy + Math.sin((54 + k * 72) * Math.PI / 180) * (starSize/4));
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
        }

        if (this.type === 'gus') {
            let maxGauge = this.sp === 'master' ? 1 : 2;
            ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -13, barW, 4);
            ctx.fillStyle = '#bdc3c7'; ctx.fillRect(-barW/2, -13, barW * (this.ghostGauge / maxGauge), 4);
            
            if (this.shield > 0) {
                ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -33, barW, 4);
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(-barW/2, -33, barW * (this.shield / 6000), 4);
            }
        } else if (this.type === 'mortis') {
            ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -13, barW, 4);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(-barW/2, -13, barW * this.longDashGauge, 4);
        } else if (this.type === 'chester') {
            let maxG = this.chesterGauge;
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fillRect(-20, -53, 40, 10);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(-20, -53, 40, 10);
            ctx.fillStyle = '#e67e22';
            ctx.font = '900 9px Nunito';
            ctx.strokeText(`弾数: ${maxG+1}`, 0, -45);
            ctx.fillText(`弾数: ${maxG+1}`, 0, -45);
        } else if (this.type === 'kit' && this.invisibleTimer > 0) {
            ctx.fillStyle = '#9b59b6';
            ctx.font = '900 11px Nunito';
            ctx.strokeText(`透明中`, 0, -50);
            ctx.fillText(`透明中`, 0, -50);
        } else if (this.type === 'pius') {
            if (this.shield > 0) {
                ctx.fillStyle = '#1e272e'; ctx.fillRect(-barW/2, -33, barW, 4);
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(-barW/2, -33, barW * Math.min(1, this.shield / 6000), 4); // 6000を最大値目安として描画
            }
        }

        if(this.gems > 0 || this.cubes > 0) {
            ctx.fillStyle = this.gems > 0 ? '#9b59b6' : '#2ecc71';
            ctx.font = '900 16px Nunito';
            let txt = this.gems > 0 ? `💎${this.gems}` : `🟩${this.cubes}`;
            ctx.strokeText(txt, 0, -45); ctx.fillText(txt, 0, -45);
        }
        
        ctx.restore();
    }
}

class Bullet extends Entity {
    constructor(owner, angle, speed, range, dmg, size, type) {
        super(owner.x, owner.y, size);
        this.owner = owner; this.angle = angle;
        this.vx = Math.cos(angle)*speed; this.vy = Math.sin(angle)*speed;
        this.range = range; this.dmg = dmg; this.type = type;
        this.traveled = 0; this.pierce = false; this.wallBreak = false;
        this.pull = false; this.knockback = 0; this.effects = [];
        this.hcColt = false; this.hitTargets = new Set();
        this.textDmg = true;
        
        this.isPiusNormal = false;
        this.isPiusAutoBullet = false;
        this.isLastAmmo = false;
        this.homing = false;
    }
    update() {
        if (this.homing && this.owner && this.owner.hp > 0) {
            let target = Game.findClosestEnemy(this, 200);
            if (target) {
                let targetAngle = Math.atan2(target.y - this.y, target.x - this.x);
                let currentAngle = Math.atan2(this.vy, this.vx);
                let angleDiff = targetAngle - currentAngle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                
                let turnRate = 0.05 * Game.timeScale;
                if (Math.abs(angleDiff) > turnRate) {
                    currentAngle += Math.sign(angleDiff) * turnRate;
                } else {
                    currentAngle = targetAngle;
                }
                let speed = Math.hypot(this.vx, this.vy);
                this.vx = Math.cos(currentAngle) * speed;
                this.vy = Math.sin(currentAngle) * speed;
            }
        }

        let dx = this.vx * Game.timeScale;
        let dy = this.vy * Game.timeScale;
        this.x += dx; this.y += dy;
        let step = Math.hypot(dx, dy);
        this.traveled += step;
        
        if(this.hcColt) this.r += 0.3 * Game.timeScale;
        
        let pColor = this.type==='super'?'#f1c40f':'#ff7675';
        if (this.isPiusNormal || this.isPiusAutoBullet) pColor = '#3498db';
        if(Math.random()<0.5 * Game.timeScale) Game.particles.push(new Particle(this.x, this.y, pColor, this.r*0.5, 0,0, 10));

        if(this.traveled >= this.range) this.remove = true;
        
        if(!this.pierce) {
            for(let i=Game.map.length-1; i>=0; i--) {
                let w = Game.map[i];
                if(circleRectCollide(this.x, this.y, this.r, w.x, w.y, w.w, w.h)) {
                    if(this.wallBreak) {
                        Game.map.splice(i, 1);
                        for(let k=0; k<10; k++) Game.particles.push(new Particle(this.x, this.y, '#7f8c8d', 5, (Math.random()-0.5)*5, (Math.random()-0.5)*5, 20));
                    } else {
                        this.remove = true; break;
                    }
                }
            }
        }
        
        if(!this.remove) {
            Game.entities.forEach(e => {
                if(e !== this.owner && e.hp > 0 && e.team !== this.owner.team && e.z === 0) {
                    if (this.owner.type === 'kit' && this.owner.ridingTarget === e) return;
                    
                    if(!this.hitTargets.has(e) && dist(this.x, this.y, e.x, e.y) < this.r + e.r) {
                        let finalDmg = this.dmg;
                        
                        if (this.isPiusNormal) {
                            if (this.isLastAmmo) {
                                finalDmg += 1100 * (this.owner.hcActive ? 1.25 : 1);
                                this.isLastAmmo = false; 
                            }
                            // 弾薬の生成: 自分のそば
                            let spawnAng = Math.random() * Math.PI * 2;
                            let ax = this.owner.x + Math.cos(spawnAng) * 45;
                            let ay = this.owner.y + Math.sin(spawnAng) * 45;
                            Game.areaEffects.push(new PiusAmmo(ax, ay, this.owner));
                        }

                        if (this.textDmg) {
                            e.takeDamage(finalDmg, this.owner);
                        }
                        if (!this.isGhostAttack) {
                            this.owner.chargeSuper(finalDmg * 0.05);
                        }
                        
                        if (this.isGusAttack && !this.isGhostAttack) {
                            if (this.spawnGhost) {
                                Game.ghosts.push(new Ghost(e.x, e.y, this.owner));
                            } else {
                                let maxGauge = this.owner.sp === 'master' ? 1 : 2;
                                this.owner.ghostGauge = Math.min(maxGauge, this.owner.ghostGauge + 1);
                            }
                        }

                        if (this.isMortisSuper) {
                            this.owner.hp = Math.min(this.owner.maxHp, this.owner.hp + finalDmg);
                            Game.uiEffects.push(new FloatingText(this.owner.x, this.owner.y - 45, `+${Math.floor(finalDmg)}`, '#2ecc71', 15));
                        }
                        
                        if (this.owner.isPlayer && navigator.vibrate) {
                            navigator.vibrate(30);
                        }
                        
                        for(let k=0; k<8; k++) Game.particles.push(new Particle(e.x, e.y, '#f39c12', 4, (Math.random()-0.5)*8, (Math.random()-0.5)*8, 15));

                        if(this.onHit) this.onHit();
                        
                        this.effects.forEach(eff => {
                            if (!e.effects.some(existing => existing.type === eff.type)) {
                                e.effects.push({...eff});
                            } else {
                                e.effects.forEach(existing => {
                                    if (existing.type === eff.type) existing.time = Math.max(existing.time, eff.time);
                                });
                            }
                        });
                        
                        if(this.knockback > 0) { 
                            let ang = Math.atan2(e.y - this.owner.y, e.x - this.owner.x);
                            e.pushVx = Math.cos(ang) * (this.knockback * 0.8);
                            e.pushVy = Math.sin(ang) * (this.knockback * 0.8);
                            e.pushTimer = 8;
                        }
                        
                        if(this.pull) { 
                            let ang = Math.atan2(this.owner.y - e.y, this.owner.x - e.x);
                            let d = dist(this.owner.x, this.owner.y, e.x, e.y);
                            let pullSpeed = Math.min(18, d / 6);
                            e.pushVx = Math.cos(ang) * pullSpeed;
                            e.pushVy = Math.sin(ang) * pullSpeed;
                            e.pushTimer = 10;
                        }
                        
                        if(!this.pierce) this.remove = true;
                        else this.hitTargets.add(e);
                    }
                }
            });
        }
    }
    draw(ctx) {
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        if(this.type === 'super' && !this.isPiusAutoBullet) ctx.fillStyle = '#f1c40f';
        else if(this.type === 'gadget') ctx.fillStyle = '#2ecc71';
        else if(this.isPiusNormal || this.isPiusAutoBullet) ctx.fillStyle = '#3498db';
        else ctx.fillStyle = (this.owner.isPlayer || (Game.mode !== 'showdown' && this.owner.team === 1)) ? '#3498db' : '#e74c3c';
        ctx.fill();
    }
}

class Item extends Entity {
    constructor(x, y, type) { super(x, y, 15); this.type = type; this.anim = Math.random()*Math.PI; }
    update() { 
        this.anim += 0.08 * Game.timeScale; 
        
        for (let w of Game.map) {
            if (circleRectCollide(this.x, this.y, this.r, w.x, w.y, w.w, w.h)) {
                let leftDist = this.x - w.x;
                let rightDist = (w.x + w.w) - this.x;
                let topDist = this.y - w.y;
                let bottomDist = (w.y + w.h) - this.y;
                
                let minDist = Math.min(leftDist, rightDist, topDist, bottomDist);
                if (minDist === leftDist) {
                    this.x = w.x - this.r - 2;
                } else if (minDist === rightDist) {
                    this.x = w.x + w.w + this.r + 2;
                } else if (minDist === topDist) {
                    this.y = w.y - this.r - 2;
                } else {
                    this.y = w.y + w.h + this.r + 2;
                }
            }
        }
        
        const margin = 25;
        this.x = Math.max(margin + this.r, Math.min(this.x, Game.mapW - margin - this.r));
        this.y = Math.max(margin + this.r, Math.min(this.y, Game.mapH - margin - this.r));
    }
    draw(ctx) {
        ctx.save(); ctx.translate(this.x, this.y + Math.sin(this.anim)*8);
        if(this.type === 'gem') {
            ctx.fillStyle = '#9b59b6'; ctx.beginPath();
            ctx.moveTo(0, -15); ctx.lineTo(15, 0); ctx.lineTo(0, 15); ctx.lineTo(-15, 0); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth=2; ctx.stroke();
        } else {
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(-12, -12, 24, 24);
            ctx.strokeStyle = '#fff'; ctx.lineWidth=3; ctx.strokeRect(-12, -12, 24, 24);
            ctx.fillStyle='#fff'; ctx.fillRect(-4,-4,8,8);
        }
        ctx.restore();
    }
}


/** ==========================================
 * ゲーム管理
 * ========================================== */
let player = null;
const Game = {
    state: 'menu', mode: 'gemgrab', mapW: 2000, mapH: 1600, 
    entities: [], bullets: [], items: [], ghosts: [], particles: [], uiEffects: [], map: [], areaEffects: [],
    score: { t1: 0, t2: 0, cd: -1 }, gemTimer: 0, poisonRadius: 2000,
    
    spectateX: 0, spectateY: 0,
    
    koRound: 1,
    koWinsT1: 0,
    koWinsT2: 0,
    koRoundOverTimer: 0,
    koRestarting: false,
    
    globalStats: {},
    
    lastTime: 0,
    timeScale: 1.0, 

    // 賞金稼ぎ（Bounty）用の中央スター出現タイマー
    bountyCenterStarSpawned: false,

    init(mode, charType) {
        this.mode = mode; this.state = 'playing';
        this.entities=[]; this.bullets=[]; this.items=[]; this.ghosts=[]; this.particles=[]; this.uiEffects=[]; this.map=[]; this.areaEffects=[];
        this.score = { t1: 0, t2: 0, cd: -1 };
        this.spectateX = 0; this.spectateY = 0;
        
        this.globalStats = {};
        this.lastTime = performance.now();
        this.timeScale = 1.0;
        
        this.koRound = 1;
        this.koWinsT1 = 0;
        this.koWinsT2 = 0;
        this.koRoundOverTimer = 0;
        this.koRestarting = false;

        this.bountyCenterStarSpawned = false;
        
        if(mode === 'showdown') { this.mapW=3200; this.mapH=3200; this.poisonRadius=2400; }
        else { this.mapW=2000; this.mapH=1600; }
        
        this.generateMap();
        this.setupRound();
        
        document.getElementById('uiLayer').style.display = 'block';
        document.getElementById('kill-log').innerHTML = '';
        document.getElementById('resultsScreen').style.display = 'none';
    },
    
    setupRound() {
        this.entities.forEach(e => {
            if (!this.globalStats[e.name]) {
                this.globalStats[e.name] = { kills: e.kills, deaths: e.deaths, brawler: e.data.name, team: e.team };
            } else {
                this.globalStats[e.name].kills = e.kills;
                this.globalStats[e.name].deaths = e.deaths;
            }
        });

        this.entities = [];
        this.bullets = [];
        this.items = [];
        this.ghosts = [];
        this.areaEffects = [];
        
        // 賞金稼ぎモード：中央の青い星を出現させる
        if (this.mode === 'bounty') {
            this.areaEffects.push(new BountyCenterStar(this.mapW / 2, this.mapH / 2));
            this.bountyCenterStarSpawned = true;
        }

        // メンバー編成スロットデータに基づいてキャラクターを構築
        const mode = this.mode;
        
        // 1. プレイヤー構築 (Slot 0)
        let pSpawn = this.getSpawn(1);
        const playerSlot = SlotsManager.slots[0];
        let prevKills = player ? player.kills : 0;
        let prevDeaths = player ? player.deaths : 0;
        
        player = new Character(playerSlot.brawler, true, 1, pSpawn.x, pSpawn.y, playerSlot);
        player.kills = prevKills;
        player.deaths = prevDeaths;
        this.entities.push(player);
        this.spectateX = player.x;
        this.spectateY = player.y;

        const keys = Object.keys(CHAR_DATA);

        if (mode === 'showdown') {
            // ショーダウンモード：スロット 6〜16 までのうち有効なボットを生成 (最大11体)
            for (let i = 6; i < 17; i++) {
                const s = SlotsManager.slots[i];
                if (s && s.enabled) {
                    let bType = s.brawler;
                    if (bType === 'random') bType = keys[Math.floor(Math.random() * keys.length)];
                    
                    let spawn = this.getSpawn(i - 4); // 固有チーム
                    let bot = new Character(bType, false, i - 4, spawn.x, spawn.y, s);
                    this.entities.push(bot);
                }
            }
        } else {
            // 3v3モード (gemgrab, wipeout, bounty, knockout)
            // 味方チーム (スロット 1, 2)
            for (let i = 1; i <= 2; i++) {
                const s = SlotsManager.slots[i];
                if (s && s.enabled) {
                    let bType = s.brawler;
                    if (bType === 'random') bType = keys[Math.floor(Math.random() * keys.length)];
                    
                    let spawn = this.getSpawn(1);
                    let bot = new Character(bType, false, 1, spawn.x, spawn.y, s);
                    this.entities.push(bot);
                }
            }

            // 敵チーム (スロット 3, 4, 5)
            for (let i = 3; i <= 5; i++) {
                const s = SlotsManager.slots[i];
                if (s && s.enabled) {
                    let bType = s.brawler;
                    if (bType === 'random') bType = keys[Math.floor(Math.random() * keys.length)];
                    
                    let spawn = this.getSpawn(2);
                    let bot = new Character(bType, false, 2, spawn.x, spawn.y, s);
                    this.entities.push(bot);
                }
            }
        }
    },
    
    generateMap() {
        let mw = this.mapW, mh = this.mapH; let bs = 60;
        this.map = [];
        
        // 既存の左右壁
        this.map.push({x: mw/4, y: mh/4, w: bs*1.5, h: bs*3});
        this.map.push({x: mw*3/4 - bs*1.5, y: mh*3/4 - bs*3, w: bs*1.5, h: bs*3});
        
        // 既存の上下壁
        this.map.push({x: mw/2 - bs, y: bs*2, w: bs*2, h: bs});
        this.map.push({x: mw/2 - bs, y: mh - bs*3, w: bs*2, h: bs});

        // 中央の壁の代わりとして、上下に壁を追加
        this.map.push({x: mw/2 - bs*2, y: mh/2 - bs*3.5, w: bs*4, h: bs*1.5}); // 上
        this.map.push({x: mw/2 - bs*2, y: mh/2 + bs*2, w: bs*4, h: bs*1.5}); // 下
    },
    
    getSpawn(team) {
        if(this.mode === 'showdown') return { x: 300+Math.random()*(this.mapW-600), y: 300+Math.random()*(this.mapH-600) };
        if(team === 1) return { x: 250+Math.random()*150, y: this.mapH/2 + (Math.random()-0.5)*500 };
        return { x: this.mapW - 400+Math.random()*150, y: this.mapH/2 + (Math.random()-0.5)*500 };
    },

    findClosestEnemy(source, maxDist) {
        let closest = null; let minDist = maxDist;
        this.entities.forEach(e => {
            if(e !== source && e.hp > 0 && e.team !== source.team) {
                if (e.type === 'kit' && e.invisibleTimer > 0) return;
                
                let d = dist(source.x, source.y, e.x, e.y);
                if(d < minDist) { minDist = d; closest = e; }
            }
        });
        return closest;
    },
    
    update() {
        if(this.state !== 'playing') return;
        
        if(this.mode === 'gemgrab') {
            this.gemTimer += this.timeScale;
            if(this.gemTimer > 300) {
                this.items.push(new Item(this.mapW/2+(Math.random()-0.5)*60, this.mapH/2+(Math.random()-0.5)*60, 'gem'));
                this.gemTimer = 0;
            }
            let t1g = this.entities.filter(e=>e.team===1).reduce((a,b)=>a+b.gems, 0);
            let t2g = this.entities.filter(e=>e.team===2).reduce((a,b)=>a+b.gems, 0);
            if(t1g >= 10 || t2g >= 10) {
                if(this.score.cd < 0) this.score.cd = 15 * 60; else this.score.cd -= this.timeScale;
                if(this.score.cd <= 0) this.end(t1g > t2g ? 1 : 2);
            } else { this.score.cd = -1; }
            this.updateHUD(`🔵 ${t1g} - 🔴 ${t2g}${this.score.cd>0 ? ` <span style="color:#f1c40f;font-size:1rem;">(⏳${Math.ceil(this.score.cd/60)})</span>` : ''}`);
        }
        else if (this.mode === 'wipeout') {
            if(this.score.t1 >= 10) this.end(1); else if(this.score.t2 >= 10) this.end(2);
            this.updateHUD(`🔵 ${this.score.t1} - 🔴 ${this.score.t2} <span style="font-size:1rem;">/ 10</span>`);
        }
        else if (this.mode === 'bounty') {
            // 賞金稼ぎ（Bounty）：先に20星を獲得した方が勝ち
            if (this.score.t1 >= 20) this.end(1);
            else if (this.score.t2 >= 20) this.end(2);
            
            // 定期的なタイブレーク青スターの復活（回収されていたら一定時間で再出現）
            let starExists = this.areaEffects.some(ae => ae instanceof BountyCenterStar);
            if (!starExists) {
                this.gemTimer += this.timeScale;
                if (this.gemTimer > 450) { // 7.5秒で復活
                    this.areaEffects.push(new BountyCenterStar(this.mapW / 2, this.mapH / 2));
                    this.gemTimer = 0;
                    Game.uiEffects.push(new FloatingText(this.mapW/2, this.mapH/2 - 40, "⭐ 青スター出現！", '#3498db', 20));
                }
            } else {
                this.gemTimer = 0;
            }

            this.updateHUD(`<span class="score-blue">🔵 ${this.score.t1}</span> - <span class="score-red">🔴 ${this.score.t2}</span> <span style="font-size:1rem;">/ 20⭐</span>`);
        }
        else if (this.mode === 'knockout') {
            let t1Alive = this.entities.filter(e=>e.team===1 && e.hp>0);
            let t2Alive = this.entities.filter(e=>e.team===2 && e.hp>0);
            
            let t1Icons = t1Alive.map(e => e.isPlayer ? '⭐' : '🔵').join(' ');
            let t2Icons = t2Alive.map(e => '🔴').join(' ');
            if (t1Alive.length === 0) t1Icons = '❌全滅';
            if (t2Alive.length === 0) t2Icons = '❌全滅';
            
            this.updateHUD(
                `<div style="font-size:1rem; color:#aaa; margin-bottom:2px;">ラウンド ${this.koRound} / 3</div>` +
                `<div style="display:flex; justify-content:space-between; gap:20px; font-size:1.1rem;">` +
                `<span>味方: ${t1Icons} (${t1Alive.length})</span>` +
                `<span style="color:#f1c40f;">${this.koWinsT1} 🏆 ${this.koWinsT2}</span>` +
                `<span>敵: (${t2Alive.length}) ${t2Icons}</span>` +
                `</div>`
            );
            
            if (!this.koRestarting) {
                if (t1Alive.length === 0 || t2Alive.length === 0) {
                    this.koRestarting = true;
                    this.koRoundOverTimer = 180; 
                    
                    let roundWinner = t1Alive.length > 0 ? 1 : 2;
                    if (roundWinner === 1) this.koWinsT1++;
                    else this.koWinsT2++;
                }
            } else {
                this.koRoundOverTimer -= this.timeScale;
                if (this.koRoundOverTimer <= 0) {
                    this.koRestarting = false;
                    
                    if (this.koWinsT1 >= 2) {
                        this.end(1);
                    } else if (this.koWinsT2 >= 2) {
                        this.end(2);
                    } else {
                        this.koRound++;
                        this.setupRound(); 
                        Game.uiEffects.push(new FloatingText(this.mapW/2, this.mapH/2, `ラウンド ${this.koRound}!`, '#f1c40f', 32));
                    }
                }
            }
        }
        else if (this.mode === 'showdown') {
            this.poisonRadius -= 0.25 * this.timeScale;
            let alive = 0, last = null;
            this.entities.forEach(e => {
                if(e.hp>0) {
                    alive++; last = e;
                    if(dist(e.x, e.y, this.mapW/2, this.mapH/2) > this.poisonRadius) {
                        if(Math.random()<0.05 * this.timeScale) {
                            e.takeDamage(1000, null);
                            this.uiEffects.push(new FloatingText(e.x, e.y-40, "POISON", '#2ecc71', 14));
                        }
                    }
                }
            });
            if(alive <= 1) this.end(last ? last.team : 0);
            this.updateHUD(`🏆 残り: ${alive}`);
        }

        this.entities.forEach(e => e.update());
        this.bullets.forEach(b => b.update());
        this.items.forEach(i => i.update());
        this.ghosts.forEach(g => g.update());
        this.areaEffects.forEach(ae => ae.update());
        this.particles.forEach(p => p.update());
        this.uiEffects.forEach(u => u.update());
        
        this.entities = this.entities.filter(e => !e.remove || e.hp > 0);
        this.bullets = this.bullets.filter(b => !b.remove);
        this.ghosts = this.ghosts.filter(g => !g.remove);
        this.areaEffects = this.areaEffects.filter(ae => !ae.remove);
        this.particles = this.particles.filter(p => p.life > 0);
        this.uiEffects = this.uiEffects.filter(u => u.life > 0);
    },
    
    draw(ctx, cam) {
        ctx.fillStyle = '#1e272e'; ctx.fillRect(-cam.x, -cam.y, this.mapW, this.mapH);
        
        ctx.save(); ctx.translate(-cam.x, -cam.y);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 2;
        ctx.beginPath();
        for(let x=0; x<this.mapW; x+=100) { ctx.moveTo(x,0); ctx.lineTo(x,this.mapH); }
        for(let y=0; y<this.mapH; y+=100) { ctx.moveTo(0,y); ctx.lineTo(this.mapW,y); }
        ctx.stroke();

        if(this.mode === 'showdown') {
            ctx.fillStyle = 'rgba(46, 204, 113, 0.4)';
            ctx.beginPath(); ctx.rect(0, 0, this.mapW, this.mapH);
            ctx.arc(this.mapW/2, this.mapH/2, this.poisonRadius, 0, Math.PI*2, true); ctx.fill();
        }

        this.map.forEach(w => {
            ctx.fillStyle = '#2c3e50'; ctx.fillRect(w.x, w.y+w.h, w.w, 15); 
            ctx.fillStyle = '#95a5a6'; ctx.fillRect(w.x, w.y, w.w, w.h); 
            ctx.strokeStyle = '#34495e'; ctx.lineWidth = 4; ctx.strokeRect(w.x, w.y, w.w, w.h);
        });

        let draws = [...this.items, ...this.entities, ...this.ghosts, ...this.particles, ...this.areaEffects];
        draws.sort((a,b) => a.y - b.y);
        draws.forEach(d => d.draw(ctx));
        
        this.bullets.forEach(b => b.draw(ctx)); 
        this.uiEffects.forEach(u => u.draw(ctx)); 
        
        if(player && player.hp > 0) {
            for(let key in Input.btns) {
                let btn = Input.btns[key];
                
                if(btn.id !== null && !btn.tapOnly && btn.dragged && btn.mag >= 0.35) {
                    ctx.save();
                    
                    let range = player.data.range;
                    if(key === 'super' && player.type === 'shelly') range *= 1.3;
                    if(key === 'gadget' && player.gadget === 'sharp') range *= 1.5;

                    let isNormalEmpty = (player.ammo === 0 && key === 'attack');
                    if (player.type === 'pius') isNormalEmpty = (player.ammo === 0 && key === 'attack' || player.piusReloading);

                    ctx.fillStyle = key==='attack' ? 'rgba(255,255,255,0.22)' : 'rgba(241,196,15,0.3)';
                    ctx.strokeStyle = key==='attack' ? 'rgba(255,255,255,0.5)' : 'rgba(241,196,15,0.7)';
                    if(isNormalEmpty) {
                        ctx.fillStyle = 'rgba(231,76,60,0.2)'; 
                        ctx.strokeStyle = 'rgba(231,76,60,0.5)';
                    }
                    ctx.lineWidth = 2;

                    ctx.translate(player.x, player.y);
                    
                    if (player.type === 'shelly') {
                        if (key === 'attack') {
                            ctx.rotate(btn.angle);
                            let w = player.data.attackWidth;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.arc(0, 0, range, -w, w);
                            ctx.closePath();
                            ctx.fill(); ctx.stroke();
                            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                            for (let step = -2; step <= 2; step++) {
                                            ctx.beginPath();
                                            ctx.moveTo(0,0);
                                            ctx.lineTo(Math.cos(step * 0.12) * range, Math.sin(step * 0.12) * range);
                                            ctx.stroke();
                            }
                        } else if (key === 'super') {
                            ctx.rotate(btn.angle);
                            let w = 0.8; 
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.arc(0, 0, range, -w, w);
                            ctx.closePath();
                            ctx.fill(); ctx.stroke();
                            ctx.strokeStyle = 'rgba(241, 196, 15, 0.4)';
                            for (let step = -4; step <= 4; step++) {
                                            ctx.beginPath();
                                            ctx.moveTo(0,0);
                                            ctx.lineTo(Math.cos(step * 0.1) * range, Math.sin(step * 0.1) * range);
                                            ctx.stroke();
                            }
                        } else if (key === 'gadget') {
                            if (player.gadget === 'dash') {
                                ctx.rotate(btn.angle);
                                ctx.strokeStyle = 'rgba(46, 204, 113, 0.6)';
                                ctx.lineWidth = 8;
                                ctx.beginPath();
                                ctx.moveTo(0, 0);
                                ctx.lineTo(195, 0);
                                ctx.stroke();
                                ctx.fillStyle = 'rgba(46, 204, 113, 0.8)';
                                ctx.beginPath();
                                ctx.moveTo(195, -12);
                                ctx.lineTo(220, 0);
                                ctx.lineTo(195, 12);
                                ctx.fill();
                            } else if (player.gadget === 'sharp') {
                                ctx.rotate(btn.angle);
                                ctx.fillRect(0, -8, range, 16);
                                ctx.strokeRect(0, -8, range, 16);
                            }
                        }
                    } 
                    else if (player.type === 'colt') {
                        ctx.rotate(btn.angle);
                        if (key === 'attack') {
                            ctx.fillRect(0, -12, range, 24);
                            ctx.strokeRect(0, -12, range, 24);
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(range, 0); ctx.stroke();
                        } else if (key === 'super') {
                            ctx.fillStyle = 'rgba(241, 196, 15, 0.25)';
                            ctx.fillRect(0, -20, range, 40);
                            ctx.strokeRect(0, -20, range, 40);
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(range, 0); ctx.stroke();
                        } else if (key === 'gadget') {
                            if (player.gadget === 'one') {
                                ctx.fillStyle = 'rgba(46, 204, 113, 0.25)';
                                ctx.strokeStyle = 'rgba(46, 204, 113, 0.7)';
                                ctx.fillRect(0, -6, range, 12);
                                ctx.strokeRect(0, -6, range, 12);
                            } else if (player.gadget === 'slow') {
                                ctx.fillStyle = 'rgba(155, 89, 182, 0.25)';
                                ctx.strokeStyle = 'rgba(155, 89, 182, 0.7)';
                                ctx.fillRect(0, -14, range, 28);
                                ctx.strokeRect(0, -14, range, 28);
                            }
                        }
                    } 
                    else if (player.type === 'primo') {
                        if (key === 'attack') {
                            ctx.rotate(btn.angle);
                            let w = player.data.attackWidth;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.arc(0, 0, range, -w, w);
                            ctx.closePath();
                            ctx.fill(); ctx.stroke();
                        } else if (key === 'super') {
                            let distToTarget = btn.mag * 400; 
                            let landingSpot = getSafeLandingSpot(player.x, player.y, btn.angle, distToTarget, player.r);
                            let tx = landingSpot.x - player.x;
                            let ty = landingSpot.y - player.y;
                            
                            ctx.strokeStyle = 'rgba(241, 196, 15, 0.6)';
                            ctx.lineWidth = 4;
                            ctx.setLineDash([8, 6]);
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(tx, ty); ctx.stroke();
                            ctx.setLineDash([]); 
                            
                            let landingRadius = player.sp === 'shock' ? 140 : 100;
                            ctx.fillStyle = 'rgba(241, 196, 15, 0.2)';
                            ctx.strokeStyle = 'rgba(241, 196, 15, 0.8)';
                            ctx.lineWidth = 3;
                            ctx.beginPath(); ctx.arc(tx, ty, landingRadius, 0, Math.PI * 2);
                            ctx.fill(); ctx.stroke();
                        } else if (key === 'gadget') {
                            if (player.gadget === 'lariat') {
                                ctx.rotate(btn.angle);
                                ctx.strokeStyle = 'rgba(46, 204, 113, 0.6)';
                                            ctx.lineWidth = 8;
                                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(210, 0); ctx.stroke();
                                            ctx.fillStyle = 'rgba(46, 204, 113, 0.8)';
                                            ctx.beginPath(); ctx.moveTo(210, -12); ctx.lineTo(235, 0); ctx.lineTo(210, 12); ctx.fill();
                            } else if (player.gadget === 'catch') {
                                ctx.rotate(btn.angle);
                                ctx.fillStyle = 'rgba(46, 204, 113, 0.2)';
                                ctx.strokeStyle = 'rgba(46, 204, 113, 0.8)';
                                ctx.fillRect(0, -15, range, 30);
                                ctx.strokeRect(0, -15, range, 30);
                                ctx.beginPath();
                                ctx.arc(range, 0, 15, -Math.PI/2, Math.PI/2);
                                ctx.stroke();
                            }
                        }
                    }
                    else if (player.type === 'gus') {
                        ctx.rotate(btn.angle);
                        if (key === 'attack') {
                            ctx.fillRect(0, -9, range, 18);
                            ctx.strokeRect(0, -9, range, 18);
                        } else if (key === 'super') {
                            ctx.beginPath(); ctx.arc(0, 0, 150, 0, Math.PI*2); ctx.stroke(); 
                        } else if (key === 'gadget') {
                            if (player.gadget === 'cracker') {
                                ctx.beginPath(); ctx.arc(0, 0, 110, 0, Math.PI*2); ctx.stroke();
                            }
                        }
                    }
                    else if (player.type === 'mortis') {
                        ctx.rotate(btn.angle);
                        if (key === 'attack') {
                            let currentRange = range * (1 + player.longDashGauge * 2);
                            ctx.fillStyle = 'rgba(255,255,255,0.1)';
                            ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(currentRange, -20); ctx.lineTo(currentRange, 20); ctx.lineTo(0, 20); ctx.fill(); ctx.stroke();
                        } else if (key === 'super') {
                            ctx.fillRect(0, -15, 600, 30); ctx.strokeRect(0, -15, 600, 30);
                        } else if (key === 'gadget') {
                            if (player.gadget === 'spinner') {
                                ctx.beginPath(); ctx.arc(0, 0, player.r * 4, 0, Math.PI*2); ctx.stroke();
                            } else if (player.gadget === 'batmove') {
                                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(150,0); ctx.stroke();
                            }
                        }
                    }
                    else if (player.type === 'kit') {
                        if (key === 'attack') {
                            ctx.rotate(btn.angle);
                            let w = player.data.attackWidth;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.arc(0, 0, range, -w, w);
                            ctx.closePath();
                            ctx.fill(); ctx.stroke();
                        } else if (key === 'super') {
                            let distToTarget = btn.mag * 420; 
                            let landingSpot = getSafeLandingSpot(player.x, player.y, btn.angle, distToTarget, player.r);
                            let tx = landingSpot.x - player.x;
                            let ty = landingSpot.y - player.y;
                            
                            ctx.strokeStyle = 'rgba(241, 196, 15, 0.6)';
                            ctx.lineWidth = 4;
                            ctx.setLineDash([8, 6]);
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(tx, ty); ctx.stroke();
                            ctx.setLineDash([]); 
                            
                            ctx.fillStyle = 'rgba(241, 196, 15, 0.2)';
                            ctx.strokeStyle = 'rgba(241, 196, 15, 0.8)';
                            ctx.lineWidth = 3;
                            ctx.beginPath(); ctx.arc(tx, ty, 120, 0, Math.PI * 2);
                            ctx.fill(); ctx.stroke();
                        }
                    }
                    else if (player.type === 'chester') {
                        ctx.rotate(btn.angle);
                        if (key === 'attack') {
                            let activeG = player.hcActive ? 3 : player.chesterGauge;
                            let isFS = (activeG === 0 && player.sp === 'firststrike');
                            let tW = isFS ? 28 : 16;
                            ctx.fillRect(0, -tW/2, range, tW);
                            ctx.strokeRect(0, -tW/2, range, tW);
                        } else if (key === 'super') {
                            let sType = player.chesterSuperType;
                            if (sType === 'explode') {
                                let distToTarget = btn.mag * 450;
                                let tx = Math.cos(btn.angle) * distToTarget;
                                let ty = Math.sin(btn.angle) * distToTarget;
                                ctx.strokeStyle = 'rgba(211, 84, 0, 0.6)';
