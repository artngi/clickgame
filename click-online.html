
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>オンライン連打ゲーム - わら人形</title>
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation; 
            overflow: hidden;
        }

        #game-container {
            background: #34495e;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            max-height: 95vh;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .rank-display {
            background: #8e44ad;
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 10px;
            border: 2px solid #9b59b6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #current-rank {
            font-weight: bold;
            color: #f1c40f;
            font-size: 1.1rem;
            text-shadow: 0 0 5px rgba(241, 196, 15, 0.5);
        }

        /* オンライン連携用の丸ボタンとインジケーター */
        .online-status-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .online-indicator {
            width: 10px;
            height: 10px;
            background-color: #7f8c8d;
            border-radius: 50%;
            display: inline-block;
        }
        .online-indicator.connected {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }
        .online-toggle-btn {
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .online-toggle-btn:active {
            transform: scale(0.9);
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        #event-timer-display {
            background: #e74c3c;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 0.8rem;
            flex: 1;
            font-weight: bold;
        }

        .status-panel {
            background: #1a252f;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .status-item { font-size: 0.9rem; margin: 2px 0; }
        .highlight { color: #f1c40f; font-weight: bold; font-size: 1.2rem; }

        #boss-hp-container {
            display: none;
            width: 100%;
            background: #444;
            height: 20px;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
            border: 2px solid #000;
        }
        #boss-hp-bar {
            width: 100%;
            height: 100%;
            background: #ff4757;
            transition: width 0.1s;
        }

        #doll-container {
            position: relative;
            display: inline-block;
            margin: 10px 0;
            flex-shrink: 0;
            min-height: 120px;
        }

        #straw-doll {
            font-size: clamp(60px, 20vw, 100px);
            cursor: pointer;
            display: inline-block;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .multiplier-config {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        #input-multiplier { width: 60px; text-align: center; }

        @keyframes random-shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(var(--sx), var(--sy)) rotate(var(--sr)); }
            50% { transform: translate(calc(var(--sx) * -0.8), calc(var(--sy) * -0.8)) rotate(calc(var(--sr) * -0.8)); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake-active { animation: random-shake 0.08s linear forwards; }

        .shop { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 5px;
        }
        
        .item-box {
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .item-box.full-width { grid-column: span 2; }

        .upgrade-btn { 
            background: #27ae60; 
            border: none; 
            padding: 8px 4px; 
            color: white; 
            border-radius: 8px; 
            cursor: pointer;
            transition: 0.2s;
        }
        .upgrade-btn:disabled { background: #7f8c8d; opacity: 0.6; }

        /* ダメージポップアップの基本スタイル */
        .damage-popup {
            position: absolute;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            animation: float-up 0.6s ease-out forwards;
            z-index: 100;
        }
        @keyframes float-up {
            0% { opacity: 1; transform: translate(0, 0) scale(1.2); }
            100% { opacity: 0; transform: translate(var(--rx), -80px) scale(0.8); }
        }

        .event-active-banner {
            background: #f1c40f;
            color: #000;
            padding: 5px;
            font-weight: bold;
            font-size: 0.8rem;
            border-radius: 5px;
            margin-bottom: 5px;
            display: none;
        }

        .reset-area { margin-top: 15px; border-top: 1px solid #5d6d7e; padding-top: 10px; }
        #btn-reset { background: #c0392b; color: #ecf0f1; border: none; padding: 6px 12px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }

        /* --- オンライン・マルチプレイヤースタイル --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #2c3e50;
            border: 3px solid #3b82f6;
            border-radius: 15px;
            width: 100%;
            max-width: 380px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #3b82f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            cursor: pointer;
            font-size: 1.5rem;
            color: #95a5a6;
        }
        .player-list {
            overflow-y: auto;
            flex-grow: 1;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }
        .player-item {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }
        .player-info {
            text-align: left;
        }
        .player-name {
            font-weight: bold;
            color: #f1c40f;
        }
        .player-stats {
            font-size: 0.75rem;
            color: #bdc3c7;
        }
        .btn-duel {
            background: #e74c3c;
            border: none;
            padding: 4px 10px;
            color: white;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-duel:disabled {
            background: #7f8c8d;
            opacity: 0.5;
        }
        
        /* 決闘画面モーダル */
        .duel-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .duel-container {
            background: #1a252f;
            border: 4px solid #e74c3c;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 30px #e74c3c;
        }
        .duel-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
        }
        .duel-timer {
            font-size: 2.5rem;
            font-weight: bold;
            color: #f1c40f;
            margin: 10px 0;
        }
        .duel-fighters {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
        }
        .fighter {
            flex: 1;
        }
        .fighter.self {
            color: #3498db;
        }
        .fighter.enemy {
            color: #e74c3c;
        }
        .fighter-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .fighter-score {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 5px;
        }
        .vs-label {
            font-style: italic;
            color: #bdc3c7;
            font-size: 1.2rem;
        }
        .input-name-field {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #7f8c8d;
            background: #34495e;
            color: white;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
    </style>
    <!-- Socket.IOクライアントのインポート -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="game-container">
        <div class="rank-display">
            <div>現在のランク: <span id="current-rank">読み込み中...</span></div>
            <div class="online-status-container">
                <span class="online-indicator" id="online-indicator"></span>
                <button class="online-toggle-btn" id="online-btn" title="オンライン対戦・ランキング">🌐</button>
            </div>
        </div>

        <div class="top-controls">
            <div id="event-timer-display">次まで: 1:30</div>
        </div>

        <div id="event-banner" class="event-active-banner"></div>

        <div class="status-panel">
            <div class="status-item">ポイント: <span id="points" class="highlight">0</span> pt</div>
            <div class="status-item">総ダメージ: <span id="total-damage">0</span></div>
        </div>

        <div id="boss-hp-container"><div id="boss-hp-bar"></div></div>

        <div id="doll-container">
            <div id="straw-doll">🌾</div>
        </div>

        <div class="multiplier-config">
            <label for="input-multiplier">一括購入:</label>
            <input type="number" id="input-multiplier" value="1" min="1">
        </div>

        <div class="shop">
            <div class="item-box">
                <span style="font-size:0.7rem">剣 Lv<span id="cur-lv-sword">0</span></span>
                <button class="upgrade-btn" id="btn-sword">
                    <span class="next-tag">+<span class="plus-val">1</span> Lv</span>
                    <span class="cost-tag"><span id="cost-sword">10</span> pt</span>
                </button>
            </div>
            <div class="item-box">
                <span style="font-size:0.7rem">銃 Lv<span id="cur-lv-gun">0</span></span>
                <button class="upgrade-btn" id="btn-gun">
                    <span class="next-tag">+<span class="plus-val">1</span> Lv</span>
                    <span class="cost-tag"><span id="cost-gun">100</span> pt</span>
                </button>
            </div>
            <div class="item-box">
                <span style="font-size:0.7rem">ジェム Lv<span id="cur-lv-gem">0</span></span>
                <button class="upgrade-btn" id="btn-gem">
                    <span class="next-tag">+<span class="plus-val">1</span> Lv</span>
                    <span class="cost-tag"><span id="cost-gem">500</span> pt</span>
                </button>
            </div>
            <div class="item-box">
                <span style="font-size:0.7rem">タレット Lv<span id="cur-lv-turret">0</span></span>
                <button class="upgrade-btn" id="btn-turret">
                    <span class="next-tag">+<span class="plus-val">1</span> Lv</span>
                    <span class="cost-tag"><span id="cost-turret">1000</span> pt</span>
                </button>
            </div>
            <div class="item-box full-width" style="background: rgba(230, 126, 34, 0.2);">
                <span style="font-size:0.7rem">わら人形強化 Lv<span id="cur-lv-doll">1</span></span>
                <button class="upgrade-btn" id="btn-doll" style="background: #e67e22;">
                    <span class="next-tag">+<span class="plus-val">1</span> Lv</span>
                    <span class="cost-tag"><span id="cost-doll">50</span> pt</span>
                </button>
            </div>
        </div>

        <div class="reset-area">
            <button id="btn-reset">データをリセットする</button>
        </div>
    </div>

    <!-- オンライン・プレイヤーモーダル -->
    <div class="modal-overlay" id="online-modal">
        <div class="modal-content">
            <div class="modal-header">
                <span>🌐 オンラインプレイヤー</span>
                <span class="modal-close" id="close-online-btn">&times;</span>
            </div>
            <div style="margin-bottom: 10px; font-size: 0.8rem; color: #bdc3c7;">
                他のオンラインプレイヤーに戦いを挑もう！
            </div>
            <div class="player-list" id="online-player-list">
                <!-- プレイヤーがここに追加される -->
            </div>
        </div>
    </div>

    <!-- 決闘ゲームモーダル -->
    <div class="duel-modal" id="duel-modal">
        <div class="duel-container">
            <div class="duel-title">⚔️ 連打決闘 (DUEL) ⚔️</div>
            <p style="color: #bdc3c7; font-size: 0.85rem;">相手より多く連打して、ポイントを奪い取れ！</p>
            <div class="duel-timer" id="duel-countdown">10</div>
            
            <div class="duel-fighters">
                <div class="fighter self">
                    <div class="fighter-name" id="duel-self-name">あなた</div>
                    <div class="fighter-score" id="duel-self-score">0</div>
                </div>
                <div class="vs-label">VS</div>
                <div class="fighter enemy">
                    <div class="fighter-name" id="duel-enemy-name">相手</div>
                    <div class="fighter-score" id="duel-enemy-score">0</div>
                </div>
            </div>
            
            <div style="font-size: 2rem; animation: pulse 1s infinite;">🌾</div>
            <p style="font-size: 0.9rem; color:#e74c3c;">※画面全体のわら人形を連打してください！</p>
        </div>
    </div>

    <script>
        let points = 0;
        let totalDamage = 0;
        let userName = "";
        let currentMultiplier = 1;
        let userId = ""; // ユニークなユーザーID

        // オンライン関連の変数
        let socket;
        const SERVER_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5000' 
            : 'https://click-server-85wq.onrender.com'; // RenderなどのURL。適宜書き換えてください。

        let onlinePlayers = [];
        let isDuelActive = false;
        let currentDuelId = "";
        let duelSelfScore = 0;
        let duelTimerInterval;
        let currentOpponentId = "";

        const RANKS = [
            { threshold: 0, title: "一般人" },
            { threshold: 1000, title: "初心者" },
            { threshold: 5000, title: "中級者" },
            { threshold: 20000, title: "上級者" },
            { threshold: 100000, title: "プロ" },
            { threshold: 500000, title: "エキスパート" },
            { threshold: 1000000, title: "達人" },
            { threshold: 10000000, title: "仙人" },
            { threshold: 100000000, title: "神" }
        ];

        let eventTimer = 90; 
        let activeEvent = null;
        let eventDuration = 0;
        let bossMode = false;
        let bossHP = 0;
        let bossMaxHP = 0;

        const state = {
            sword: { lv: 0, cost: 10, baseCost: 10 },
            gun: { lv: 0, cost: 100, baseCost: 100 },
            gem: { lv: 0, cost: 500, baseCost: 500 },
            turret: { lv: 0, cost: 1000, baseCost: 1000 },
            doll: { lv: 1, cost: 50, baseCost: 50 }
        };

        const dollEl = document.getElementById('straw-doll');
        const dollContainer = document.getElementById('doll-container');
        const eventTimerEl = document.getElementById('event-timer-display');
        const bannerEl = document.getElementById('event-banner');

        function saveGame() {
            localStorage.setItem('straw_doll_v2_save', JSON.stringify({ points, totalDamage, userName, userId, state }));
            // オンラインサーバーにも能力値を同期
            syncWithOnlineServer();
        }

        function loadGame() {
            const saved = localStorage.getItem('straw_doll_v2_save');
            if (saved) {
                const data = JSON.parse(saved);
                points = data.points || 0;
                totalDamage = data.totalDamage || 0;
                userName = data.userName || "";
                userId = data.userId || "user_" + Math.random().toString(36).substr(2, 9);
                if(data.state) Object.keys(state).forEach(k => { if(data.state[k]) state[k].lv = data.state[k].lv; });
            } else {
                userId = "user_" + Math.random().toString(36).substr(2, 9);
            }
        }

        function updateRankUI() {
            let currentTitle = RANKS[0].title;
            for (let i = RANKS.length - 1; i >= 0; i--) {
                if (totalDamage >= RANKS[i].threshold) {
                    currentTitle = RANKS[i].title;
                    break;
                }
            }
            document.getElementById('current-rank').innerText = currentTitle;
        }

        function startEvent() {
            const events = ["DMG_X2", "DMG_HALF", "PT_X2", "PT_HALF", "COST_HALF", "COST_X2", "BOSS", "BOSS", "BOSS", "BOSS"];
            const choice = events[Math.floor(Math.random() * events.length)];
            activeEvent = choice;
            navigator.vibrate?.(200);
            
            if (choice === "BOSS") {
                spawnBoss();
            } else {
                eventDuration = 30;
                const labels = {
                    "DMG_X2": "🔥 ダメージ2倍！", "DMG_HALF": "❄️ ダメージ1/2...",
                    "PT_X2": "💰 ポイント倍率2倍！", "PT_HALF": "💸 ポイント倍率1/2...",
                    "COST_HALF": "🛠️ コスト1/2！", "COST_X2": "⚠️ コスト2倍..."
                };
                bannerEl.innerText = labels[choice];
                bannerEl.style.display = "block";
            }
        }

        function spawnBoss() {
            bossMode = true;
            eventDuration = 30;
            bossMaxHP = ((state.turret.lv + (state.gem.lv) * 0.3) * 0.2 * 600) + 
                         ((1 + (state.sword.lv) * 0.5 + (state.gem.lv) * 0.3) + 
                         ((state.gun.lv + (state.gem.lv) * 0.3) * 0.1 * 10)) * 300;
            
            if(bossMaxHP < 100) bossMaxHP = 100;
            bossHP = bossMaxHP;
            
            dollEl.innerText = "👹";
            document.getElementById('boss-hp-container').style.display = "block";
            updateBossUI();
            bannerEl.innerText = "☢️ BOSS出現！30秒以内に倒せ！";
            bannerEl.style.display = "block";
            bannerEl.style.background = "#ff4757";
        }

        function updateBossUI() {
            const pct = (bossHP / bossMaxHP) * 100;
            document.getElementById('boss-hp-bar').style.width = Math.max(0, pct) + "%";
        }

        function endEvent() {
            activeEvent = null;
            bossMode = false;
            bannerEl.style.display = "none";
            bannerEl.style.background = "#f1c40f";
            document.getElementById('boss-hp-container').style.display = "none";
            dollEl.innerText = "🌾";
            eventTimer = 90;
        }

        setInterval(() => {
            if (activeEvent) {
                eventDuration--;
                if (bossMode) {
                    eventTimerEl.innerText = `ボス終了まで: ${eventDuration}s`;
                    if (eventDuration <= 0) {
                        alert("ボスを倒せなかった...ポイントが没収されました！");
                        points = 0;
                        saveGame();
                        updateUI();
                        endEvent();
                        navigator.vibrate?.(200);
                    }
                } else {
                    eventTimerEl.innerText = `イベント終了まで: ${eventDuration}s`;
                    if (eventDuration <= 0) endEvent();
                }
            } else {
                eventTimer--;
                let m = Math.floor(eventTimer / 60);
                let s = eventTimer % 60;
                eventTimerEl.innerText = `次まで: ${m}:${s.toString().padStart(2, '0')}`;
                if (eventTimer <= 0) startEvent();
            }
        }, 1000);

        function getBulkCost(key, amount) {
            if (amount < 1) return 0;
            const item = state[key];
            let startLv = (key === 'doll') ? item.lv : item.lv + 1;
            let endLv = startLv + amount - 1;
            let sum = (amount * (startLv + endLv)) / 2;
            let total = Math.floor(sum * item.baseCost);
            
            if (activeEvent === "COST_HALF") total *= 0.5;
            if (activeEvent === "COST_X2") total *= 2;
            return Math.floor(total);
        }

        function applyDamage(dmg, color = "#ffffff", isCrit = false) {
            if (dmg <= 0) return;

            // 決闘モード時の処理
            if (isDuelActive) {
                duelSelfScore += dmg;
                document.getElementById('duel-self-score').innerText = Math.ceil(duelSelfScore).toLocaleString();
                if (socket && socket.connected) {
                    socket.emit('duel_progress', {
                        duelId: currentDuelId,
                        userId: userId,
                        damage: dmg
                    });
                }
            }

            if (activeEvent === "DMG_X2") dmg *= 2;
            if (activeEvent === "DMG_HALF") dmg *= 0.5;

            if (bossMode) {
                bossHP -= dmg;
                updateBossUI();
                if (bossHP <= 0) {
                    bossHP = 0;
                    updateBossUI();
                    setTimeout(() => {
                        const bonus = Math.ceil(bossMaxHP) * 10;
                        alert(`ボス撃破！ボーナス ${bonus.toLocaleString()}pt 獲得！`);
                        points += bonus;
                        navigator.vibrate?.(500);
                        endEvent();
                        updateUI();
                        saveGame();
                    }, 10);
                    return;
                }
            }

            totalDamage += dmg;
            let ptGain = dmg * state.doll.lv;
            if (activeEvent === "PT_X2") ptGain *= 2;
            if (activeEvent === "PT_HALF") ptGain *= 0.5;
            
            points += ptGain;
            showDamageText(dmg, color, isCrit);
            triggerShake(); 
            updateUI();
            saveGame();
        }

        function triggerShake() {
            dollEl.style.setProperty('--sx', (Math.random() - 0.5) * 30 + "px");
            dollEl.style.setProperty('--sy', (Math.random() - 0.5) * 30 + "px");
            dollEl.style.setProperty('--sr', (Math.random() - 0.5) * 15 + "deg");
            dollEl.classList.remove('shake-active');
            void dollEl.offsetWidth; 
            dollEl.classList.add('shake-active');
        }

        function showDamageText(dmg, color, isCrit) {
            const el = document.createElement('div');
            el.className = 'damage-popup';
            el.innerText = isCrit ? `Critical! -${Math.ceil(dmg)}` : `-${Math.ceil(dmg)}`;
            
            el.style.color = color;
            if (isCrit) {
                el.style.fontSize = "1.5rem";
                el.style.zIndex = "101";
            } else {
                el.style.fontSize = "1.1rem";
            }

            el.style.left = `calc(50% + ${(Math.random() - 0.5) * 150}px)`;
            el.style.top = `calc(50% + ${(Math.random() - 0.5) * 80}px)`;
            el.style.setProperty('--rx', `${(Math.random() - 0.5) * 120}px`);
            dollContainer.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        dollEl.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            
            const swordBaseDmg = Math.ceil(1 + (state.sword.lv) * 0.5 + (state.gem.lv) * 0.3);
            
            if (Math.random() < 0.20) {
                applyDamage(swordBaseDmg * 2, "#ffffff", true);
            } else {
                applyDamage(swordBaseDmg, "#ffffff", false);
            }

            if (state.gun.lv > 0) {
                let count = 0;
                const gunInterval = setInterval(() => {
                    applyDamage(Math.ceil((state.gun.lv + (state.gem.lv) * 0.3) * 0.1), "#e67e22");
                    if (++count >= 10) clearInterval(gunInterval);
                }, 30);
            }
        });

        setInterval(() => {
            if (state.turret.lv > 0) {
               const damage = Math.ceil((state.turret.lv + (state.gem.lv) * 0.3) * 0.2);
               applyDamage(damage, "#dc143c");
           }
        }, 50);

        function updateUI() {
            document.getElementById('points').innerText = Math.ceil(points).toLocaleString();
            document.getElementById('total-damage').innerText = Math.ceil(totalDamage).toLocaleString();
            document.querySelectorAll('.plus-val').forEach(el => el.innerText = currentMultiplier.toLocaleString());
            Object.keys(state).forEach(key => {
                const item = state[key];
                const bulkCost = getBulkCost(key, currentMultiplier);
                document.getElementById(`cur-lv-${key}`).innerText = item.lv.toLocaleString();
                document.getElementById(`cost-${key}`).innerText = bulkCost.toLocaleString();
                document.getElementById(`btn-${key}`).disabled = (points < bulkCost);
            });
            updateRankUI();
        }

        function resetData() {
            if (confirm("全データを削除して最初からやり直しますか？")) {
                // オンライン切断
                if (socket && socket.connected) {
                    socket.emit('disconnect_player', { userId: userId });
                }
                localStorage.removeItem('straw_doll_v2_save');
                localStorage.clear();
                points = 0;
                totalDamage = 0;
                state.sword.lv = 0;
                state.gun.lv = 0;
                state.gem.lv = 0;
                state.turret.lv = 0;
                state.doll.lv = 0;
                location.reload(true);
            }
        }

        document.getElementById('btn-reset').addEventListener('click', () => resetData());
        document.getElementById('input-multiplier').addEventListener('input', (e) => {
            currentMultiplier = parseInt(e.target.value) || 1;
            updateUI();
        });

        Object.keys(state).forEach(key => {
            document.getElementById(`btn-${key}`).addEventListener('click', () => {
                const needed = getBulkCost(key, currentMultiplier);
                if (points >= needed) {
                    points -= needed;
                    state[key].lv += currentMultiplier;
                    updateUI();
                    saveGame();
                }
            });
        });

        // 読み込み完了後にゲームデータをロード
        loadGame();
        updateUI();

        // --- オンラインマルチプレイヤー実装 ---

        // 名前登録・初期設定
        function setupOnlineName() {
            if (!userName) {
                const defaultName = "プレイヤー" + Math.floor(1000 + Math.random() * 9000);
                const nameInput = prompt("オンライン用の名前を登録してください（12文字以内）:", defaultName);
                userName = (nameInput && nameInput.trim()) ? nameInput.substring(0, 12) : defaultName;
                saveGame();
            }
        }

        // オンラインサーバーへ接続
        function connectToOnlineServer() {
            setupOnlineName();
            
            socket = io(SERVER_URL);

            socket.on('connect', () => {
                document.getElementById('online-indicator').classList.add('connected');
                // サーバーに現在の自分の状況を同期
                syncWithOnlineServer();
            });

            socket.on('disconnect', () => {
                document.getElementById('online-indicator').classList.remove('connected');
            });

            // プレイヤーリストの更新
            socket.on('update_players', (playersList) => {
                onlinePlayers = playersList;
                renderPlayerList();
            });

            // 対戦要請を受けた時
            socket.on('receive_challenge', (data) => {
                if (data.targetId === userId && !isDuelActive) {
                    navigator.vibrate?.([100, 50, 100]);
                    const accept = confirm(`⚔️ ${data.challengerName} から決闘が挑まれました！\n勝負を受けますか？`);
                    if (accept) {
                        socket.emit('challenge_accept', {
                            challengerId: data.challengerId,
                            targetId: userId
                        });
                    } else {
                        socket.emit('challenge_decline', {
                            challengerId: data.challengerId
                        });
                    }
                }
            });

            // 対戦相手に拒否された場合
            socket.on('challenge_rejected', (data) => {
                alert(data.reason);
            });

            socket.on('duel_declined', (data) => {
                if(data.challengerId === userId) {
                    alert("決闘リクエストは拒否されました。");
                }
            });

            // 決闘開始
            socket.on('duel_start', (data) => {
                if (data.challengerId === userId || data.targetId === userId) {
                    startDuel(data);
                }
            });

            // 決闘中の相手スコア更新
            socket.on('duel_score_update', (data) => {
                if (isDuelActive && data.duelId === currentDuelId) {
                    if (userId === onlinePlayers.find(p => p.sid === userId)?.sid) {
                        // 相手のIDを見つけてスコアを更新
                        const isChallenger = currentDuelId.includes(userId) && currentDuelId.indexOf(userId) === 5; // duel_ の後
                        const opponentScore = isChallenger ? data.targetScore : data.challengerScore;
                        document.getElementById('duel-enemy-score').innerText = Math.ceil(opponentScore).toLocaleString();
                    }
                }
            });

            // 決闘結果通知
            socket.on('duel_result', (data) => {
                if (isDuelActive && data.duelId === currentDuelId) {
                    endDuel(data);
                }
            });
        }

        function syncWithOnlineServer() {
            if (socket && socket.connected) {
                socket.emit('join_game', {
                    userId: userId,
                    name: userName,
                    points: points,
                    totalDamage: totalDamage,
                    socketId: socket.id
                });
            }
        }

        // プレイヤーリストをUIへ描画
        function renderPlayerList() {
            const listEl = document.getElementById('online-player-list');
            listEl.innerHTML = '';

            // 総ダメージ順にソート（簡易オンラインランキング）
            const sortedPlayers = [...onlinePlayers].sort((a, b) => b.totalDamage - a.totalDamage);

            sortedPlayers.forEach((player, index) => {
                const isSelf = player.sid === userId;
                
                const item = document.createElement('div');
                item.className = 'player-item';
                if (isSelf) {
                    item.style.border = "1px solid #f1c40f";
                    item.style.background = "rgba(241, 196, 15, 0.1)";
                }

                item.innerHTML = `
                    <div class="player-info">
                        <span style="font-weight: bold; color: #3498db;">#${index + 1}</span>
                        <span class="player-name">${player.name} ${isSelf ? '(あなた)' : ''}</span>
                        <div class="player-stats">
                            💰 ${Math.ceil(player.points).toLocaleString()} pt | 💥 ${Math.ceil(player.totalDamage).toLocaleString()} dmg
                        </div>
                        <div style="font-size: 0.7rem; color: ${player.status === 'idle' ? '#2ecc71' : '#e74c3c'}">
                            ステータス: ${player.status === 'idle' ? '対戦可能' : '戦闘中'}
                        </div>
                    </div>
                    ${!isSelf ? `
                        <button class="btn-duel" onclick="sendDuelRequest('${player.sid}')" ${player.status !== 'idle' ? 'disabled' : ''}>
                            ⚔️ 決闘
                        </button>
                    ` : ''}
                `;
                listEl.appendChild(item);
            });

            if (sortedPlayers.length === 0) {
                listEl.innerHTML = '<div style="color: #bdc3c7; font-size: 0.9rem; padding: 10px;">接続中の他のプレイヤーはいません。</div>';
            }
        }

        // 決闘要請の送信
        window.sendDuelRequest = function(targetId) {
            if (socket && socket.connected) {
                const targetPlayer = onlinePlayers.find(p => p.sid === targetId);
                if (targetPlayer) {
                    alert(`${targetPlayer.name} に決闘を申し込みました。相手が承認するまでお待ちください...`);
                    socket.emit('challenge_request', {
                        challengerId: userId,
                        targetId: targetId,
                        socketId: socket.id
                    });
                }
            } else {
                alert("サーバーに未接続です。");
            }
        };

        // 決闘の開始
        function startDuel(data) {
            isDuelActive = true;
            currentDuelId = data.duelId;
            duelSelfScore = 0;
            
            const opponentName = data.challengerId === userId ? data.targetName : data.challengerName;
            currentOpponentId = data.challengerId === userId ? data.targetId : data.challengerId;

            document.getElementById('duel-self-name').innerText = userName;
            document.getElementById('duel-enemy-name').innerText = opponentName;
            document.getElementById('duel-self-score').innerText = "0";
            document.getElementById('duel-enemy-score').innerText = "0";

            // メインコンテナを閉じるか隠す必要はありません。モーダルを重ねて表示
            document.getElementById('duel-modal').style.display = 'flex';
            document.getElementById('online-modal').style.display = 'none';

            let count = 10;
            document.getElementById('duel-countdown').innerText = count;

            duelTimerInterval = setInterval(() => {
                count--;
                document.getElementById('duel-countdown').innerText = count;
                if (count <= 0) {
                    clearInterval(duelTimerInterval);
                    if (data.challengerId === userId) {
                        // ホスト役(挑戦者)が決闘終了処理を促す
                        setTimeout(() => {
                            socket.emit('duel_end', { duelId: currentDuelId });
                        }, 500);
                    }
                }
            }, 1000);
        }

        // 決闘の終了
        function endDuel(data) {
            isDuelActive = false;
            clearInterval(duelTimerInterval);
            document.getElementById('duel-modal').style.display = 'none';

            const amIWinner = data.winnerId === userId;
            const isDraw = data.winnerId === null;

            if (isDraw) {
                alert(`決闘結果：引き分け！\n（あなた: ${data.challengerScore}pt 対 ${data.targetScore}pt）`);
            } else if (amIWinner) {
                points += data.transfer;
                navigator.vibrate?.([200, 100, 200, 100, 400]);
                alert(`🏆 決闘勝利！\n相手から ${data.transfer.toLocaleString()}pt を強奪しました！\n（あなた: ${userId === data.loserId ? data.targetScore : data.challengerScore}pt 対 相手: ${userId === data.loserId ? data.challengerScore : data.targetScore}pt）`);
            } else {
                points -= data.transfer;
                if (points < 0) points = 0;
                navigator.vibrate?.(1000);
                alert(`💀 決闘敗北...\n相手に ${data.transfer.toLocaleString()}pt を奪われました...\n（あなた: ${userId === data.loserId ? data.targetScore : data.challengerScore}pt 対 相手: ${userId === data.loserId ? data.challengerScore : data.targetScore}pt）`);
            }

            currentDuelId = "";
            currentOpponentId = "";
            updateUI();
            saveGame();
        }

        // オンラインボタン＆モーダルの表示制御
        const onlineBtn = document.getElementById('online-btn');
        const onlineModal = document.getElementById('online-modal');
        const closeOnlineBtn = document.getElementById('close-online-btn');

        onlineBtn.addEventListener('click', () => {
            if (!socket || !socket.connected) {
                connectToOnlineServer();
            }
            onlineModal.style.display = 'flex';
        });

        closeOnlineBtn.addEventListener('click', () => {
            onlineModal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === onlineModal) {
                onlineModal.style.display = 'none';
            }
        });

        // 定期的なデータ同期 (生存確認も兼ねて10秒毎)
        setInterval(() => {
            if (socket && socket.connected) {
                syncWithOnlineServer();
            }
        }, 10000);

    </script>
</body>
</html>
