<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Cutter</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Arial', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; font-size: 14px; z-index: 10; }
        #combo-ui { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); color: #ff4500; font-size: 40px; font-weight: bold; font-style: italic; pointer-events: none; text-shadow: 0 0 10px #fff; display: none; text-align: right; }
        #buffs { position: absolute; top: 10px; right: 10px; color: #ffd700; text-align: right; pointer-events: none; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
        .btn { pointer-events: auto; background: #444; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 8px; margin-top: 8px; font-weight: bold; }
        .btn:disabled { background: #555 !important; cursor: not-allowed; color: #888; }
        #shop-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 2px solid #ffd700; padding: 20px; color: white; display: none; text-align: center; border-radius: 15px; width: 85%; max-width: 400px; max-height: 80vh; overflow-y: auto; z-index: 100; }
        .shop-item { margin: 10px 0; padding: 10px; border: 1px solid #444; background: #222; border-radius: 8px; }
        #fever-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 80px #ffd700; display: none; z-index: 5; }
    </style>
</head>
<body>

<div id="fever-overlay"></div>

<div id="ui">
    <div>❤️ 体力: <span id="hp-display">5</span> / <span id="max-hp-display">5</span></div>
    <div>💰 ポイント: <span id="score-display">0</span> Pt</div>
    <div>⏳ 回復まで: <span id="recover-display">30</span>s</div>
    <button class="btn" onclick="openShop()">🛒 ショップ</button>
    <button class="btn" style="background:#822;" onclick="resetData()">🗑️ 削除</button>
</div>

<div id="combo-ui"><span id="combo-count">0</span> COMBO!</div>
<div id="buffs"></div>

<div id="shop-screen">
    <h2>🛒 強化ショップ</h2>
    <div class="shop-item">❤️ 最大体力+1 <br> <button class="btn" onclick="buyUpgrade('maxHp', 50)">50 Pt</button></div>
    <div class="shop-item">🛡️ 盾 <br> <button class="btn" onclick="buyShield(100)">100 Pt</button></div>
    <div class="shop-item">💣 爆弾投下 <br> <button class="btn" id="btn-buy-bomb" onclick="buyBombItem(200)">200 Pt</button></div>
    <div class="shop-item">⚡ 回復速度2倍 (60s) <br> <button class="btn" onclick="buyUpgrade('fastRecover', 100)">100 Pt</button></div>
    <div class="shop-item">⚔️ 切れ味2倍 (30s) <br> <button class="btn" onclick="buyUpgrade('doubleDamage', 150)">150 Pt</button></div>
    <div class="shop-item">❄️ 低速落下 (45s) <br> <button class="btn" onclick="buyUpgrade('slowFall', 80)">80 Pt</button></div>
    <button class="btn" style="background:#555; width:100%;" onclick="closeShop()">閉じる</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;

let state = {
    hp: 5, maxHp: 5, score: 0,
    recoveryTimer: 30, isPaused: false, isFever: false,
    activeBuffs: {},
    combo: 0, comboTimer: 0,
    shields: 0, bombCooldown: 0
};

let fruits = [];
let particles = [];
let floatingTexts = [];
let mouse = { x: 0, y: 0, px: 0, py: 0, isMoving: false };
let mouseHistory = [];
let shakeTime = 0;
let bossActive = false;
let feverTimer = 0;

// フルーツとアイテムの種類定義
const TYPES = {
    S: { r: 25, hp: 1, pts: 1, color: '#ff4d4d', label: '🍎' },
    M: { r: 45, hp: 3, pts: 3, color: '#ffa500', label: '🍊' },
    L: { r: 65, hp: 5, pts: 5, color: '#44ff44', label: '🍉' },
    BOSS: { r: 100, hp: 75, pts: 100, color: '#9932cc', label: '👿' },
    FEVER: { r: 100, hp: 50, pts: 50, color: '#ffd700', label: '🌟' },
    BOMB: { r: 40, hp: 3, pts: 0, color: '#555555', label: '💣' },
    SILVER: { r: 35, hp: 15, pts: 150, color: '#c0c0c0', label: '🍏' },
    GOLD: { r: 35, hp: 20, pts: 250, color: '#ffd700', label: '🍎' },
    ITEM_BOMB: { r: 50, hp: 999, pts: 0, color: '#ffffff', label: '💣' }
};

const BUFF_LABELS = {
    fastRecover: "⚡ 回復2倍",
    doubleDamage: "⚔️ 攻撃2倍",
    slowFall: "❄️ 低速落下"
};

function init() {
    window.addEventListener('resize', resize);
    resize();
    loadGame();

    const handleInput = (nx, ny) => {
        mouse.px = mouse.x;
        mouse.py = mouse.y;
        mouse.x = nx;
        mouse.y = ny;
        if (Math.hypot(mouse.x - mouse.px, mouse.y - mouse.py) > 15) {
            mouse.isMoving = true;
            mouseHistory.push({x: nx, y: ny, life: 10});
        }
    };

    canvas.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        handleInput(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 'p') state.isPaused ? closeShop() : openShop(); });
    setInterval(saveGame, 5000);
    requestAnimationFrame(update);
}

function distToSegment(p, v, w) {
    const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
    if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
    let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

class Fruit {
    constructor(typeKey) {
        this.typeKey = typeKey;
        const config = TYPES[typeKey];
        this.r = config.r;
        this.maxHp = (typeKey === 'BOSS' || typeKey === 'FEVER') ? (Math.floor(Math.random()*50)+50) : config.hp;
        this.hp = this.maxHp;
        
        const side = Math.random();
        if (side < 0.4) { // 上
            this.x = Math.random() * (width - this.r * 2) + this.r;
            this.y = -this.r;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = 0.5;
        } else if (side < 0.7) { // 左
            this.x = -this.r;
            this.y = height * 0.3 + Math.random() * height * 0.4;
            this.vx = 1 + Math.random() * 1;
            this.vy = -3 - Math.random() * 3;
        } else { // 右
            this.x = width + this.r;
            this.y = height * 0.3 + Math.random() * height * 0.4;
            this.vx = -(1 + Math.random() * 1);
            this.vy = -3 - Math.random() * 3;
        }

        this.hitCooldown = 0;
        this.stopTime = 0;
        this.flash = 0;
        this.timer = 0; // アイテム爆弾用
    }

    update() {
        if (state.isPaused) return false;

        if (this.stopTime > 0) {
            this.stopTime--;
            return false;
        }
        
        // 味方の爆弾（アイテム）の特殊な動き
        if (this.typeKey === 'ITEM_BOMB') {
            if (this.y < height / 2) {
                this.y += this.vy;
            } else {
                this.timer--;
                if (this.timer <= 0) {
                    // 味方の爆弾起爆フラグ
                    state.triggerItemBomb = { x: this.x, y: this.y };
                    return true;
                }
            }
            return false; // マウス判定はスキップ（斬る必要なし）
        }

        const speedMul = state.activeBuffs['slowFall'] ? 0.5 : 1.0;
        this.vy += 0.1 * speedMul;
        this.x += this.vx * speedMul;
        this.y += this.vy * speedMul;

        if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.8; }
        if (this.x + this.r > width) { this.x = width - this.r; this.vx *= -0.8; }

        if (this.y - this.r > height) {
            // 敵の爆弾が画面外に落ちた場合はペナルティなし
            if (this.typeKey !== 'BOMB') {
                if (!state.isFever) {
                    state.hp--;
                    shakeTime = 15;
                    state.combo = 0;
                }
            }
            if (this.typeKey === 'BOSS' || this.typeKey === 'FEVER') bossActive = false;
            return true;
        }

        if (this.hitCooldown > 0) this.hitCooldown--;
        this.flash *= 0.8;

        if (mouse.isMoving && this.hitCooldown <= 0) {
            const d = distToSegment({x: this.x, y: this.y}, {x: mouse.px, y: mouse.py}, {x: mouse.x, y: mouse.y});
            if (d < this.r + 40) { 
                const isCritical = Math.random() < 0.1;
                let dmg = state.activeBuffs['doubleDamage'] ? 2 : 1;
                if (isCritical) dmg *= 5;
                
                // 敵の爆弾はクリティカルで一撃死させず、必ず3回斬らせる
                if (this.typeKey === 'BOMB') dmg = 1;

                this.hp -= dmg;

                // 特殊フルーツ以外はダメージに応じて小さくなる
                const specialTypes = ['BOSS', 'FEVER', 'BOMB', 'SILVER', 'GOLD'];
                if (!specialTypes.includes(this.typeKey) && this.hp > 0) {
                    const config = TYPES[this.typeKey];
                    this.r = Math.max(25, config.r * (this.hp / this.maxHp));
                }

                this.hitCooldown = 10; 
                this.stopTime = 3; 
                
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.7) * 3; 
                
                this.flash = 1;
                shakeTime = isCritical ? 25 : 8;
                state.combo++;
                state.comboTimer = 100;

                createParticles(this.x, this.y, isCritical ? '#fff' : TYPES[this.typeKey].color, isCritical ? 20 : 8);
                
                if (isCritical) {
                    floatingTexts.push({ x: this.x, y: this.y, text: "CRITICAL!!", life: 1, color: "#ffff00" });
                }

                if (this.hp <= 0) {
                    // 敵の爆弾起爆判定
                    if (this.typeKey === 'BOMB') {
                        state.triggerEnemyBomb = { x: this.x, y: this.y };
                        return true;
                    }

                    let basePts = (this.typeKey === 'BOSS' || this.typeKey === 'FEVER') ? this.maxHp : TYPES[this.typeKey].pts;
                    let comboBonus = 1 + (state.combo * 0.1);
                    state.score += Math.floor(basePts * comboBonus * (isCritical ? 2 : 1));

                    if (this.typeKey === 'BOSS' || this.typeKey === 'FEVER') bossActive = false;
                    if (this.typeKey === 'FEVER') startFever();
                    shakeTime = 20;
                    return true;
                }
            }
        }
        return false;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.flash > 0) { ctx.shadowBlur = 30; ctx.shadowColor = "white"; }
        
        // 色の動的切り替え
        let drawColor = TYPES[this.typeKey].color;
        if (this.typeKey === 'BOMB' && this.hp === 1) {
            // 敵の爆弾：残り1回で白→オレンジ→赤の点滅
            const colors = ['#ffffff', '#ffa500', '#ff0000'];
            drawColor = colors[Math.floor(Date.now() / 100) % 3];
        } else if (this.typeKey === 'ITEM_BOMB' && this.y >= height / 2) {
            // アイテム爆弾：停止時に点滅
            const colors = ['#ffffff', '#ffa500', '#ff0000'];
            drawColor = colors[Math.floor(Date.now() / 100) % 3];
        }

        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fillStyle = drawColor;
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.font = `${this.r}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(TYPES[this.typeKey].label, 0, 2);
        
        if (this.typeKey === 'BOSS' || this.typeKey === 'FEVER') {
            const barW = 140;
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(-barW/2, -this.r - 40, barW, 15);
            ctx.fillStyle = this.typeKey === 'FEVER' ? "#ffd700" : "#ff3333";
            ctx.fillRect(-barW/2, -this.r - 40, (this.hp / this.maxHp) * barW, 15);
            ctx.strokeStyle = "white";
            ctx.strokeRect(-barW/2, -this.r - 40, barW, 15);
        }
        ctx.restore();
    }
}

function createParticles(x, y, color, count = 8) {
    for(let i=0; i<count; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1, color });
    }
}

function drawTrail() {
    if (mouseHistory.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    for (let i = 0; i < mouseHistory.length - 1; i++) {
        const p1 = mouseHistory[i];
        const p2 = mouseHistory[i + 1];
        ctx.lineWidth = i * 2;
        ctx.globalAlpha = i / mouseHistory.length;
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
}

let spawnTimer = 0;
let lastTime = 0;

function update(time) {
    if (lastTime === 0) lastTime = time;
    const dt = time - lastTime;
    lastTime = time;

    if (!state.isPaused) {
        ctx.save();
        if (shakeTime > 0) {
            ctx.translate((Math.random() - 0.5) * shakeTime, (Math.random() - 0.5) * shakeTime);
            shakeTime *= 0.9;
        }

        ctx.clearRect(-100, -100, width + 200, height + 200);

        if (state.comboTimer > 0) {
            state.comboTimer--;
            document.getElementById('combo-ui').style.display = 'block';
            document.getElementById('combo-count').innerText = state.combo;
        } else {
            state.combo = 0;
            document.getElementById('combo-ui').style.display = 'none';
        }

        // ボムのクールダウン更新
        if (state.bombCooldown > 0) {
            state.bombCooldown -= dt;
            let bombBtn = document.getElementById('btn-buy-bomb');
            if(bombBtn) {
                bombBtn.innerText = `⏳ ${Math.ceil(state.bombCooldown/1000)}s`;
                bombBtn.disabled = true;
            }
        } else {
            let bombBtn = document.getElementById('btn-buy-bomb');
            if(bombBtn && bombBtn.disabled) {
                bombBtn.innerText = "200 Pt";
                bombBtn.disabled = false;
            }
        }

        const recoverMul = state.activeBuffs['fastRecover'] ? 2 : 1;
        state.recoveryTimer -= (dt / 1000) * recoverMul;
        if (state.recoveryTimer <= 0) {
            if (state.hp < state.maxHp) state.hp++;
            state.recoveryTimer = 30;
        }

        if (state.isFever) {
            feverTimer -= dt;
            if (feverTimer <= 0) {
                state.isFever = false;
                document.getElementById('fever-overlay').style.display = 'none';
            }
        }

        // フルーツ・アイテムの出現ロジック
        spawnTimer -= dt;
        if (spawnTimer <= 0 && !bossActive) {
            let rand = Math.random();
            if (!state.isFever && rand < 0.04) { 
                fruits.push(new Fruit(Math.random() < 0.3 ? 'FEVER' : 'BOSS'));
                bossActive = true;
            } else if (!state.isFever && rand < 0.14) { // 10%で敵の爆弾
                fruits.push(new Fruit('BOMB'));
            } else if (!state.isFever && rand < 0.16) { // 2%で銀のリンゴ
                fruits.push(new Fruit('SILVER'));
            } else if (!state.isFever && rand < 0.17) { // 1%で黄金のリンゴ
                fruits.push(new Fruit('GOLD'));
            } else {
                let type = 'S';
                let r2 = Math.random();
                if (r2 > 0.5) type = 'M';
                if (r2 > 0.8) type = 'L';
                fruits.push(new Fruit(type));
            }
            spawnTimer = state.isFever ? 80 : 350;
        }

        // 味方のアイテム爆弾の起爆処理
        if (state.triggerItemBomb) {
            shakeTime = 40;
            createParticles(state.triggerItemBomb.x, state.triggerItemBomb.y, '#ffa500', 50);
            floatingTexts.push({ x: state.triggerItemBomb.x, y: state.triggerItemBomb.y, text: "BOOOM!!", life: 1.5, color: "#ffa500" });
            
            let addedScore = 0;
            fruits.forEach(f => {
                // 敵の爆弾と他のアイテム爆弾には干渉させない
                if (f.typeKey !== 'BOMB' && f.typeKey !== 'ITEM_BOMB') {
                    if (f.typeKey === 'BOSS' || f.typeKey === 'FEVER') {
                        f.hp -= 50; // 即死ではなく50ダメージ
                        if (f.hp <= 0) {
                            addedScore += f.maxHp;
                            createParticles(f.x, f.y, TYPES[f.typeKey].color, 15);
                            if (f.typeKey === 'FEVER') startFever();
                            bossActive = false;
                            f.dead = true; // 削除フラグ
                        } else {
                            // ボスが生き残った場合はサイズを縮小して継続
                            const config = TYPES[f.typeKey];
                            f.r = Math.max(25, config.r * (f.hp / f.maxHp));
                            f.flash = 1;
                        }
                    } else {
                        // 通常フルーツは破壊してポイント加算
                        addedScore += TYPES[f.typeKey].pts;
                        createParticles(f.x, f.y, TYPES[f.typeKey].color, 15);
                        f.dead = true;
                    }
                }
            });
            state.score += addedScore;
            fruits = fruits.filter(f => !f.dead); // 破壊されたフルーツのみ画面から消す
            state.triggerItemBomb = null;
        }

        // 敵の爆弾の起爆処理
        if (state.triggerEnemyBomb) {
            if (state.shields > 0) {
                state.shields--;
                state.hp -= 1; // 盾で軽減
                floatingTexts.push({ x: state.triggerEnemyBomb.x, y: state.triggerEnemyBomb.y - 40, text: "🛡️ SHIELD!!", life: 1.5, color: "#44ccff" });
            } else {
                state.hp -= 5;
            }
            shakeTime = 50;
            createParticles(state.triggerEnemyBomb.x, state.triggerEnemyBomb.y, '#ff0000', 50);
            floatingTexts.push({ x: state.triggerEnemyBomb.x, y: state.triggerEnemyBomb.y, text: "BOMB!!", life: 1.5, color: "#ff0000" });
            
            fruits.forEach(f => {
                // アイテム爆弾と他の敵の爆弾には干渉させない
                if (f.typeKey !== 'ITEM_BOMB' && f.typeKey !== 'BOMB') {
                    if (f.typeKey === 'BOSS' || f.typeKey === 'FEVER') {
                        f.hp -= 50; // 敵の爆弾もボスには50ダメージ
                        if (f.hp <= 0) {
                            createParticles(f.x, f.y, TYPES[f.typeKey].color, 15);
                            bossActive = false;
                            f.dead = true;
                        } else {
                            const config = TYPES[f.typeKey];
                            f.r = Math.max(25, config.r * (f.hp / f.maxHp));
                            f.flash = 1;
                        }
                    } else {
                        // 通常フルーツは全消し（ポイント加算なし）
                        f.dead = true;
                    }
                }
            });
            
            fruits = fruits.filter(f => !f.dead);
            state.combo = 0;
            state.triggerEnemyBomb = null;
        }

        fruits = fruits.filter(f => !f.update());
        fruits.forEach(f => f.draw());

        floatingTexts = floatingTexts.filter(t => {
            t.y -= 2; t.life -= 0.02;
            ctx.globalAlpha = t.life;
            ctx.fillStyle = t.color;
            ctx.font = "bold 24px Arial";
            ctx.fillText(t.text, t.x, t.y);
            ctx.globalAlpha = 1;
            return t.life > 0;
        });

        particles = particles.filter(p => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 6, 6);
            ctx.globalAlpha = 1;
            return p.life > 0;
        });

        mouseHistory.forEach(p => p.life--);
        mouseHistory = mouseHistory.filter(p => p.life > 0);
        drawTrail();
        ctx.restore();

        // UIのバフと盾の表示
        let buffHtml = "";
        if (state.shields > 0) {
            buffHtml += `<div style="color: #44ccff;">🛡️ 盾: ${state.shields}個</div>`;
        }
        Object.keys(state.activeBuffs).forEach(key => {
            state.activeBuffs[key] -= dt;
            if (state.activeBuffs[key] <= 0) {
                delete state.activeBuffs[key];
            } else {
                buffHtml += `<div>${BUFF_LABELS[key]}: ${Math.ceil(state.activeBuffs[key]/1000)}s</div>`;
            }
        });
        document.getElementById('buffs').innerHTML = buffHtml;

        updateUI();
        if (state.hp <= 0) gameOver();
    }
    mouse.isMoving = false;
    requestAnimationFrame(update);
}

function updateUI() {
    document.getElementById('hp-display').innerText = state.hp;
    document.getElementById('max-hp-display').innerText = state.maxHp;
    document.getElementById('score-display').innerText = Math.floor(state.score);
    document.getElementById('recover-display').innerText = Math.max(0, Math.ceil(state.recoveryTimer));
}

function startFever() {
    state.isFever = true;
    feverTimer = 30000;
    document.getElementById('fever-overlay').style.display = 'block';
}

function openShop() { state.isPaused = true; document.getElementById('shop-screen').style.display = 'block'; }
function closeShop() { state.isPaused = false; document.getElementById('shop-screen').style.display = 'none'; lastTime = performance.now(); }

function buyUpgrade(type, price) {
    if (state.score < price) return alert("ポイント不足！");
    state.score -= price;
    if(type === 'maxHp') { state.maxHp++; state.hp++; } 
    else {
        const durations = { fastRecover: 60000, doubleDamage: 30000, slowFall: 45000 };
        state.activeBuffs[type] = (state.activeBuffs[type] || 0) + durations[type];
    }
    updateUI();
}

function buyShield(price) {
    if (state.score < price) return alert("ポイント不足！");
    state.score -= price;
    state.shields++;
    updateUI();
}

function buyBombItem(price) {
    if (state.bombCooldown > 0) return alert("クールダウン中です！");
    if (state.score < price) return alert("ポイント不足！");
    
    state.score -= price;
    state.bombCooldown = 20000; // 20秒
    
    let bomb = new Fruit('ITEM_BOMB');
    bomb.x = width / 2;
    bomb.y = -bomb.r;
    bomb.vx = 0;
    bomb.vy = 8;
    bomb.timer = 50; // 中央到達後、50フレームで爆発
    fruits.push(bomb);
    
    updateUI();
    closeShop();
}

function saveGame() {
    // 古いデータの名前空間を変えて、v9として保存
    localStorage.setItem('fruitCutterData_v9', JSON.stringify({
        score: state.score, maxHp: state.maxHp, hp: state.hp, activeBuffs: state.activeBuffs,
        shields: state.shields, bombCooldown: state.bombCooldown
    }));
}

function loadGame() {
    // 互換性のため、v9が無ければv8を読むようにしてもいいですが、今回はv9ベースで読み込みます
    const saved = localStorage.getItem('fruitCutterData_v9') || localStorage.getItem('fruitCutterData_v8');
    if (saved) {
        const data = JSON.parse(saved);
        state.score = data.score || 0; state.maxHp = data.maxHp || 5; state.hp = data.hp || 5;
        state.activeBuffs = data.activeBuffs || {};
        state.shields = data.shields || 0;
        state.bombCooldown = data.bombCooldown || 0;
    }
}

function resetData() {
    if (confirm("データを完全に削除しますか？")) {
        localStorage.removeItem('fruitCutterData_v8');
        localStorage.removeItem('fruitCutterData_v9');
        location.reload();
    }
}

function gameOver() {
    alert("ゲームオーバー！ ポイントを半分失いました。");
    state.hp = state.maxHp;
    state.score = Math.floor(state.score / 2);
    state.combo = 0;
    fruits = []; bossActive = false;
    state.activeBuffs = {};
    saveGame();
}

init();
</script>
