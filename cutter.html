<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fruit Cutter Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Arial', sans-serif; user-select: none; }
        canvas { display: block; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 2px 2px 2px #000; }
        .btn { pointer-events: auto; background: #444; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .btn:hover { background: #666; }
        #shop-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid #fff; padding: 20px; color: white; display: none; text-align: center; border-radius: 15px; min-width: 300px; }
        .shop-item { margin: 15px 0; padding: 10px; border: 1px solid #444; }
        #fever-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 100px #ffd700; display: none; z-index: 5; }
    </style>
</head>
<body>

<div id="fever-overlay"></div>

<div id="ui">
    <div>体力: <span id="hp-display">5</span> / <span id="max-hp-display">5</span></div>
    <div>スコア: <span id="score-display">0</span> Pt</div>
    <div>回復まで: <span id="recover-display">30</span>s</div>
    <button class="btn" onclick="openShop()">ショップ (Pキー)</button>
    <button class="btn" style="background:#822;" onclick="resetData()">データ削除</button>
</div>

<div id="shop-screen">
    <h2>SHOP</h2>
    <p>現在のスコアが通貨になります</p>
    <div class="shop-item">最大体力UP (+1) <br> <button onclick="buyUpgrade('maxHp', 50)">50 Pt</button></div>
    <div class="shop-item">回復速度UP (2倍) <br> <button onclick="buyUpgrade('fastRecover', 100)">100 Pt (60s)</button></div>
    <div class="shop-item">ダメージ2倍 <br> <button onclick="buyUpgrade('doubleDamage', 150)">150 Pt (30s)</button></div>
    <div class="shop-item">落下速度低下 <br> <button onclick="buyUpgrade('slowFall', 80)">80 Pt (45s)</button></div>
    <button class="btn" onclick="closeShop()">閉じる</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;

// ゲーム状態
let state = {
    hp: 5,
    maxHp: 5,
    score: 0,
    recoveryTimer: 30,
    isPaused: false,
    isFever: false,
    damageMul: 1,
    speedMul: 1,
    recoverMul: 1,
    activeBuffs: {}
};

// 果物データ
let fruits = [];
let particles = [];
let mouse = { x: 0, y: 0, px: 0, py: 0, isMoving: false };
let bossActive = false;
let feverTimer = 0;

const TYPES = {
    S: { r: 25, hp: 1, pts: 1, color: '#ff4d4d', label: '🍎' },
    M: { r: 40, hp: 3, pts: 3, color: '#ffa500', label: '🍊' },
    L: { r: 60, hp: 5, pts: 5, color: '#44ff44', label: '🍉' },
    BOSS: { r: 120, hp: 75, pts: 100, color: '#9932cc', label: '👿' },
    FEVER: { r: 120, hp: 50, pts: 50, color: '#ffd700', label: '🌟' }
};

// 初期化・保存
function init() {
    window.addEventListener('resize', resize);
    resize();
    loadGame();
    
    canvas.addEventListener('mousemove', e => {
        mouse.px = mouse.x;
        mouse.py = mouse.y;
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        mouse.isMoving = true;
    });

    window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 'p') state.isPaused ? closeShop() : openShop(); });

    setInterval(saveGame, 5000); // 5秒ごとにセーブ
    requestAnimationFrame(update);
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

class Fruit {
    constructor(typeKey, isFeverBoss = false) {
        this.typeKey = typeKey;
        const config = TYPES[typeKey];
        this.r = config.r;
        this.maxHp = (typeKey === 'BOSS' || typeKey === 'FEVER') ? (Math.floor(Math.random()*50)+50) : config.hp;
        this.hp = this.maxHp;
        this.x = Math.random() * (width - this.r * 2) + this.r;
        this.y = -this.r;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = 2;
        this.hitCooldown = 0;
        this.flash = 0;
    }

    update() {
        if (state.isPaused) return;
        
        // 物理
        this.vy += 0.05 * state.speedMul;
        this.x += this.vx;
        this.y += this.vy;

        // 壁バウンド
        if (this.x - this.r < 0 || this.x + this.r > width) this.vx *= -1;
        
        // 画面下に到達
        if (this.y - this.r > height) {
            if (!state.isFever) state.hp--;
            return true; // 削除
        }

        // スライス判定
        if (this.hitCooldown > 0) this.hitCooldown--;
        this.flash *= 0.9;

        if (mouse.isMoving && this.hitCooldown <= 0) {
            let dist = Math.hypot(mouse.x - this.x, mouse.y - this.y);
            if (dist < this.r) {
                this.hp -= state.damageMul;
                this.hitCooldown = 5; // 高速連打防止
                this.vy = -5; // 跳ね上がり
                this.vx += (Math.random() - 0.5) * 10;
                this.flash = 1;
                createParticles(this.x, this.y, TYPES[this.typeKey].color);
                
                if (this.hp <= 0) {
                    state.score += TYPES[this.typeKey].pts;
                    if (this.typeKey === 'BOSS') bossActive = false;
                    if (this.typeKey === 'FEVER') startFever();
                    return true;
                }
            }
        }
        return false;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 光るエフェクト
        if (this.flash > 0) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = "white";
        }

        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fillStyle = TYPES[this.typeKey].color;
        ctx.fill();
        ctx.closePath();

        // ラベル (絵文字)
        ctx.font = `${this.r}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(TYPES[this.typeKey].label, 0, 0);

        // HPバー (ボス用)
        if (this.typeKey === 'BOSS' || this.typeKey === 'FEVER') {
            ctx.fillStyle = "red";
            ctx.fillRect(-50, -this.r - 20, 100, 10);
            ctx.fillStyle = "lime";
            ctx.fillRect(-50, -this.r - 20, (this.hp / this.maxHp) * 100, 10);
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText(`${this.hp}/${this.maxHp}`, 0, -this.r - 25);
        }
        
        ctx.restore();
    }
}

function createParticles(x, y, color) {
    for(let i=0; i<8; i++) {
        particles.push({
            x, y, 
            vx: (Math.random()-0.5)*10, 
            vy: (Math.random()-0.5)*10, 
            life: 1, 
            color
        });
    }
}

// ゲームループ
let spawnTimer = 0;
let lastTime = 0;

function update(time) {
    if (lastTime === 0) lastTime = time;
    const dt = time - lastTime;
    lastTime = time;

    if (!state.isPaused) {
        ctx.clearRect(0, 0, width, height);

        // 自然回復
        state.recoveryTimer -= (dt / 1000) * state.recoverMul;
        if (state.recoveryTimer <= 0) {
            if (state.hp < state.maxHp) state.hp++;
            state.recoveryTimer = 30;
        }

        // フィーバー管理
        if (state.isFever) {
            feverTimer -= dt;
            if (feverTimer <= 0) {
                state.isFever = false;
                document.getElementById('fever-overlay').style.display = 'none';
            }
        }

        // スポーン
        spawnTimer -= dt;
        if (spawnTimer <= 0 && !bossActive) {
            let rand = Math.random();
            if (rand < 0.02) { // ボス
                fruits.push(new Fruit('BOSS'));
                bossActive = true;
            } else if (rand < 0.04) { // フィーバーボス
                fruits.push(new Fruit('FEVER'));
                bossActive = true;
            } else {
                let type = 'S';
                if (rand > 0.7) type = 'M';
                if (rand > 0.9) type = 'L';
                fruits.push(new Fruit(type));
            }
            spawnTimer = state.isFever ? 200 : 1000;
        }

        // 更新・描画
        fruits = fruits.filter(f => !f.update());
        fruits.forEach(f => f.draw());

        particles = particles.filter(p => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 4, 4);
            ctx.globalAlpha = 1;
            return p.life > 0;
        });

        // バフタイマー更新
        Object.keys(state.activeBuffs).forEach(key => {
            state.activeBuffs[key] -= dt;
            if (state.activeBuffs[key] <= 0) {
                removeBuff(key);
            }
        });

        updateUI();
        if (state.hp <= 0) gameOver();
    }
    
    mouse.isMoving = false;
    requestAnimationFrame(update);
}

function updateUI() {
    document.getElementById('hp-display').innerText = state.hp;
    document.getElementById('max-hp-display').innerText = state.maxHp;
    document.getElementById('score-display').innerText = state.score;
    document.getElementById('recover-display').innerText = Math.ceil(state.recoveryTimer);
}

function startFever() {
    state.isFever = true;
    feverTimer = 10000; // 10秒
    document.getElementById('fever-overlay').style.display = 'block';
}

// ショップ・システム
function openShop() {
    state.isPaused = true;
    document.getElementById('shop-screen').style.display = 'block';
}

function closeShop() {
    state.isPaused = false;
    document.getElementById('shop-screen').style.display = 'none';
    lastTime = performance.now();
}

function buyUpgrade(type, price) {
    if (state.score < price) return alert("ポイントが足りません！");
    state.score -= price;

    switch(type) {
        case 'maxHp':
            state.maxHp++;
            state.hp++;
            break;
        case 'fastRecover':
            state.recoverMul = 2;
            state.activeBuffs['fastRecover'] = 60000;
            break;
        case 'doubleDamage':
            state.damageMul = 2;
            state.activeBuffs['doubleDamage'] = 30000;
            break;
        case 'slowFall':
            state.speedMul = 0.5;
            state.activeBuffs['slowFall'] = 45000;
            break;
    }
    updateUI();
}

function removeBuff(key) {
    delete state.activeBuffs[key];
    if (key === 'fastRecover') state.recoverMul = 1;
    if (key === 'doubleDamage') state.damageMul = 1;
    if (key === 'slowFall') state.speedMul = 1;
}

function saveGame() {
    const data = {
        score: state.score,
        maxHp: state.maxHp,
        hp: state.hp
    };
    localStorage.setItem('fruitCutterData', JSON.stringify(data));
}

function loadGame() {
    const saved = localStorage.getItem('fruitCutterData');
    if (saved) {
        const data = JSON.parse(saved);
        state.score = data.score;
        state.maxHp = data.maxHp;
        state.hp = data.hp;
    }
}

function resetData() {
    if (confirm("データを削除しますか？")) {
        if (confirm("本当によろしいですか？（この操作は取り消せません）")) {
            localStorage.removeItem('fruitCutterData');
            location.reload();
        }
    }
}

function gameOver() {
    alert("ゲームオーバー！ スコア: " + state.score);
    state.hp = state.maxHp;
    state.score = Math.floor(state.score / 2); // 罰則としてスコア半分
    fruits = [];
    bossActive = false;
    saveGame();
}

init();
</script>
</body>
</html>
