<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Cutter - Impact Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Arial', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; font-size: 14px; z-index: 10; }
        #combo-ui { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); color: #ff4500; font-size: 40px; font-weight: bold; font-style: italic; pointer-events: none; text-shadow: 0 0 10px #fff; display: none; text-align: right; }
        #buffs { position: absolute; top: 10px; right: 10px; color: #ffd700; text-align: right; pointer-events: none; font-size: 12px; font-weight: bold; }
        .btn { pointer-events: auto; background: #444; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 8px; margin-top: 8px; font-weight: bold; }
        #shop-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 2px solid #ffd700; padding: 20px; color: white; display: none; text-align: center; border-radius: 15px; width: 85%; max-width: 400px; z-index: 100; }
        .shop-item { margin: 10px 0; padding: 10px; border: 1px solid #444; background: #222; border-radius: 8px; }
        #fever-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 80px #ffd700; display: none; z-index: 5; }
    </style>
</head>
<body>

<div id="fever-overlay"></div>

<div id="ui">
    <div>❤️ 体力: <span id="hp-display">5</span> / <span id="max-hp-display">5</span></div>
    <div>💰 ポイント: <span id="score-display">0</span> Pt</div>
    <div>⏳ 回復まで: <span id="recover-display">30</span>s</div>
    <button class="btn" onclick="openShop()">🛒 ショップ</button>
    <button class="btn" style="background:#822;" onclick="resetData()">🗑️ 削除</button>
</div>

<div id="combo-ui"><span id="combo-count">0</span> COMBO!</div>
<div id="buffs"></div>

<div id="shop-screen">
    <h2>🛒 強化ショップ</h2>
    <div class="shop-item">❤️ 最大体力+1 <br> <button class="btn" onclick="buyUpgrade('maxHp', 50)">50 Pt</button></div>
    <div class="shop-item">⚡ 回復速度2倍 (60s) <br> <button class="btn" onclick="buyUpgrade('fastRecover', 100)">100 Pt</button></div>
    <div class="shop-item">⚔️ ダメージ2倍 (30s) <br> <button class="btn" onclick="buyUpgrade('doubleDamage', 150)">150 Pt</button></div>
    <div class="shop-item">❄️ 低速落下 (45s) <br> <button class="btn" onclick="buyUpgrade('slowFall', 80)">80 Pt</button></div>
    <button class="btn" style="background:#555; width:100%;" onclick="closeShop()">閉じる</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;

let state = {
    hp: 5, maxHp: 5, score: 0,
    recoveryTimer: 30, isPaused: false, isFever: false,
    activeBuffs: {},
    combo: 0, comboTimer: 0
};

let fruits = [];
let particles = [];
let floatingTexts = [];
let mouse = { x: 0, y: 0, px: 0, py: 0, isMoving: false };
let mouseHistory = [];
let shakeTime = 0;
let bossActive = false;
let feverTimer = 0;

const TYPES = {
    S: { r: 45, hp: 1, pts: 1, color: '#ff4d4d', label: '🍎' },
    M: { r: 65, hp: 3, pts: 3, color: '#ffa500', label: '🍊' },
    L: { r: 85, hp: 5, pts: 5, color: '#44ff44', label: '🍉' },
    BOSS: { r: 150, hp: 75, pts: 100, color: '#9932cc', label: '👿' },
    FEVER: { r: 150, hp: 50, pts: 50, color: '#ffd700', label: '🌟' }
};

const BUFF_LABELS = {
    fastRecover: "⚡ 回復2倍",
    doubleDamage: "⚔️ 攻撃2倍",
    slowFall: "❄️ 低速落下"
};

function init() {
    window.addEventListener('resize', resize);
    resize();
    loadGame();

    const handleInput = (nx, ny) => {
        mouse.px = mouse.x;
        mouse.py = mouse.y;
        mouse.x = nx;
        mouse.y = ny;
        // 変更箇所①：閾値を1から15に上げ、ある程度速い動きのみを斬撃として判定する
        if (Math.hypot(mouse.x - mouse.px, mouse.y - mouse.py) > 15) {
            mouse.isMoving = true;
            mouseHistory.push({x: nx, y: ny, life: 10});
        }
    };

    canvas.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        handleInput(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 'p') state.isPaused ? closeShop() : openShop(); });
    setInterval(saveGame, 5000);
    requestAnimationFrame(update);
}

function distToSegment(p, v, w) {
    const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
    if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
    let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

class Fruit {
    constructor(typeKey) {
        this.typeKey = typeKey;
        const config = TYPES[typeKey];
        this.r = config.r;
        this.maxHp = (typeKey === 'BOSS' || typeKey === 'FEVER') ? (Math.floor(Math.random()*50)+50) : config.hp;
        this.hp = this.maxHp;
        
        const side = Math.random();
        if (side < 0.4) { // 上
            this.x = Math.random() * (width - this.r * 2) + this.r;
            this.y = -this.r;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = 0.5;
        } else if (side < 0.7) { // 左
            this.x = -this.r;
            this.y = height * 0.3 + Math.random() * height * 0.4;
            this.vx = 1 + Math.random() * 1;
            this.vy = -3 - Math.random() * 3;
        } else { // 右
            this.x = width + this.r;
            this.y = height * 0.3 + Math.random() * height * 0.4;
            this.vx = -(1 + Math.random() * 1);
            this.vy = -3 - Math.random() * 3;
        }

        this.hitCooldown = 0;
        this.stopTime = 0; // ヒットストップ用
        this.flash = 0;
    }

    update() {
        if (state.isPaused) return;

        // ヒットストップ中は動きを止める
        if (this.stopTime > 0) {
            this.stopTime--;
            return false;
        }
        
        const speedMul = state.activeBuffs['slowFall'] ? 0.5 : 1.0;
        this.vy += 0.01 * speedMul; // 重力
        this.x += this.vx * speedMul;
        this.y += this.vy * speedMul;

        // 左右の壁でバウンド
        if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.8; }
        if (this.x + this.r > width) { this.x = width - this.r; this.vx *= -0.8; }

        if (this.y - this.r > height) {
            if (!state.isFever) {
                state.hp--;
                shakeTime = 15;
                state.combo = 0;
            }
            if (this.typeKey === 'BOSS' || this.typeKey === 'FEVER') bossActive = false;
            return true;
        }

        if (this.hitCooldown > 0) this.hitCooldown--;
        this.flash *= 0.8;

        if (mouse.isMoving && this.hitCooldown <= 0) {
            const d = distToSegment({x: this.x, y: this.y}, {x: mouse.px, y: mouse.py}, {x: mouse.x, y: mouse.y});
            if (d < this.r + 40) { 
                const isCritical = Math.random() < 0.1;
                let dmg = state.activeBuffs['doubleDamage'] ? 2 : 1;
                if (isCritical) dmg *= 5;

                this.hp -= dmg;

                // 変更箇所②：ボスやフィーバー以外のフルーツの場合、残りHPに応じてサイズを小さくする
                if (this.typeKey !== 'BOSS' && this.typeKey !== 'FEVER' && this.hp > 0) {
                    const config = TYPES[this.typeKey];
                    // 小さくなりすぎて斬れなくなるのを防ぐため、最小サイズを25に設定
                    this.r = Math.max(25, config.r * (this.hp / this.maxHp));
                }

                this.hitCooldown = 10; 
                this.stopTime = 9; // ヒットストップ（一瞬静止）
                
                // 速度を減衰させて、静止感を出す
                this.vx = Math.random() - 0.5;
                this.vy = Math.random() - 0.5; 
                
                this.flash = 1;
                shakeTime = isCritical ? 25 : 8;
                state.combo++;
                state.comboTimer = 100;

                createParticles(this.x, this.y, isCritical ? '#fff' : TYPES[this.typeKey].color, isCritical ? 20 : 8);
                
                if (isCritical) {
                    floatingTexts.push({ x: this.x, y: this.y, text: "CRITICAL!!", life: 1, color: "#ffff00" });
                }

                if (this.hp <= 0) {
                    let basePts = (this.typeKey === 'BOSS' || this.typeKey === 'FEVER') ? this.maxHp : TYPES[this.typeKey].pts;
                    let comboBonus = 1 + (state.combo * 0.1);
                    state.score += Math.floor(basePts * comboBonus * (isCritical ? 2 : 1));

                    if (this.typeKey === 'BOSS' || this.typeKey === 'FEVER') bossActive = false;
                    if (this.typeKey === 'FEVER') startFever();
                    shakeTime = 20;
                    return true;
                }
            }
        }
        return false;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.flash > 0) { ctx.shadowBlur = 30; ctx.shadowColor = "white"; }
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fillStyle = TYPES[this.typeKey].color;
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 3;
        ctx.stroke();
        // 半径に合わせてフォントサイズも変更
        ctx.font = `${this.r}px Arial`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(TYPES[this.typeKey].label, 0, 2);
        
        if (this.typeKey === 'BOSS' || this.typeKey === 'FEVER') {
            const barW = 140;
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            ctx.fillRect(-barW/2, -this.r - 40, barW, 15);
            ctx.fillStyle = this.typeKey === 'FEVER' ? "#ffd700" : "#ff3333";
            ctx.fillRect(-barW/2, -this.r - 40, (this.hp / this.maxHp) * barW, 15);
            ctx.strokeStyle = "white";
            ctx.strokeRect(-barW/2, -this.r - 40, barW, 15);
        }
        ctx.restore();
    }
}

function createParticles(x, y, color, count = 8) {
    for(let i=0; i<count; i++) {
        particles.push({ x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1, color });
    }
}

function drawTrail() {
    if (mouseHistory.length < 2) return;
    ctx.beginPath();
    ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    for (let i = 0; i < mouseHistory.length - 1; i++) {
        const p1 = mouseHistory[i];
        const p2 = mouseHistory[i + 1];
        ctx.lineWidth = i * 2;
        ctx.globalAlpha = i / mouseHistory.length;
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
}

let spawnTimer = 0;
let lastTime = 0;

function update(time) {
    if (lastTime === 0) lastTime = time;
    const dt = time - lastTime;
    lastTime = time;

    if (!state.isPaused) {
        ctx.save();
        if (shakeTime > 0) {
            ctx.translate((Math.random() - 0.5) * shakeTime, (Math.random() - 0.5) * shakeTime);
            shakeTime *= 0.9;
        }

        ctx.clearRect(-100, -100, width + 200, height + 200);

        if (state.comboTimer > 0) {
            state.comboTimer--;
            document.getElementById('combo-ui').style.display = 'block';
            document.getElementById('combo-count').innerText = state.combo;
        } else {
            state.combo = 0;
            document.getElementById('combo-ui').style.display = 'none';
        }

        const recoverMul = state.activeBuffs['fastRecover'] ? 2 : 1;
        state.recoveryTimer -= (dt / 1000) * recoverMul;
        if (state.recoveryTimer <= 0) {
            if (state.hp < state.maxHp) state.hp++;
            state.recoveryTimer = 30;
        }

        if (state.isFever) {
            feverTimer -= dt;
            if (feverTimer <= 0) {
                state.isFever = false;
                document.getElementById('fever-overlay').style.display = 'none';
            }
        }

        spawnTimer -= dt;
        if (spawnTimer <= 0 && !bossActive) {
            let rand = Math.random();
            if (!state.isFever && rand < 0.04) { 
                fruits.push(new Fruit(Math.random() < 0.3 ? 'FEVER' : 'BOSS'));
                bossActive = true;
            } else {
                let type = 'S';
                if (rand > 0.5) type = 'M';
                if (rand > 0.8) type = 'L';
                fruits.push(new Fruit(type));
            }
            spawnTimer = state.isFever ? 80 : 350;
        }

        fruits = fruits.filter(f => !f.update());
        fruits.forEach(f => f.draw());

        floatingTexts = floatingTexts.filter(t => {
            t.y -= 2; t.life -= 0.02;
            ctx.globalAlpha = t.life;
            ctx.fillStyle = t.color;
            ctx.font = "bold 24px Arial";
            ctx.fillText(t.text, t.x, t.y);
            ctx.globalAlpha = 1;
            return t.life > 0;
        });

        particles = particles.filter(p => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 6, 6);
            ctx.globalAlpha = 1;
            return p.life > 0;
        });

        mouseHistory.forEach(p => p.life--);
        mouseHistory = mouseHistory.filter(p => p.life > 0);
        drawTrail();
        ctx.restore();

        let buffHtml = "";
        Object.keys(state.activeBuffs).forEach(key => {
            state.activeBuffs[key] -= dt;
            if (state.activeBuffs[key] <= 0) {
                delete state.activeBuffs[key];
            } else {
                buffHtml += `<div>${BUFF_LABELS[key]}: ${Math.ceil(state.activeBuffs[key]/1000)}s</div>`;
            }
        });
        document.getElementById('buffs').innerHTML = buffHtml;

        updateUI();
        if (state.hp <= 0) gameOver();
    }
    mouse.isMoving = false;
    requestAnimationFrame(update);
}

function updateUI() {
    document.getElementById('hp-display').innerText = state.hp;
    document.getElementById('max-hp-display').innerText = state.maxHp;
    document.getElementById('score-display').innerText = Math.floor(state.score);
    document.getElementById('recover-display').innerText = Math.max(0, Math.ceil(state.recoveryTimer));
}

function startFever() {
    state.isFever = true;
    feverTimer = 10000;
    document.getElementById('fever-overlay').style.display = 'block';
}

function openShop() { state.isPaused = true; document.getElementById('shop-screen').style.display = 'block'; }
function closeShop() { state.isPaused = false; document.getElementById('shop-screen').style.display = 'none'; lastTime = performance.now(); }

function buyUpgrade(type, price) {
    if (state.score < price) return alert("ポイント不足！");
    state.score -= price;
    if(type === 'maxHp') { state.maxHp++; state.hp++; } 
    else {
        const durations = { fastRecover: 60000, doubleDamage: 30000, slowFall: 45000 };
        state.activeBuffs[type] = (state.activeBuffs[type] || 0) + durations[type];
    }
    updateUI();
}

function saveGame() {
    localStorage.setItem('fruitCutterData_v8', JSON.stringify({
        score: state.score, maxHp: state.maxHp, hp: state.hp, activeBuffs: state.activeBuffs 
    }));
}

function loadGame() {
    const saved = localStorage.getItem('fruitCutterData_v8');
    if (saved) {
        const data = JSON.parse(saved);
        state.score = data.score; state.maxHp = data.maxHp; state.hp = data.hp;
        state.activeBuffs = data.activeBuffs || {};
    }
}

function resetData() {
    if (confirm("データを削除しますか？")) {
        localStorage.removeItem('fruitCutterData_v8');
        location.reload();
    }
}

function gameOver() {
    alert("ゲームオーバー！ ポイントを半分失いました。");
    state.hp = state.maxHp;
    state.score = Math.floor(state.score / 2);
    state.combo = 0;
    fruits = []; bossActive = false;
    state.activeBuffs = {};
    saveGame();
}

init();
</script>
</body>
</html>
